<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RIM_NEX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{
  background:linear-gradient(180deg,#0a0a0a 0%,#000 100%);
  min-height:100vh;padding:20px 15px 100px;color:#fff;
}
.container{max-width:420px;margin:0 auto}

/* HEADER */
.header{text-align:center;padding:30px 0 25px}
.header h1{
  font-size:36px;font-weight:900;color:#D4AF37;
  display:flex;align-items:center;justify-content:center;gap:8px
}
.shield{width:32px;height:32px;fill:#D4AF37}
.header p{color:#777;font-size:11px;letter-spacing:4px;margin-top:8px;font-weight:500}

/* CARD */
.card{background:#0d0d0d;border-radius:18px;padding:18px;margin-bottom:14px}

/* TOGGLE مع وهج */
.toggle{display:flex;justify-content:space-between;align-items:center;text-align:right}
.toggle-info b{font-size:17px;display:block}
.toggle-info small{font-size:13px;color:#666;margin-top:4px;display:block}
.toggle-switch{
  width:58px;height:34px;background:linear-gradient(180deg,#FFD700,#D4AF37);
  border-radius:34px;position:relative;box-shadow:0 0 15px rgba(255,215,0,0.4);cursor:pointer
}
.toggle-switch::after{
  content:"";width:28px;height:28px;background:#fff;border-radius:50%;
  position:absolute;right:3px;top:3px;box-shadow:0 2px 5px rgba(0,0,0,0.3)
}

/* UPLOAD متقطع */
.upload{
  border:2px dashed #D4AF37;border-radius:20px;
  text-align:center;padding:30px 20px
}
.upload-icon{
  width:60px;height:60px;margin:0 auto 14px;border-radius:18px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);
  display:flex;align-items:center;justify-content:center;font-size:32px;color:#000
}
.upload b{font-size:18px;display:block;margin-bottom:6px}
.upload small{font-size:14px;color:#666}
.file-name{color:#FFD700;font-size:14px;margin-top:10px;font-weight:600}

/* PASSWORD INPUT */
.pass-input{
  display:flex;align-items:center;justify-content:space-between;
  background:#0d0d0d;border:2px solid #D4AF37;border-radius:18px;padding:16px 18px
}
.pass-input input{
  background:transparent;border:none;color:#fff;width:70%;
  text-align:right;font-size:16px;outline:none
}
.pass-icons{display:flex;gap:12px;align-items:center}
.eye,.lock{font-size:20px;cursor:pointer}

/* BOTTOM BAR */
.bottom-bar{
  position:fixed;bottom:15px;left:15px;right:15px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);
  border-radius:20px;padding:12px;display:flex;align-items:center;gap:10px
}
.btn-icon{
  width:45px;height:45px;border-radius:15px;background:rgba(0,0,0,0.15);
  display:flex;align-items:center;justify-content:center;font-size:22px;color:#000;cursor:pointer
}
.url-box{
  flex:1;background:rgba(0,0,0,0.15);border-radius:15px;
  padding:12px 15px;text-align:center;color:#000;font-weight:600;font-size:14px
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>RIM_NEX <svg class="shield" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4z"/></svg></h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <div class="toggle-info">
      <b>شهادة التوقيع الخاصة بي</b>
      <small>استخدم شهادة Apple Developer الخاصة بك</small>
    </div>
    <div class="toggle-switch"></div>
  </div>

  <div class="upload" onclick="upload('p12')">
    <div class="upload-icon">✦</div>
    <b>شهادة P12</b>
    <small>اسحب الملف هنا أو اضغط للتصفح</small>
    <div class="file-name" id="p12"></div>
  </div>

  <div class="upload" onclick="upload('prov')">
    <div class="upload-icon">📁</div>
    <b>Provisioning Profile</b>
    <small>اسحب الملف هنا أو اضغط للتصفح</small>
    <div class="file-name" id="prov"></div>
  </div>

  <div class="pass-input">
    <div class="pass-icons">
      <span class="eye" onclick="togglePass()">👁️</span>
      <span class="lock">🔒</span>
    </div>
    <input type="password" id="pass" placeholder="كلمة مرور الشهادة">
  </div>

</div>

<div class="bottom-bar">
  <div class="btn-icon" onclick="copyURL()">📋</div>
  <div class="url-box">rim-nex.vercel.app</div>
  <div class="btn-icon" onclick="location.reload()">🔄</div>
  <div class="btn-icon">➤</div>
</div>

<script>
let files={};
function upload(t){
  let i=document.createElement('input');i.type='file';
  i.accept=t=='p12'?'.p12,.pfx':'.mobileprovision';
  i.onchange=e=>{if(e.target.files[0]){files[t]=e.target.files[0];document.getElementById(t).innerText='✓ '+e.target.files[0].name}};
  i.click()
}
function togglePass(){
  let p=document.getElementById('pass');
  p.type=p.type=='password'?'text':'password';
}
function copyURL(){
  navigator.clipboard.writeText('https://rim-nex.vercel.app');
  alert('تم نسخ الرابط');
}
</script>
</body>
</html>
