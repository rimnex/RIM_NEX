<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RIM_NEX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:radial-gradient(ellipse at 50% -20%,rgba(212,175,55,0.18) 0%,#000 60%),#000;
  min-height:100vh;padding:18px;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.container{max-width:420px;margin:0 auto}

/* HEADER */
.header{text-align:center;padding:35px 0 28px}
.header h1{
  font-size:40px;font-weight:900;background:linear-gradient(180deg,#FFD700,#D4AF37);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:10px
}
.shield{width:38px;height:38px;fill:url(#g)}
.header p{color:#999;font-size:10px;letter-spacing:6px;margin-top:8px;font-weight:600}

/* CARD */
.card{background:#0a0a0a;border:2px solid #D4AF37;border-radius:20px;padding:18px;margin-bottom:14px}

/* TOGGLE - شغال */
.toggle{display:flex;justify-content:space-between;align-items:center;text-align:right;cursor:pointer}
.toggle-info b{font-size:16px;display:block}
.toggle-info small{font-size:12px;color:#aaa;margin-top:4px;display:block}
.toggle-switch{
  width:54px;height:32px;background:#D4AF37;border-radius:32px;position:relative;transition:0.3s
}
.toggle-switch.off{background:#333}
.toggle-switch::after{
  content:"";width:26px;height:26px;background:#fff;border-radius:50%;
  position:absolute;right:3px;top:3px;transition:0.3s
}
.toggle-switch.off::after{right:auto;left:3px;background:#aaa}

/* SELECT - شغال */
.select{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:12px}
.select-icon{width:46px;height:46px;border-radius:14px;background:linear-gradient(180deg,#FFD700,#D4AF37);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:24px}
.arrow{font-size:20px;color:#D4AF37;transition:0.3s}

/* UPLOAD - شغال */
.upload{border:2px dashed #D4AF37;border-radius:20px;text-align:center;padding:24px 20px;cursor:pointer}
.upload:active{background:rgba(212,175,55,0.1)}
.upload-icon{width:56px;height:56px;margin:0 auto 12px;border-radius:16px;background:linear-gradient(180deg,#FFD700,#D4AF37);display:flex;align-items:center;justify-content:center;font-size:28px;color:#000}
.upload b{font-size:17px;display:block;margin-bottom:5px}
.upload small{font-size:13px;color:#aaa}
.file-name{color:#FFD700;font-size:13px;margin-top:8px;font-weight:600}

/* BUTTON - شغال */
.btn-sign{
  width:100%;padding:20px;border:none;border-radius:18px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);
  color:#000;font-weight:900;font-size:18px;margin-top:15px;cursor:pointer;transition:0.2s
}
.btn-sign:active{transform:scale(0.96)}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>
      RIM_NEX
      <svg class="shield" viewBox="0 0 24 24">
        <defs><linearGradient id="g"><stop offset="0%" stop-color="#FFD700"/><stop offset="100%" stop-color="#D4AF37"/></linearGradient></defs>
        <path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4z"/>
      </svg>
    </h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle" onclick="toggleCert()">
    <div class="toggle-info">
      <b>شهادة التوقيع الخاصة بي</b>
      <small>استخدم شهادة Apple Developer</small>
    </div>
    <div class="toggle-switch" id="certToggle"></div>
  </div>

  <div class="card select" onclick="showESignMenu()">
    <div class="select-left">
      <div class="select-icon">E</div>
      <div>ESign</div>
    </div>
    <div class="arrow" id="arrow">▼</div>
  </div>

  <div class="upload" onclick="uploadFile('p12')">
    <div class="upload-icon">✨</div>
    <b>شهادة P12</b>
    <small>اسحب الملف هنا أو اضغط للتصفح</small>
    <div class="file-name" id="p12"></div>
  </div>

  <div class="upload" onclick="uploadFile('prov')">
    <div class="upload-icon">📁</div>
    <b>Provisioning Profile</b>
    <small>اسحب الملف هنا أو اضغط للتصفح</small>
    <div class="file-name" id="prov"></div>
  </div>

  <button class="btn-sign" onclick="signIPA()">بدء التوقيع والتثبيت ✍️</button>

</div>

<script>
let files = {p12:null, prov:null};
let certEnabled = true;

function toggleCert(){
  certEnabled =!certEnabled;
  document.getElementById('certToggle').classList.toggle('off');
}

function showESignMenu(){
  document.getElementById('arrow').style.transform =
    document.getElementById('arrow').style.transform === 'rotate(180deg)'? 'rotate(0deg)' : 'rotate(180deg)';
  alert('قائمة ESign\n1. ESign\n2. Sideloadly\n3. AltStore');
}

function uploadFile(type){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = type === 'p12'? '.p12,.pfx' : '.mobileprovision';
  input.onchange = (e) => {
    if(e.target.files.length > 0){
      files[type] = e.target.files[0];
      document.getElementById(type).innerText = '✓ ' + e.target.files[0].name;
    }
  };
  input.click();
}

function signIPA(){
  if(!files.p12){
    alert('⚠️ من فضلك ارفع شهادة P12 اولاً');
    return;
  }
  if(!files.prov){
    alert('⚠️ من فضلك ارفع Provisioning Profile اولاً');
    return;
  }
  alert('✅ جاري بدء التوقيع...\n\nالشهادة: ' + files.p12.name + '\nالبروفايل: ' + files.prov.name + '\n\nالحالة: ' + (certEnabled? 'شهادة خاصة' : 'شهادة عامة'));
}
</script>
</body>
</html>
