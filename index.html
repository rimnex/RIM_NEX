<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;
}

body{
background:#000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:#fff;
}

.card{
width:100%;
max-width:390px;
background:rgba(18,18,18,.95);
border:1px solid rgba(255,255,255,.06);
border-radius:28px;
padding:26px;
backdrop-filter:blur(18px);
}

h1{
text-align:center;
font-size:36px;
font-weight:800;
color:#FBBF24;
letter-spacing:1px;
}

.sub{
text-align:center;
color:#9CA3AF;
font-size:13px;
margin-top:5px;
margin-bottom:28px;
}

.box{
background:#171717;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:16px;
margin-bottom:16px;
}

.toggle{
display:flex;
justify-content:space-between;
align-items:center;
}

.toggle span{
font-size:15px;
color:#E5E7EB;
}

.switch{
width:52px;
height:28px;
background:#FBBF24;
border-radius:30px;
position:relative;
}

.switch::after{
content:"";
position:absolute;
width:22px;
height:22px;
background:white;
border-radius:50%;
right:3px;
top:3px;
}

.label{
font-size:13px;
color:#9CA3AF;
margin:8px 4px;
}

.select{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
position:relative;
user-select:none;
}

.right{
display:flex;
align-items:center;
gap:10px;
}

.badge{
width:42px;
height:42px;
border-radius:14px;
background:#FBBF24;
color:#000;
display:flex;
justify-content:center;
align-items:center;
font-weight:800;
font-size:18px;
}

.arrow{
color:#6B7280;
font-size:18px;
transition:.25s;
}

.dropdown{
display:none;
position:absolute;
right:0;
left:0;
top:100%;
margin-top:8px;
background:#181818;
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
overflow:hidden;
z-index:999;
}

.dropdown-item{
display:flex;
align-items:center;
gap:12px;
padding:14px 16px;
cursor:pointer;
transition:.2s;
}

.dropdown-item:hover{
background:#222;
}

.upload{
display:block;
border:2px dashed rgba(255,255,255,.15);
border-radius:18px;
padding:20px;
text-align:center;
cursor:pointer;
color:#9CA3AF;
margin-bottom:16px;
transition:.2s;
}

.upload:hover{
border-color:#FBBF24;
color:#FBBF24;
}

.file-name{
display:none;
margin-top:8px;
font-size:12px;
color:#FBBF24;
word-break:break-all;
}

input[type=file]{
display:none;
}

input[type=password]{
width:100%;
background:#171717;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:16px;
color:white;
font-size:15px;
outline:none;
margin-bottom:18px;
}

input::placeholder{
color:#777;
}

.btn{
width:100%;
background:#FBBF24;
border:none;
border-radius:18px;
padding:17px;
font-size:17px;
font-weight:800;
color:#000;
cursor:pointer;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
filter:brightness(1.05);
}

@media(max-width:430px){

.card{
padding:22px;
border-radius:24px;
}

h1{
font-size:32px;
}

}
</style>

</head>
<body>

<div class="card">

<h1>RIM_NEX</h1>
<div class="sub">IPA Signing Center</div>

<div class="box toggle">
<span>الشهادة المجانية</span>

<div style="display:flex;align-items:center;gap:10px">
<div class="switch"></div>
<div style="font-size:13px;color:#FBBF24;">ON</div>
</div>
</div>

<div class="label">
اختر تطبيق التوقيع
</div>

<div class="box select" onclick="toggleDropdown()">

<div class="arrow" id="arrow">▼</div>

<div class="right">
<span id="appName">ESign</span>
<div class="badge" id="badge">E</div>
</div>

<div class="dropdown" id="dropdown">

<div class="dropdown-item" onclick="selectApp(event,'E','ESign')">
<div class="badge">E</div>ESign
</div>

<div class="dropdown-item" onclick="selectApp(event,'K','KSign')">
<div class="badge">K</div>KSign
</div>

<div class="dropdown-item" onclick="selectApp(event,'S','Scarlet')">
<div class="badge">S</div>Scarlet
</div>

<div class="dropdown-item" onclick="selectApp(event,'G','GBox')">
<div class="badge">G</div>GBox
</div>

<div class="dropdown-item" onclick="selectApp(event,'F','Feather')">
<div class="badge">F</div>Feather
</div>

</div>

</div>

<label class="upload" for="p12">
📁 اضغط لرفع شهادة P12
<div class="file-name" id="p12Name"></div>
</label>

<input type="file" id="p12" accept=".p12">

<label class="upload" for="mobile">
📁 اضغط لرفع ملف MobileProvision
<div class="file-name" id="mobileName"></div>
</label>

<input type="file" id="mobile" accept=".mobileprovision">

<input
type="password"
placeholder="أدخل كلمة مرور الشهادة">

<button class="btn">
بدء التوقيع
</button>

</div>

<script>

const dropdown=document.getElementById("dropdown");
const arrow=document.getElementById("arrow");

function toggleDropdown(){

if(dropdown.style.display==="block"){

dropdown.style.display="none";
arrow.style.transform="rotate(0deg)";

}else{

dropdown.style.display="block";
arrow.style.transform="rotate(180deg)";

}

}

function selectApp(e,letter,name){

e.stopPropagation();

document.getElementById("badge").innerText=letter;
document.getElementById("appName").innerText=name;

dropdown.style.display="none";
arrow.style.transform="rotate(0deg)");

}

window.onclick=function(e){

if(!e.target.closest(".select")){

dropdown.style.display="none";
arrow.style.transform="rotate(0deg)";

}

}

document.getElementById("p12").onchange=function(){

if(this.files.length){

const file=document.getElementById("p12Name");
file.style.display="block";
file.innerText=this.files[0].name;

}

}

document.getElementById("mobile").onchange=function(){

if(this.files.length){

const file=document.getElementById("mobileName");
file.style.display="block";
file.innerText=this.files[0].name;

}

}

</script>

</body>
</html>
