<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX | IPA Signing Center</title>
<link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css)">
<style>
:root {
--bg-color: #0d0d0d;
--card-color: #141414;
--border: rgba(255,255,255,.08);
--gold: #d4af37;
--gold-gradient: linear-gradient(135deg,#8f6b1f,#d4af37,#f7d774,#b8860b);
--text-main: #ffffff;
--text-dim: #888;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
.container { width: 100%; max-width: 430px; animation: fadeIn 0.8s ease-out; }
.card { background: var(--card-color); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h1 { font-size: 24px; text-align: center; margin-bottom: 5px; }
p { color: var(--text-dim); text-align: center; font-size: 14px; margin-bottom: 20px; }
.toggle-group { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid var(--border); border-radius: 15px; margin-bottom: 20px; }
.switch { width: 45px; height: 24px; background: #333; border-radius: 12px; position: relative; cursor: pointer; }
.switch::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
.switch.active { background: var(--gold); }
.switch.active::after { left: 23px; }
.dropdown { position: relative; margin-bottom: 20px; }
.select-btn { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 15px; display: flex; align-items: center; cursor: pointer; }
.dropdown-menu { display: none; position: absolute; top: 100%; width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 15px; margin-top: 5px; z-index: 10; }
.dropdown-menu.show { display: block; }
.option { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.option:hover { background: #252525; }
.app-icon { width: 30px; height: 30px; border-radius: 8px; background: #333; display: flex; align-items: center; justify-content: center; }
.upload-zone { border: 2px dashed var(--border); border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
.upload-zone:hover { border-color: var(--gold); }
input[type="password"] { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 20px; color: white; outline: none; margin-bottom: 20px; }
input[type="password"]:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
.btn-sign { width: 100%; padding: 18px; border: none; border-radius: 20px; background: var(--gold-gradient); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
.btn-sign:active { transform: scale(0.98); }
#progressBar { height: 4px; background: var(--gold); width: 0%; margin-top: 20px; transition: 0.3s; border-radius: 2px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">
<h1>RIM_NEX</h1>
<p>IPA Signing Center</p>
<div class="card">
<div class="toggle-group">
<span>الشهادة المجانية</span>
<div class="switch" onclick="this.classList.toggle('active')"></div>
</div>
<div class="dropdown">
<div class="select-btn" onclick="document.querySelector('.dropdown-menu').classList.toggle('show')">
<span id="selectedApp">اختر تطبيق التوقيع</span>
</div>
<div class="dropdown-menu">
<div class="option" onclick="selectApp('ESign')"><div class="app-icon"><i class="fa-solid fa-pen-nib"></i></div> ESign</div>
<div class="option" onclick="selectApp('KSign')"><div class="app-icon"><i class="fa-solid fa-key"></i></div> KSign</div>
<div class="option" onclick="selectApp('Scarlet')"><div class="app-icon"><i class="fa-solid fa-cloud-arrow-down"></i></div> Scarlet</div>
</div>
</div>
<div class="upload-zone" onclick="document.getElementById('p12File').click()">
<i class="fa-solid fa-file-lines"></i>
Drop P12 Certificate
<input type="file" id="p12File" hidden>
</div>
<div class="upload-zone" onclick="document.getElementById('mobileprovision').click()">
<i class="fa-solid fa-folder"></i>
Drop Provision Profile
<input type="file" id="mobileprovision" hidden>
</div>
<input type="password" placeholder="Password">
<button class="btn-sign" onclick="startSigning()">بدء التوقيع</button>
<div id="progressBar"></div>
</div>
</div>
<script>
function selectApp(name) {
document.getElementById('selectedApp').innerText = name;
document.querySelector('.dropdown-menu').classList.remove('show');
}
function startSigning() {
const btn = document.querySelector('.btn-sign');
const progress = document.getElementById('progressBar');
btn.disabled = true;
let width = 0;
const interval = setInterval(() => {
if (width >= 100) {
clearInterval(interval);
alert('تم التوقيع بنجاح!');
btn.disabled = false;
} else {
width += 5;
progress.style.width = width + '%';
}
}, 100);
}
</script>
</body>
</html>
