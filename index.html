<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
:root{
  --bg:#000;
  --border:#d4af37;
  --gold:linear-gradient(135deg,#d4af37 0%,#ffd700 50%,#d4af37 100%);
  --text:#fff;
  --muted:#777;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system}
body{background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,0.15) 0%,transparent 60%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}

.header{text-align:center;padding:40px 0 35px}
.header-title{display:flex;align-items:center;justify-content:center;gap:12px}
.header h1{font-size:38px;font-weight:900;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.shield{width:34px;height:34px;fill:url(#goldGrad)}
.header p{color:var(--muted);font-size:10px;letter-spacing:5px;margin-top:8px}

.card{background:rgba(15,15,15,0.8);border:1.5px solid var(--border);border-radius:20px;padding:18px;margin-bottom:16px}
.card.dashed{border:1.5px dashed var(--border)}

.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text b{font-size:16px;font-weight:700}
.toggle-text small{font-size:12px;color:var(--muted);display:block;margin-top:4px}
.switch{position:relative;width:58px;height:34px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#1a1a1a;border-radius:34px;cursor:pointer;border:1px solid var(--border)}
.slider:before{content:"";position:absolute;width:28px;height:28px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold)}
input:checked +.slider:before{transform:translateX(24px)}

.select-wrapper{position:relative}
.select-box{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:14px}
.app-icon{width:46px;height:46px;border-radius:15px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:21px}
.arrow{font-size:16px;transition:.3s}
.arrow.rotate{transform:rotate(180deg)}
.dropdown{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:#080808;border:1.5px solid var(--border);border-radius:18px;padding:8px;z-index:999}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:14px;padding:14px;border-radius:12px;cursor:pointer;justify-content:flex-end}
.dropdown-item:hover{background:#151515}

.upload{text-align:center;cursor:pointer}
.upload b{font-size:16px}
.upload small{font-size:12px;color:var(--muted);margin-top:6px;display:block}
.file-name{font-size:13px;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;margin-top:8px}

.input-wrap{display:flex;align-items:center;justify-content:space-between}
.input-pass{background:transparent;border:none;outline:none;color:var(--text);width:85%;text-align:right;font-size:15px}
.eye{font-size:20px;cursor:pointer;user-select:none}

.btn{width:100%;padding:20px;border:none;border-radius:18px;background:var(--gold);color:#000;font-weight:900;font-size:18px;margin-top:10px}
</style>
</head>
<body>
<svg width="0" height="0"><defs><linearGradient id="goldGrad"><stop offset="0%" stop-color="#d4af37"/><stop offset="50%" stop-color="#ffd700"/><stop offset="100%" stop-color="#d4af37"/></linearGradient></defs></svg>

<div class="container">
  <div class="header">
    <div class="header-title">
      <h1>RIM_NEX</h1>
      <svg class="shield" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    </div>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <div class="switch"><input type="checkbox" id="toggleCert" checked><span class="slider"></span></div>
    <div class="toggle-text"><b>شهادة التوقيع الخاصة بي</b><small>استخدم شهادة Apple Developer</small></div>
  </div>

  <div class="card select-wrapper">
    <div class="select-box" id="selectBox">
      <div class="arrow" id="arrow">▼</div>
      <div class="select-left">
        <span id="selectedName">ESign</span>
        <div class="app-icon" id="selectedIcon">E</div>
      </div>
    </div>
