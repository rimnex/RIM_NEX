<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX - IOS SIGNING MANAGER</title>
<style>
:root{--bg:#0d0d0d;--card:#121212;--border:rgba(212,175,55,0.25);--gold:linear-gradient(135deg,#8f6b1f,#d4af37,#f7d774,#b8860b);--gold-solid:#d4af37;--text:#fff;--muted:#888}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
body{background:radial-gradient(ellipse at top,rgba(212,175,55,0.15) 0%,transparent 50%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}
.header{text-align:center;padding:10px 0 30px}
.header h1{font-size:34px;font-weight:900;background:var(--gold);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:1px;display:inline-flex;align-items:center;gap:10px}
.header p{color:var(--muted);font-size:11px;letter-spacing:3px;margin-top:6px}
.card{background:rgba(18,18,18,0.8);border:1px solid var(--border);border-radius:22px;padding:16px;margin-bottom:14px}
.upload-box{border:1.5px dashed var(--border);border-radius:20px;padding:22px 16px;text-align:center;cursor:pointer}
.upload-icon{width:56px;height:56px;border-radius:18px;background:var(--gold);margin:0 auto 10px;display:flex;align-items:center;justify-content:center}
.upload-icon svg{width:26px;height:26px;fill:#000}
.btn{width:100%;padding:15px;border:none;border-radius:18px;background:var(--gold);color:#000;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>RIM_NEX 
      <svg width="30" height="30" viewBox="0 0 24 24"><defs><linearGradient id="g"><stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#f7d774"/></linearGradient></defs><path fill="url(#g)" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    </h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card upload-box">
    <div class="upload-icon"><svg viewBox="0 0 24 24"><path d="M12 2L4 7v10l8 5 8-5V7L12 2z"/></svg></div>
    <div style="font-weight:700">P12 شهادة</div>
    <div style="font-size:12px;color:#888">اسحب الملف هنا</div>
  </div>

  <div class="card upload-box">
    <div class="upload-icon"><svg viewBox="0 0 24 24"><path d="M10 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2h-8l-2-2z"/></svg></div>
    <div style="font-weight:700">Provisioning Profile</div>
    <div style="font-size:12px;color:#888">اسحب الملف هنا</div>
  </div>

  <button class="btn">
    بدء التوقيع
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
  </button>
</div>
</body>
</html>
