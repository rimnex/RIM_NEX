<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
:root{--bg:#0a0a0a;--border:rgba(212,175,55,0.35);--gold:linear-gradient(135deg,#8f6b1f 0%,#d4af37 50%,#f7d774 100%);--text:#fff;--muted:#888;}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display"}
body{background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,0.2) 0%,transparent 70%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}

.header{text-align:center;padding:25px 0 35px}
.header-title{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.shield{width:36px;height:36px}
.shield path{fill:url(#goldGrad)}
.header h1{font-size:36px;font-weight:900;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.header p{color:var(--muted);font-size:11px;letter-spacing:4px}

.card{background:rgba(17,17,17,0.95);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px}
.card.dashed{border:1.5px dashed rgba(212,175,55,0.4)}

.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text b{font-size:15px}
.toggle-text small{font-size:11px;color:var(--muted)}
.switch{position:relative;width:54px;height:32px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#2a2a2a;border-radius:32px;cursor:pointer;transition:.3s}
.slider:before{content:"";position:absolute;width:26px;height:26px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold)}
input:checked +.slider:before{transform:translateX(22px)}

.select-box{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:12px}
.app-icon{width:42px;height:42px;border-radius:14px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:18px}

.dropdown{display:none;background:#0a0a0a;border:1px solid var(--border);border-radius:14px;margin-top:10px;padding:6px}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;cursor:pointer}
.dropdown-item:hover{background:#1a1a1a}

.upload{text-align:center}
.upload b{font-size:15px}
.upload small{font-size:12px;color:var(--muted)}
.file-name{font-size:13px;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;margin-top:6px}

.input-wrap{display:flex;align-items:center;justify-content:space-between}
.input-pass{background:transparent;border:none;outline:none;color:var(--muted);width:90%;text-align:right;font-size:15px}
.eye{font-size:20px;cursor:pointer}

.btn{width:100%;padding:18px;border:none;border-radius:16px;background:var(--gold);color:#000;font-weight:900;font-size:17px;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8f6b1f"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#f7d774"/>
    </linearGradient>
  </defs>
</svg>

<div class="container">
  <div class="header">
    <div class="header-title">
      <svg class="shield" viewBox="0 0 24 24">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
      </svg>
      <h1>RIM_NEX</h1>
    </div>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
    <div class="toggle-text">
      <b>شهادة التوقيع الخاصة بي</b><br>
      <small>استخدم شهادة Apple Developer</small>
    </div>
  </div>

  <div class="card" style="position:relative">
    <div class="select-box" id="selectBox">
      <div>▼</div>
      <div class="select-left">
        <span id="selectedName">ESign</span>
        <div class="app-icon" id="selectedIcon">E</div>
      </div>
    </div>
    <div class="dropdown" id="dropdown">
      <div class="dropdown-item" data-name="ESign" data-icon="E" data-plist="ESign.plist"><div class="app-icon">E</div><span>ESign</span></div>
      <div class="dropdown-item" data-name="KSign" data-icon="K" data-plist="KSign.plist"><div class="app-icon">K</div><span>KSign</span></div>
      <div class="dropdown-item" data-name="Scarlet" data-icon="S" data-plist="Scarlet.plist"><div class="app-icon">S</div><span>Scarlet</span></div>
      <div class="dropdown-item" data-name="GBox" data-icon="G" data-plist="GBox.plist"><div class="app-icon">G</div><span>GBox</span></div>
      <div class="dropdown-item" data-name="Feather" data-icon="F" data-plist="Feather. plist"><div class="app-icon">F</div><span>Feather</span></div>
    </div>
  </div>

  <div class="card dashed upload" id="p12Card">
    <b>شهادة P12</b><br>
    <small>اسحب الملف هنا</small>
    <div class="file-name" id="p12Name"></div>
    <input type="file" id="p12" hidden>
  </div>

  <div class="card dashed upload" id="provCard">
    <b>Provisioning Profile</b><br>
    <small>اسحب الملف هنا</small>
    <div class="file-name" id="provName"></div>
    <input type="file" id="prov" hidden>
  </div>
