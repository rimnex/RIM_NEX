<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA BLACK</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #141414;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }
        h1 {
            text-align: center;
            color: #d4af37;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }
        input[type="text"], select, input[type="password"] {
            width: 100%;
            padding: 10px;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
        }
        .switch-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px;
            background-color: #fff; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #d4af37; }
        input:checked + .slider:before { transform: translateX(26px); }
        .file-upload {
            border: 2px dashed #444;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            background-color: #222;
            margin-bottom: 15px;
        }
        .file-upload:hover { border-color: #d4af37; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #b8860b, #d4af37);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <h1>IPA BLACK</h1>
    
    <div class="form-group switch-group">
        <label>الشهادة المجانية</label>
        <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="form-group">
        <label>تطبيق التوقيع</label>
        <select>
            <option>ESign</option>
            <option>KSign</option>
            <option>Scarlet</option>
            <option>GBox</option>
            <option>Feather</option>
        </select>
    </div>

    <div class="form-group">
        <label>ملف P12</label>
        <div class="file-upload">اضغط لاختيار الشهادة</div>
    </div>

    <div class="form-group">
        <label>ملف Provision</label>
        <div class="file-upload">اضغط لاختيار التكوين</div>
    </div>

    <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" placeholder="أدخل كلمة المرور">
    </div>

    <button>بدء التوقيع</button>
</div>

</body>
</html>
