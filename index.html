<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX - IOS SIGNING MANAGER</title>
<style>
:root{
  --bg:#0d0d0d;
  --card:#141414;
  --border:rgba(212,175,55,0.3);
  --gold:linear-gradient(135deg,#8f6b1f,#d4af37,#f7d774,#b8860b);
  --gold-solid:#d4af37;
  --text:#ffffff;
  --muted:#777;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
body{background:var(--bg);min-height:100vh;padding:20px;color:var(--text);background:radial-gradient(circle at 50% 0%,rgba(212,175,55,0.1) 0%,transparent 50%),var(--bg)}
.container{max-width:430px;margin:0 auto}

.header{text-align:center;padding:20px 0 30px}
.header h1{font-size:32px;font-weight:900;background:var(--gold);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-flex;gap:8px;align-items:center}
.header p{color:var(--muted);font-size:12px;letter-spacing:2px;margin-top:8px}

.card{background:rgba(20,20,20,0.5);border:1px solid var(--border);border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 0 20px rgba(212,175,55,0.1)}

.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text .title{font-size:15px;font-weight:700}
.toggle-text .sub{font-size:11px;color:var(--muted);margin-top:4px}
.switch{position:relative;width:52px;height:30px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#222;border-radius:30px;cursor:pointer;transition:.3s;border:1px solid var(--border)}
.slider:before{content:"";position:absolute;width:24px;height:24px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
input:checked +.slider{background:var(--gold);box-shadow:0 0 15px rgba(212,175,55,0.5)}
input:checked +.slider:before{transform:translateX(22px)}

.upload-box{border:2px dashed var(--border);border-radius:20px;padding:24px 16px;text-align:center;cursor:pointer;transition:.3s}
.upload-box:hover{border-color:var(--gold-solid);background:rgba(212,175,55,0.05)}
.upload-icon{width:60px;height:60px;border-radius:20px;background:var(--gold);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 25px rgba(212,175,55,0.4)}
.upload-icon svg{width:28px;height:28px;fill:#000}
.upload-box .title{font-size:16px;font-weight:700;margin-bottom:6px}
.upload-box .sub{font-size:12px;color:var(--muted)}
.file-name{font-size:12px;color:var(--gold-solid);margin-top:8px}

.input-pass-wrap{background:#0f0f0f;border:1px solid var(--border);border-radius:20px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.input-pass{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px}
.pass-icons{display:flex;gap:12px;align-items:center}
.pass-icons svg{width:20px;height:20px;fill:var(--muted);cursor:pointer}
.pass-icons .lock{fill:var(--gold-solid)}

.btn{width:100%;padding:16px;border:none;border-radius:20px;background:var(--gold);color:#000;font-weight:800;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 25px rgba(212,175,55,0.4)}
.btn:active{transform:scale(.97)}

.select-box{background:#0f0f0f;border:1px solid var(--border);border-radius:20px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:16px}
.select-left{display:flex;align-items:center;gap:10px}
.app-icon{width:32px;height:32px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:800;font-size:12px}
.dropdown{position:absolute;background:#111;border:1px solid var(--border);border-radius:18px;padding:8px;width:calc(100% - 40px);z-index:10;display:none;margin-top:8px}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;cursor:pointer}
.dropdown-item:hover{background:#1a1a1a}

.progress{height:6px;background:#1f1f1f;border-radius:10px;overflow:hidden;margin:12px 0;display:none}
.progress-bar{height:100%;width:0;background:var(--gold);transition:width.3s}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--border);padding:12px 20px;border-radius:14px;opacity:0;transition:.4s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>

    <p>IOS SIGNING MANAGER</p>
  </div>

    </div>
