<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX - iOS Signing Manager</title>
<style>
:root{
  --bg:#0d0d0d;
  --card:#141414;
  --glass:rgba(20,20,20,0.6);
  --gold:linear-gradient(135deg,#d4af37 0%,#f9e076 50%,#b8860b 100%);
  --text:#e5e5e5;
  --muted:#8a8a8a;
  --border:rgba(212,175,55,0.15);
  --radius:18px;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:24px;background-image:radial-gradient(circle at 20% 20%,rgba(212,175,55,0.08) 0,transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,175,55,0.06) 0,transparent 50%);}

.container{width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px}

header{text-align:center;padding:20px 0;animation:fadeDown 0.6s ease}
header h1{font-size:28px;font-weight:700;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--muted);font-size:14px;margin-top:4px}

.card{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:fadeUp 0.6s ease}

.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle-row label{font-weight:600;font-size:15px}
.switch{position:relative;width:52px;height:30px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#2a2a2a;border-radius:30px;cursor:pointer;transition:0.3s}
.slider:before{content:"";position:absolute;width:24px;height:24px;left:3px;top:3px;background:#fff;border-radius:50%;transition:0.3s}
input:checked + .slider{background:var(--gold)}
input:checked + .slider:before{transform:translateX(22px)}

.field{margin-top:16px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
