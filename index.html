<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA BLACK</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            color: #d4af37;
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #a3a3a3;
            font-size: 12px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d1d5db;
            font-size: 14px;
        }

        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #374151;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #d4af37;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        select, input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }

        .file-upload {
            border: 2px dashed #4b5563;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            background-color: #2a2a2a;
            text-align: center;
            color: #9ca3af;
            transition: border-color 0.3s;
        }

        .file-upload:hover {
            border-color: #d4af37;
        }

        .file-upload span {
            display: block;
            font-size: 13px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #b8860b, #d4af37);
            color: #000000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IPA BLACK</h1>
    <div class="subtitle">PREMIUM CLOUD SIGNER</div>

    <div class="input-group switch-container">
        <label>الشهادة المجانية</label>
        <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="input-group">
        <label>تطبيق التوقيع</label>
        <select>
            <option>ESign</option>
            <option>KSign</option>
            <option>Scarlet</option>
            <option>GBox</option>
            <option>Feather</option>
        </select>
    </div>

    <div class="input-group">
        <label>ملف P12</label>
        <div class="file-upload">
            اضغط لاختيار الشهادة
            <span>(اضغط هنا لرفع الملف)</span>
        </div>
    </div>

    <div class="input-group">
        <label>ملف Provision</label>
        <div class="file-upload">
            اضغط لاختيار التكوين
            <span>(اضغط هنا لرفع الملف)</span>
        </div>
    </div>

    <div class="input-group">
        <label>كلمة المرور</label>
        <input type="password" placeholder="أدخل كلمة المرور">
    </div>

    <button>بدء التوقيع</button>
</div>

</body>
</html>
