<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RIM_NEX - iOS Signing</title>
<style>
*{
  margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}
body{
  background:radial-gradient(ellipse at 50% -30%,rgba(212,175,55,0.25) 0%,#000 65%),#000;
  min-height:100vh;padding:20px;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}
.container{max-width:430px;margin:0 auto}
.header{text-align:center;padding:45px 0 30px}
.header h1{
  font-size:42px;font-weight:900;
  background:linear-gradient(180deg,#FFD700 0%,#D4AF37 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:12px;letter-spacing:1px
}
.shield{width:40px;height:40px;flex-shrink:0}
.header p{color:#999;font-size:11px;letter-spacing:7px;margin-top:10px;font-weight:600}

.card{
  background:rgba(12,12,12,0.95);border:2px solid #D4AF37;
  border-radius:20px;padding:20px;margin-bottom:16px;
  backdrop-filter:blur(10px)
}
.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-info{text-align:right}
.toggle-info b{font-size:16px;display:block}
.toggle-info small{font-size:12px;color:#aaa;margin-top:5px;display:block}
.switch{
  width:56px;height:34px;background:linear-gradient(180deg,#FFD700,#D4AF37);
  border-radius:34px;position:relative;flex-shrink:0;cursor:pointer
}
.switch::after{
  content:"";width:28px;height:28px;background:#fff;border-radius:50%;
  position:absolute;right:3px;top:3px;transition:0.3s
}

.select{display:flex;justify-content:space-between;align-items:center}
.select-left{display:flex;align-items:center;gap:14px}
.select-icon{
  width:48px;height:48px;border-radius:16px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);
  display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:22px
}

.upload{border:2px dashed #D4AF37;text-align:center;cursor:pointer;padding:25px 20px;transition:0.3s}
.upload:hover{background:rgba(212,175,55,0.08)}
.upload-icon{
  width:58px;height:58px;margin:0 auto 12px;border-radius:18px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);
  display:flex;align-items:center;justify-content:center;font-size:28px;color:#000;font-weight:900
}
.upload b{font-size:17px;display:block}
.upload small{font-size:13px;color:#aaa;margin-top:6px;display:block}
.file-name{color:#FFD700;font-size:13px;margin-top:8px;font-weight:600}

.input{display:flex;justify-content:space-between;align-items:center}
.input input{
  background:transparent;border:none;color:#fff;width:85%;
  text-align:right;font-size:16px;outline:none;padding:2px 0
}
.eye{cursor:pointer;font-size:20px}

.btn{
  width:100%;padding:20px;border:none;border-radius:18px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);
  color:#000;font-weight:900;font-size:18px;margin-top:15px;cursor:pointer;
  transition:0.2s;letter-spacing:0.5px
}
.btn:active{transform:scale(0.97)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>
      <svg class="shield" viewBox="0 0 24 24" fill="url(#g)">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FFD700"/>
          <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient></defs>
        <path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4z"/>
      </svg>
      RIM_NEX
    </h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <div class="toggle-info">
      <b>شهادة التوقيع الخاصة بي</b>
      <small>استخدم شهادة Apple Developer</small>
    </div>
    <div class="switch"></div>
  </div>

  <div class="card select">
    <div class="select-left">
      <span>ESign</span>
      <div class="select-icon">E</div>
    </div>
    <div style="font-size:20px">▼</div>
  </div>

  <div class="card upload" onclick="pickFile('p12')">
    <div class="upload-icon">✦</div>
    <b>P12 شهادة</b>
    <small>اسحب الملف هنا أو اضغط للتصفح</small>
    <div class="file-name" id="p12-name"></div>
  </div>

  <div class="card upload" onclick="pickFile('prov')">
    <div class="upload-icon">📁</div>
    <b>Provisioning Profile</b>
    <small>اسحب الملف هنا أو اضغط للتصفح</small>
    <div class="file-name" id="prov-name"></div>
  </div>

  <div class="card input">
