<script>

let selectedPlist = "ESign.plist"; // الافتراضي ESign

document.getElementById('selectBox').onclick = (e) => {e.stopPropagation(); document.getElementById('dropdown').classList.toggle('show'); document.getElementById('arrow').classList.toggle('rotate');}
document.querySelectorAll('.dropdown-item').forEach(item => {
  item.onclick = (e) => {
    e.stopPropagation();
    document.getElementById('selectedName').textContent = item.dataset.name;
    document.getElementById('selectedIcon').textContent = item.dataset.icon;
    selectedPlist = item.dataset.plist;
    selectedIpa = item.dataset.ipa;
    document.getElementById('dropdown').classList.remove('show');
    document.getElementById('arrow').classList.remove('rotate');
  }
});
document.onclick = () => {document.getElementById('dropdown').classList.remove('show'); document.getElementById('arrow').classList.remove('rotate');}
