<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
:root{
  --bg:#000;
  --border:#d4af37;
  --gold:linear-gradient(135deg,#b8860b 0%,#ffd700 50%,#b8860b 100%);
  --text:#fff;
  --muted:#666;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont}
body{background:radial-gradient(ellipse at 50% -5%,rgba(212,175,55,0.25) 0%,transparent 70%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}

.header{text-align:center;padding:45px 0 40px}
.header-title{display:flex;align-items:center;justify-content:center;gap:12px}
.shield{width:36px;height:36px}
.shield path{fill:url(#goldGrad)}
.header h1{font-size:40px;font-weight:900;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1.5px}
.header p{color:var(--muted);font-size:10px;letter-spacing:5px;margin-top:10px;text-transform:uppercase}

.card{background:transparent;border:2px solid var(--border);border-radius:24px;padding:20px;margin-bottom:18px}
.card.dashed{border:2px dashed var(--border)}

.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text b{font-size:16px;font-weight:700}
.toggle-text small{font-size:12px;color:var(--muted);display:block;margin-top:4px}
.switch{position:relative;width:58px;height:36px;flex-shrink:0}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#0a0a0a;border-radius:36px;cursor:pointer;transition:.3s;border:1.5px solid var(--border)}
.slider:before{content:"";position:absolute;width:30px;height:30px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold)}
input:checked +.slider:before{transform:translateX(22px)}

.select-box{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:14px}
.app-icon{width:46px;height:46px;border-radius:15px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:21px}
.arrow{font-size:16px;color:#fff}
.dropdown{display:none;background:#000;border:2px solid var(--border);border-radius:20px;margin-top:12px;padding:8px}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;cursor:pointer;justify-content:flex-end}
.dropdown-item:hover{background:#0a0a0a}

.upload{text-align:center}
.upload b{font-size:16px;font-weight:700}
.upload small{font-size:12px;color:var(--muted);margin-top:6px;display:block}
.file-name{font-size:13px;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;margin-top:8px}
