<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX - IOS SIGNING MANAGER</title>
<style>
:root{--bg:#0d0d0d;--card:#121212;--border:rgba(212,175,55,0.25);--gold:linear-gradient(135deg,#8f6b1f,#d4af37,#f7d774,#b8860b);--gold-solid:#d4af37;--text:#fff;--muted:#888}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
body{background:radial-gradient(ellipse at top,rgba(212,175,55,0.15) 0%,transparent 50%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}
.header{text-align:center;padding:10px 0 30px}
.header h1{font-size:34px;font-weight:900;background:var(--gold);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-flex;align-items:center;gap:10px}
.header p{color:var(--muted);font-size:11px;letter-spacing:3px;margin-top:6px}
.card{background:rgba(18,18,18,0.8);border:1px solid var(--border);border-radius:22px;padding:16px;margin-bottom:14px}
.toggle{display:flex;justify-content:space-between;align-items:center}
.switch{position:relative;width:54px;height:32px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#1f1f1f;border-radius:32px;cursor:pointer;border:1px solid var(--border)}
.slider:before{content:"";position:absolute;width:26px;height:26px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold)}
input:checked +.slider:before{transform:translateX(22px)}
.select-box{background:#0f0f0f;border:1px solid var(--border);border-radius:18px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.app-icon{width:36px;height:36px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900}
.dropdown{position:absolute;background:#111;border:1px solid var(--border);border-radius:16px;padding:6px;z-index:10;display:none;width:calc(100% - 40px)}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;cursor:pointer}
.dropdown-item:hover{background:#1a1a1a}
.upload-box{border:1.5px dashed var(--border);border-radius:20px;padding:22px 16px;text-align:center;cursor:pointer}
.input-wrap{background:#0f0f0f;border:1px solid var(--border);border-radius:18px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.input-pass{flex:1;background:transparent;border:none;outline:none;color:var(--text)}
.pass-icons{display:flex;gap:14px}
.pass-icons svg{width:20px;height:20px;fill:var(--muted);cursor:pointer}
.pass-icons.lock{fill:var(--gold-solid)}
.btn{width:100%;padding:15px;border:none;border-radius:18px;background:var(--gold);color:#000;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.progress{height:5px;background:#1f1f1f;border-radius:10px;overflow:hidden;margin:12px 0;display:none}
.progress-bar{height:100%;width:0;background:var(--gold)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--border);padding:12px 20px;border-radius:14px;opacity:0;transition:.4s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>RIM_NEX <svg width="30" height="30" viewBox="0 0 24 24"><defs><linearGradient id="g"><stop stop-color="#d4af37"/><stop offset="1" stop-color="#f7d774"/></linearGradient></defs><path fill="url(#g)" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
    <div><div style="font-weight:700">شهادة التوقيع الخاصة بي</div><div style="font-size:11px;color:#888">استخدم شهادة Apple Developer</div></div>
  </div>

  <div class="card select-wrap" style="position:relative">
    <div class="select-box" id="selectBox">
      <div>▼</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="selectedName">ESign</span>
        <div class="app-icon" id="selectedIcon">E</div>
      </div>
    </div>
    <div class="dropdown" id="dropdown">
      <div class="dropdown-item" data-name="ESign" data-icon="E" data-plist="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/esign.plist" data-ipa="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/ESign.ipa"><div class="app-icon">E</div><span>ESign</span></div>
      <div class="dropdown-item" data-name="KSign" data-icon="K" data-plist="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/ksign.plist" data-ipa="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/KSign.ipa"><div class="app-icon">K</div><span>KSign</span></div>
      <div class="dropdown-item" data-name="Scarlet" data-icon="S" data-plist="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/scarlet.plist" data-ipa="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/Scarlet.ipa"><div class="app-icon">S</div><span>Scarlet</span></div>
      <div class="dropdown-item" data-name="GBox" data-icon="G" data-plist="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/gbox.plist" data-ipa="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/GBox.ipa"><div class="app-icon">G</div><span>GBox</span></div>
      <div class="dropdown-item" data-name="Feather" data-icon="F" data-plist="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/feather.plist" data-ipa="https://raw.githubusercontent.com/rimnex/RIM_NEX/main/Feather.ipa"><div class="app-icon">F</div><span>Feather</span></div>
    </div>
  </div>

  <div class="card upload-box" id="p12Box"><div style="font-weight:700">P12 شهادة</div><div style="font-size:12px;color:#888">اسحب الملف هنا</div><div id="p12Name"></div><input type="file" id="p12File" hidden></div>
  <div class="card upload-box" id="provBox"><div style="font-weight:700">Provisioning Profile</div><div style="font-size:12px;color:#888">اسحب الملف هنا</div><div id="provName"></div><input type="file" id="provFile" hidden></div>

  <div class="input-wrap">
    <div class="pass-icons">
      <svg id="togglePass" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/></svg>
      <svg class="lock" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <input type="password" class="input-pass" id="password" placeholder="Password">
  </div>

  <div class="progress" id="progress"><div class="progress-bar" id="bar"></div></div>
  <button class="btn" id="signBtn">بدء التوقيع والتثبيت <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg></button>
</div>
<div class="toast" id="toast"></div>

<script>
let selectedPlist = "https://raw.githubusercontent.com/rimnex/RIM_NEX/main/esign.plist";
let selectedIpa = "https://raw.githubusercontent.com/rimnex/RIM_NEX/main/ESign.ipa";

// Select
document.getElementById('selectBox').onclick = (e) => {e.stopPropagation(); document.getElementById('dropdown').classList.toggle('show');}
document.querySelectorAll('.dropdown-item').forEach(item => {
  item.onclick = (e) => {
    e.stopPropagation();
    document.getElementById('selectedName').textContent = item.dataset.name;
    document.getElementById('selectedIcon').textContent = item.dataset.icon;
    selectedPlist = item.dataset.plist;
    selectedIpa = item.dataset.ipa;
    showToast('تم اختيار ' + item.dataset.name,'success');
    document.getElementById('dropdown').classList.remove('show');
  }
});
document.onclick = () => document.getElementById('dropdown').classList.remove('show');

// Upload
document.getElementById('p12Box').onclick = () => document.getElementById('p12File').click();
document.getElementById('p12File').onchange = () => { if(document.getElementById('p12File').files[0]) document.getElementById('p12Name').textContent = '✓ ' + document.getElementById('p12File').files[0].name; }
document.getElementById('provBox').onclick = () => document.getElementById('provFile').click();
document.getElementById('provFile').onchange = () => { if(document.getElementById('provFile').files[0]) document.getElementById('provName').textContent = '✓ ' + document.getElementById('provFile').files[0].name; }

// Password toggle
document.getElementById('togglePass').onclick = () => {
  const pass = document.getElementById('password');
  pass.type = pass.type === 'password'? 'text' : 'password';
}

// Sign
document.getElementById('signBtn').onclick = () => {
  if(!document.getElementById('p12File').files[0] ||!document.getElementById('provFile').files[0] ||!document.getElementById('password').value){
    showToast('الرجاء اكمال جميع الحقول','error'); return;
  }
  document.getElementById('progress').style.display = 'block';
  let w = 0;
  let int = setInterval(()=>{
    w += 10;
    document.getElementById('bar').style.width = w + '%';
    if(w >= 100){
      clearInterval(int);
      // تحميل الاثنين
      window.open(selectedPlist, '_blank');
      setTimeout(()=>{window.open(selectedIpa, '_blank')}, 1000);
      showToast('جاري تحميل ملفات التثبيت','success');
      setTimeout(()=>{document.getElementById('progress').style.display='none';document.getElementById('bar').style.width='0'},1000);
    }
  },200);
};

function showToast(msg,type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  t.style.borderColor = type=='success'?'#2ecc71':'#e74c3c';
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
