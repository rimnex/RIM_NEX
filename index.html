<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RIM_NEX - IOS SIGNING MANAGER</title>
<style>
:root{
  --bg:#0a0a0a;
  --card:#111;
  --border:rgba(212,175,55,0.3);
  --gold:linear-gradient(135deg,#8f6b1f 0%,#d4af37 50%,#f7d774 100%);
  --gold-solid:#d4af37;
  --text:#fff;
  --muted:#999;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
body{background:radial-gradient(ellipse at top,rgba(212,175,55,0.12) 0%,transparent 60%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}

/* Header */
.header{text-align:center;padding:15px 0 35px}
.header .shield{font-size:40px;margin-bottom:8px;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header h1{font-size:36px;font-weight:900;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.header p{color:var(--muted);font-size:12px;letter-spacing:4px;margin-top:8px}

/* Card */
.card{background:rgba(17,17,17,0.9);border:1px solid var(--border);border-radius:24px;padding:18px;margin-bottom:16px;backdrop-filter:blur(10px)}
.card.upload{border:1.8px dashed var(--border);transition:.3s}
.card.upload.filled{border:1.8px solid var(--gold-solid);background:rgba(212,175,55,0.08);box-shadow:0 0 20px rgba(212,175,55,0.2)}

/* Toggle */
.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text .title{font-size:15px;font-weight:700;margin-bottom:4px}
.toggle-text .sub{font-size:11px;color:var(--muted)}
.switch{position:relative;width:56px;height:34px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#1a1a1a;border-radius:34px;cursor:pointer;transition:.3s;border:1px solid var(--border)}
.slider:before{content:"";position:absolute;width:28px;height:28px;left:3px;top:2px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold);box-shadow:0 0 20px rgba(212,175,55,0.5)}
input:checked +.slider:before{transform:translateX(22px)}

/* Select */
.select-box{background:#0a0a0a;border:1px solid var(--border);border-radius:18px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:12px}
.app-icon{width:38px;height:38px;border-radius:12px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:15px;box-shadow:0 0 15px rgba(212,175,55,0.4)}
.arrow{transition:.3s;color:var(--gold-solid)}
.arrow.rotate{transform:rotate(180deg)}
.dropdown{position:absolute;margin-top:8px;width:calc(100% - 40px);background:#0a0a0a;border:1px solid var(--border);border-radius:16px;padding:6px;z-index:10;display:none}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;cursor:pointer}
.dropdown-item:hover{background:#1a1a1a}

/* Upload */
.upload-box{text-align:center;cursor:pointer}
.upload-title{font-size:16px;font-weight:700;margin-bottom:6px}
.upload-sub{font-size:12px;color:var(--muted)}
.file-name{font-size:13px;color:var(--gold-solid);margin-top:10px;font-weight:600;display:none;word-break:break-all}
.file-name.show{display:block}

/* Password */
.input-wrap{background:#0a0a0a;border:1px solid var(--border);border-radius:18px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between}
.input-pass{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;text-align:right}
.pass-icons svg{width:20px;height:20px;fill:var(--muted);cursor:pointer}

/* Button */
.btn{width:100%;padding:17px;border:none;border-radius:18px;background:var(--gold);color:#000;font-weight:900;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 8px 25px rgba(212,175,55,0.4)}
.btn:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="shield">🛡️</div>
    <h1>RIM_NEX</h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <label class="switch">
      <input type="checkbox" checked>
      <span class="slider"></span>
    </label>
    <div class="toggle-text">
      <div class="title">شهادة التوقيع الخاصة بي</div>
      <div class="sub">استخدم شهادة Apple Developer</div>
    </div>
  </div>

  <div class="card" style="position:relative">
    <div class="select-box" id="selectBox">
      <div class="arrow" id="arrow">▼</div>
      <div class="select-left">
        <span id="selectedName">Scarlet</span>
        <div class="app-icon" id="selectedIcon">S</div>
      </div>
    </div>
    <div class="dropdown" id="dropdown">
      <div class="dropdown-item" data-name="ESign" data-icon="E" data-plist="esign.plist" data-ipa="ESign.ipa"><div class="app-icon">E</div><span>ESign</span></div>
      <div class="dropdown-item" data-name="KSign" data-icon="K" data-plist="ksign.plist" data-ipa="KSign.ipa"><div class="app-icon">K</div><span>KSign</span></div>
      <div class="dropdown-item" data-name="Scarlet" data-icon="S" data-plist="scarlet.plist" data-ipa="Scarlet.ipa"><div class="app-icon">S</div><span>Scarlet</span></div>
      <div class="dropdown-item" data-name="GBox" data-icon="G" data-plist="gbox.plist" data-ipa="GBox.ipa"><div class="app-icon">G</div><span>GBox</span></div>
      <div class="dropdown-item" data-name="Feather" data-icon="F" data-plist="feather.plist" data-ipa="Feather.ipa"><div class="app-icon">F</div><span>Feather</span></div>
    </div>
  </div>

  <div class="card upload" id="p12Card" onclick="document.getElementById('p12').click()">
    <div class="upload-box">
      <div class="upload-title">P12 شهادة</div>
      <div class="upload-sub">اسحب الملف هنا</div>
      <div class="file-name" id="p12Name"></div>
    </div>
    <input type="file" id="p12" accept=".p12,.cer,.pfx" capture="filesystem" hidden>
  </div>

  <div class="card upload" id="provCard" onclick="document.getElementById('prov').click()">
    <div class="upload-box">
      <div class="upload-title">Provisioning Profile</div>
      <div class="upload-sub">اسحب الملف هنا</div>
      <div class="file-name" id="provName"></div>
    </div>
    <input type="file" id="prov" accept=".mobileprovision" capture="filesystem" hidden>
  </div>

  <div class="card input-wrap">
    <div class="pass-icons">
      <svg id="togglePass" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    </div>
    <input type="password" class="input-pass" id="password" placeholder="Password">
  </div>

  <button class="btn" id="signBtn">
    بدء التوقيع والتثبيت
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
  </button>
</div>

<script>
const baseUrl = "https://raw.githubusercontent.com/rimnex/RIM_NEX/main/";
let selectedPlist = "scarlet.plist";
let selectedIpa = "Scarlet.ipa";

// Select
document.getElementById('selectBox').onclick = (e) => {e.stopPropagation(); document.getElementById('dropdown').classList.toggle('show'); document.getElementById('arrow').classList.toggle('rotate');}
