<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX - Gold</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070707;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px 14px;font-family:system-ui,-apple-system,'Cairo',Arial,sans-serif;color:#EDE8D8}
.card{width:100%;max-width:390px;background:#16130E;border:1px solid rgba(212,175,55,0.22);border-radius:26px;padding:24px 18px 18px;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
.title-row{display:flex;align-items:center;justify-content:center;gap:10px}
h1{font-size:34px;font-weight:900;color:#E9C86A}
.shield{width:32px;height:32px;border-radius:9px;background:linear-gradient(180deg,#FFFFFF 0%,#D1D5DB 45%,#9CA3AF 100%);display:grid;place-items:center;border:1px solid #E5E7EB;font-size:17px}
.sub{text-align:center;color:#8F8A7E;font-size:11.5px;letter-spacing:1px;margin:6px 0 22px}
.box{background:#201D14;border:1px solid rgba(212,175,55,0.13);border-radius:15px;padding:13px 14px;margin-bottom:11px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.toggle-row span{font-size:13.5px;font-weight:700;color:#E6DDC2}
.switch{width:50px;height:28px;background:#2B2920;border-radius:28px;position:relative;transition:.25s;border:1px solid rgba(255,255,255,0.06)}
.switch::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;right:2px;transition:.25s}
.switch.on{background:linear-gradient(90deg,#FDE68A,#D4AF37 60%,#8C6B14)}
.switch.on::after{transform:translateX(-22px);background:#111}
.label{color:#A69F8E;font-size:11.5px;margin:16px 4px 7px}
.select-wrap{position:relative}
.select{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.select-right{display:flex;align-items:center;gap:10px}
.badge{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#FFF2A8,#D4AF37 55%,#9C7A14);color:#1A1400;display:grid;place-items:center;font-weight:800;font-size:16px}
#app-name{font-size:14px;font-weight:700;color:#E8DCC0}
.arrow{color:#6A665C;font-size:10px;transition:.2s}
.select.open.arrow{transform:rotate(180deg)}
.dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;left:0;background:#1D1A12;border:1px solid rgba(212,175,55,0.18);border-radius:14px;overflow:hidden;z-index:20}
.dropdown.show{display:block}
.dropdown-item{padding:11px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;color:#CFC6B0;font-size:13.5px;font-weight:600}
.dropdown-item.active{background:rgba(212,175,55,0.13);color:#FFE99A}
.upload{border:1.5px dashed rgba(212,175,55,0.28);border-radius:14px;padding:18px 12px;text-align:center;color:#9A9588;font-size:13px;cursor:pointer;margin-bottom:11px;display:block;background:#1C1911}
.file-name{color:#FFEB85;font-size:10.5px;margin-top:7px;display:none;background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.18);padding:5px 8px;border-radius:7px}
.input-wrap input{width:100%;background:#201D14;border:1px solid rgba(212,175,55,0.14);border-radius:14px;padding:13px 14px;color:#fff;text-align:right;font-size:13.5px;outline:none}
.btn{width:100%;display:block;background:linear-gradient(90deg,#FFF0A0 0%,#FFDF6E 20%,#D4AF37 50%,#B78E1E 90%);border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:800;color:#1A1400;cursor:pointer}
.btn:disabled{opacity:0.7}
.tg{margin-top:11px;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;background:#1C1911;border:1px solid rgba(212,175,55,0.16);border-radius:13px;padding:11px;color:#B8B0A0;text-decoration:none;font-size:12.5px;font-weight:700}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);background:#221E15;color:#F5E9C0;padding:10px 14px;border-radius:10px;font-size:12px;opacity:0;transition:.3s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{margin-top:10px;text-align:center;color:#8E8878;font-size:11px;background:rgba(212,175,55,0.06);border:1px dashed rgba(212,175,55,0.18);border-radius:10px;padding:8px 10px;display:none}
input[type=file]{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="title-row"><h1>RIM_NEX</h1><div class="shield">🛡️</div></div>
  <div class="sub">IPA Signing Center</div>
  <div class="box toggle-row" id="toggleBox"><div class="switch on" id="sw"></div><span>الشهادة المجانية</span></div>
  <div class="label">اختر تطبيق التوقيع</div>
  <div class="select-wrap">
    <div class="box select" id="selBtn"><span class="arrow">▼</span><div class="select-right"><span id="appName">ESign</span><div class="badge" id="appBadge">E</div></div></div>
    <div class="dropdown" id="dd">
      <div class="dropdown-item active" data-l="E" data-n="ESign"><div class="badge">E</div> ESign</div>
      <div class="dropdown-item" data-l="K" data-n="KSign"><div class="badge">K</div> KSign</div>
      <div class="dropdown-item" data-l="S" data-n="Scarlet"><div class="badge">S</div> Scarlet</div>
      <div class="dropdown-item" data-l="G" data-n="GBox"><div class="badge">G</div> GBox</div>
      <div class="dropdown-item" data-l="F" data-n="Feather"><div class="badge">F</div> Feather</div>
    </div>
  </div>
  <label class="upload" id="a1" for="p12">📁 اضغط لرفع P12 Certificate<div class="file-name" id="n1"></div></label>
  <input type="file" id="p12" accept=".p12,.pfx">
  <label class="upload" id="a2" for="mob">📄 اضغط لرفع Provision Profile<div class="file-name" id="n2"></div></label>
  <input type="file" id="mob" accept=".mobileprovision">
  <div class="input-wrap"><input type="password" id="pw" placeholder="كلمة سر الشهادة" required></div>
  <button class="btn" id="go">بدء التوقيع</button>
  <div class="note" id="note">إذا لم تظهر نافذة التثبيت، افتح الصفحة في <b>Safari</b> وليس داخل تليجرام.</div>
  <a class="tg" href="https://t.me/ChatPUBG_RIM" target="_blank">قناتي تلجرام</a>
</div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
const selBtn=$('selBtn'),dd=$('dd'),badge=$('appBadge'),appName=$('appName');
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
selBtn.onclick=e=>{e.stopPropagation();dd.classList.toggle('show');selBtn.classList.toggle('open')};
document.querySelectorAll('.dropdown-item').forEach(it=>{it.onclick=e=>{e.stopPropagation();badge.textContent=it.dataset.l;appName.textContent=it.dataset.n;document.querySelectorAll('.dropdown-item').forEach(x=>x.classList.remove('active'));it.classList.add('active');dd.classList.remove('show');selBtn.classList.remove('open');toast('تم اختيار '+it.dataset.n)}});
document.addEventListener('click',()=>{dd.classList.remove('show');selBtn.classList.remove('open')});
function bind(id1,id2,id3){const i=$(id1),n=$(id2),a=$(id3);i.onchange=e=>{const f=e.target.files[0];if(f){n.textContent='✦ '+f.name;n.style.display='block';a.style.borderColor='#D4AF37'}}}
bind('p12','n1','a1');bind('mob','n2','a2');
const plistMap={'ESign':'https://rim-nex.vercel.app/ESign.plist','KSign':'https://rim-nex.vercel.app/KSign.plist','Scarlet':'https://rim-nex.vercel.app/Scarlet.plist','GBox':'https://rim-nex.vercel.app/GBox.plist','Feather':'https://rim-nex.vercel.app/Feather.plist'};
$('go').onclick=()=>{
  const a=$('p12').files[0],b=$('mob').files[0],p=$('pw').value.trim();
  if(!a||!b){toast('يرجى رفع الملفين');return}
  if(!p){toast('كلمة السر مطلوبة');return}
  const btn=$('go');const app=appName.textContent.trim();const url=plistMap[app];
  btn.disabled=true;btn.textContent='جاري التوقيع...';
  setTimeout(()=>{toast('تم التوقيع بواسطة '+app+' ✓ جاري التثبيت...');$('note').style.display='block';setTimeout(()=>{window.location.href='itms-services://?action=download-manifest&url='+encodeURIComponent(url);btn.disabled=false;btn.textContent='بدء التوقيع'},600)},1200);
};
</script>
</body>
</html>
