<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
body{margin:0;background:#0d0d0d;color:#fff;font-family:-apple-system,sans-serif;padding:20px}
.container{max-width:430px;margin:0 auto}
h1{text-align:center;font-size:32px;background:linear-gradient(135deg,#d4af37,#f7d774);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.subtitle{text-align:center;color:#888;font-size:12px;margin-bottom:30px;letter-spacing:2px}
.card{background:#121212;border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:16px;margin-bottom:14px}
select{width:100%;background:#0f0f0f;border:1px solid rgba(212,175,55,0.3);color:#fff;padding:12px;border-radius:12px;font-size:15px}
.upload{border:2px dashed rgba(212,175,55,0.3);border-radius:16px;padding:20px;text-align:center;cursor:pointer}
.upload:hover{border-color:#d4af37}
input[type="password"]{width:100%;background:#0f0f0f;border:1px solid rgba(212,175,55,0.3);color:#fff;padding:14px;border-radius:12px}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#d4af37,#f7d774);border:none;border-radius:16px;color:#000;font-weight:900;font-size:16px;margin-top:20px;cursor:pointer}
.btn:active{transform:scale(0.98)}
</style>
</head>
<body>
<div class="container">
  <h1>RIM_NEX 🛡️</h1>
  <p class="subtitle">IOS SIGNING MANAGER</p>

  <div class="card">
    <label>اختر التطبيق</label>
    <select id="appSelect">
      <option value="esign.plist|ESign.ipa">ESign</option>
      <option value="ksign.plist|KSign.ipa">KSign</option>
      <option value="scarlet.plist|Scarlet.ipa">Scarlet</option>
      <option value="gbox.plist|GBox.ipa">GBox</option>
      <option value="feather.plist|Feather.ipa">Feather</option>
    </select>
  </div>

  <div class="card upload" onclick="document.getElementById('p12').click()">
    <div>📄 P12 شهادة</div>
    <div id="p12Name" style="font-size:12px;color:#d4af37;margin-top:5px"></div>
    <input type="file" id="p12" hidden>
  </div>

  <div class="card upload" onclick="document.getElementById('prov').click()">
    <div>📁 Provisioning Profile</div>
    <div id="provName" style="font-size:12px;color:#d4af37;margin-top:5px"></div>
    <input type="file" id="prov" hidden>
  </div>

  <div class="card">
    <input type="password" id="password" placeholder="Password">
  </div>

  <button class="btn" onclick="startSign()">✒️ بدء التوقيع والتثبيت</button>
</div>

<script>
const baseUrl = "https://raw.githubusercontent.com/rimnex/RIM_NEX/main/";

document.getElementById('p12').onchange = e => {
  if(e.target.files[0]) document.getElementById('p12Name').textContent = '✓ ' + e.target.files[0].name
}
document.getElementById('prov').onchange = e => {
  if(e.target.files[0]) document.getElementById('provName').textContent = '✓ ' + e.target.files[0].name
}

function startSign(){
  if(!document.getElementById('p12').files[0] ||!document.getElementById('prov').files[0] ||!document.getElementById('password').value){
    alert('الرجاء اكمال جميع الحقول');
    return;
  }

  const [plist, ipa] = document.getElementById('appSelect').value.split('|');

  // تحميل ملف الplist الاول
  window.location.href = baseUrl + plist;

  // بعد ثانيتين يحمل الipa
  setTimeout(()=>{
    window.location.href = baseUrl + ipa;
  }, 2000);

  alert('جاري تحميل ملفات التثبيت');
}
