<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX Signer</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .signer-container {
            background-color: #121212;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a2a;
            box-sizing: border-box;
        }
        .title {
            text-align: center;
            color: #d4af37;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }
        .file-upload {
            border: 2px dashed #d4af37;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
            background-color: #1a1a1a;
        }
        .file-upload:hover {
            background-color: #222;
        }
        .file-upload input {
            display: none;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #1a1a1a;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        .telegram-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="signer-container">
    <div class="title">RIM_NEX</div>
    <div class="subtitle">CLOUD SIGNER</div>

    <div class="form-group">
        <label>ملف P12</label>
        <div class="file-upload" onclick="document.getElementById('p12-file').click()">
            اضغط لاختيار الشهادة
            <input type="file" id="p12-file" accept=".p12">
        </div>
    </div>

    <div class="form-group">
        <label>ملف Provision</label>
        <div class="file-upload" onclick="document.getElementById('provision-file').click()">
            اضغط لاختيار التكوين
            <input type="file" id="provision-file" accept=".mobileprovision">
        </div>
    </div>

    <div class="form-group">
        <label>كلمة المرور للشهادة</label>
        <input type="password" class="input-field" placeholder="أدخل كلمة المرور">
    </div>

    <button class="submit-btn">بدء التوقيع</button>

    <a href="https://t.me/PUBG_RIM" target="_blank" class="telegram-link">انضم إلى قناتنا على تيليجرام</a>
</div>

</body>
</html>
