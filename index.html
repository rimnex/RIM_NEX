<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cloud Signer</title>
    <style>
        /* الإعدادات الأساسية والخلفية الداكنة */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* الحاوية الرئيسية للتصميم */
        .signer-container {
            background-color: #121212;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a2a;
        }

        /* العناوين باللون الذهبي */
        .title {
            text-align: center;
            color: #d4af37; /* لون ذهبي */
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* تنسيق الحقول */
        .form-group {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.3s;
        }

        .form-group:hover {
            border-color: #d4af37;
        }

        /* زر التبديل للشهادة المجانية */
        .toggle-label {
            color: #d4af37;
            font-weight: bold;
            font-size: 14px;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { display: none; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            border-radius: 20px;
            transition: .4s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 2px; bottom: 2px;
            background-color: #888;
            border-radius: 50%;
            transition: .4s;
        }
        input:checked + .slider { background-color: #d4af37; }
        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: #fff;
        }

        /* القائمة المنسدلة للتطبيقات */
        select {
            background-color: transparent;
            color: #fff;
            border: none;
            width: 100%;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            appearance: none;
        }
        select option { background-color: #1a1a1a; }

        /* حقول رفع الملفات */
        .file-upload {
            flex-direction: column;
            align-items: flex-start;
            cursor: pointer;
            position: relative;
        }
        .file-upload input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
        }
        .file-title {
            font-weight: bold;
            font-size: 14px;
        }
        .file-desc {
            color: #666;
            font-size: 11px;
            margin-top: 5px;
        }

        /* حقل كلمة المرور */
        input[type="password"] {
            background-color: transparent;
            border: none;
            color: #fff;
            width: 100%;
            font-size: 14px;
            outline: none;
            text-align: center;
        }

        /* زر البدء بالتوقيع */
        .submit-btn {
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="signer-container">
        <div class="title">IPA BLACK</div>
        <div class="subtitle">PREMIUM CLOUD SIGNER</div>

        <div class="form-group">
            <span class="toggle-label">$ الشهادة المجانية</span>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="form-group">
            <select>
                <option value="esign">ESign</option>
                <option value="scarlet">Scarlet</option>
                <option value="feather">Feather</option>
                <option value="gbox">GBox</option>
            </select>
        </div>

        <div class="form-group file-upload">
            <input type="file" accept=".p12">
            <div class="file-info">
                <div>
                    <div class="file-title">ملف P12</div>
                    <div class="file-desc">اضغط لاختيار الشهادة</div>
                </div>
                <span>📤</span>
            </div>
        </div>

        <div class="form-group file-upload">
            <input type="file" accept=".mobileprovision">
            <div class="file-info">
                <div>
                    <div class="file-title">ملف Provision</div>
                    <div class="file-desc">اضغط لاختيار التكوين</div>
                </div>
                <span>📄</span>
            </div>
        </div>

        <div class="form-group">
            <input type="password" placeholder="كلمة المرور">
        </div>

        <button class="submit-btn">بدء التوقيع</button>
    </div>

</body>
</html>
