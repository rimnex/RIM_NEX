<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX | iOS Signing Manager</title>
<style>
:root{
 --bg:#050505; 
 --gold:#D4AF37; 
 --gold-gradient:linear-gradient(135deg,#FFD700,#D4AF37);
 --card:#0f0f0f; --border:rgba(212,175,55,.3);
 --text:#fff; --text-dim:#777; 
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Arabic","Segoe UI",Arial,sans-serif}
body{
 min-height:100vh; 
 background: radial-gradient(ellipse at 50% -20%, rgba(212,175,55,.18) 0%, #000 55%);
 color:var(--text); 
 padding:40px 16px 100px;
}
.wrap{width:100%;max-width:420px;margin:0 auto;}

/* HEADER */
.header{text-align:center;margin-bottom:25px}
.logo{font-size:32px;font-weight:900;background:var(--gold-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-flex;align-items:center;gap:8px}
.shield{font-size:26px}
.subtitle{ margin-top:6px;font-size:11px;letter-spacing:2px;color:var(--text-dim);font-weight:600; }

/* CARD */
.main-card{background:#0a0a0a;border:1px solid rgba(212,175,55,.15);border-radius:24px;padding:18px}

/* TOGGLE */
.toggle-box{
  background:#111;border:1px solid rgba(212,175,55,.1);border-radius:16px;
  padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px
}
.toggle-text{text-align:right}
.toggle-text .t{font-size:15px;font-weight:700}
.toggle-text .d{font-size:11px;color:var(--text-dim);margin-top:4px}
.switch{position:relative;width:52px;height:30px;}
.switch input{opacity:0;width:0;height:0;}
.slider{
  position:absolute;cursor:pointer;inset:0;background:#2a2a2a;border-radius:30px;transition:.3s;
  box-shadow:inset 0 0 5px rgba(0,0,0,.5)
}
.slider:before{
  content:"";position:absolute;height:24px;width:24px;right:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s;
}
input:checked + .slider{background:var(--gold-gradient);box-shadow:0 0 15px rgba(212,175,55,.5);}
input:checked + .slider:before{transform:translateX(-22px);}

/* UPLOAD BOX */
.upload-box{
  border:2px dashed var(--border);border-radius:18px;padding:28px 16px;
  text-align:center;margin-bottom:14px;background:rgba(212,175,55,.03);cursor:pointer;transition:.25s
}
.upload-box:hover{border-color:var(--gold);background:rgba(212,175,55,.06)}
.upload-icon{
  width:60px;height:60px;margin:0 auto 12px;border-radius:18px;
  background:var(--gold-gradient);display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(212,175,55,.5)
}
.upload-icon svg{width:28px;height:28px;fill:#000}
.upload-title{font-size:16px;font-weight:800;margin-bottom:6px}
.upload-desc{font-size:12px;color:var(--text-dim)}

/* PASSWORD */
.password-box{
  background:#111;border:1px solid rgba(212,175,55,.1);border-radius:16px;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px
}
.password-box input{
  background:transparent;border:none;outline:none;color:var(--text);text-align:right;
  font-size:14px;width:100%
}
.password-box input::placeholder{color:var(--text-dim)}
.pass-icons{display:flex;gap:10px;align-items:center}
.pass-icons svg{width:18px;height:18px;fill:var(--gold)}

/* BUTTON */
.btn-primary{
  width:100%;padding:18px;border:none;border-radius:16px;
  background:var(--gold-gradient);color:#1a1200;font-size:16px;font-weight:900;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 8px 25px rgba(212,175,55,.4);transition:.2s
}
.btn-primary:active{transform:scale(.97)}
</style>
</head>
<body>

  <header class="header">
    <div class="logo">RIM_NEX <span class="shield">🛡️</span></div>
    <div class="subtitle">IOS SIGNING MANAGER</div>
  </header>

  <div class="main-card">
    
    <!-- TOGGLE -->
    <div class="toggle-box">
      <label class="switch">
        <input type="checkbox" checked>
        <span class="slider"></span>
      </label>
      <div class="toggle-text">
        <div class="t">شهادة التوقيع الخاصة بي</div>
        <div class="d">استخدم شهادة Apple Developer الخاصة بك</div>
      </div>
    </div>

    <!-- P12 UPLOAD -->
    <div class="upload-box" onclick="document.getElementById('p12').click()">

      </div>
      <div class="upload-title">Provisioning Profile</div>

    </div>
