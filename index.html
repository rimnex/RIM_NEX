<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIM_NEX | iOS Signing Manager</title>
<style>
:root{
  --bg:#000;
  --card:#141414;
  --border:rgba(255,255,255,.08);
  --gold:#D4AF37;
  --gold-bright:#FFD700;
  --gold-gradient:linear-gradient(135deg,#8a6a1f,#D4AF37,#FFD700,#b8860b);
  --text:#f2f2f2;
  --text-dim:#8f8f8f;
  --text-faint:#5c5c5c;
  --success:#34c759;
  --error:#ff5b5b;
  --radius-lg:20px;
  --radius-md:14px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 50% -10%, rgba(212,175,55,.14), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
  display:flex;
  justify-content:center;
  padding:40px 16px 60px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:#000;}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#8a6a1f,#D4AF37);border-radius:10px;}
*{scrollbar-width:thin;scrollbar-color:#D4AF37 #000;}

button:focus-visible, input:focus-visible, .upload-card:focus-visible{
  outline:2px solid var(--gold);
  outline-offset:3px;
  border-radius:8px;
}

.wrap{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;}

.header{text-align:center;margin-bottom:26px;opacity:0;animation:fadeInUp .55s ease forwards;}
.logo{display:inline-flex;align-items:center;gap:8px;font-size:27px;font-weight:800;letter-spacing:.5px;}
.logo .shield{font-size:22px;filter:drop-shadow(0 0 6px rgba(212,175,55,.6));}
.logo .brand{
  background:var(--gold-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.subtitle{
  margin-top:6px;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--text-dim);font-weight:700;
}

.card{
  width:100%;
  background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,0) 30%), var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:0 16px 40px -18px rgba(0,0,0,.7);
  opacity:0;animation:fadeInUp .55s ease forwards;
}
.card + .card{margin-top:14px;}

/* card 1: toggle */
.toggle-card{
  padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  animation-delay:.05s;
}
.toggle-info{display:flex;flex-direction:column;gap:3px;}
.toggle-info .t{font-size:14.5px;font-weight:700;color:var(--text);}
.toggle-info .d{font-size:11.5px;color:var(--text-faint);}

.switch{position:relative;width:48px;height:28px;flex-shrink:0;}
.switch input{position:absolute;inset:0;opacity:0;margin:0;cursor:pointer;z-index:2;}
.switch .track{
  position:absolute;inset:0;background:#2a2a2a;border:1px solid var(--border);
  border-radius:999px;transition:background .3s ease, box-shadow .3s ease;
}
.switch .thumb{
  position:absolute;top:3px;right:3px;width:22px;height:22px;background:#e8e8e8;
  border-radius:50%;transition:transform .3s cubic-bezier(.34,1.56,.64,1), background .3s ease;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.switch input:checked ~ .track{background:var(--gold-gradient);box-shadow:0 0 16px rgba(212,175,55,.5);}
.switch input:checked ~ .thumb{transform:translateX(-20px);background:#fff;}

/* upload cards 2 & 3 */
.upload-card{
  padding:0;
  animation-delay:.1s;
  border:2px dashed var(--gold);
  background:rgba(212,175,55,.03);
  cursor:pointer;
  transition:all .25s ease;
  overflow:hidden;
}
.upload-card:nth-of-type(3){animation-delay:.15s;}
.upload-card:hover{background:rgba(212,175,55,.07);transform:translateY(-2px);}
.upload-card.drag-over{background:rgba(212,175,55,.12);box-shadow:0 0 0 4px rgba(212,175,55,.15);}
.upload-card.has-file{border-style:solid;border-color:rgba(52,199,89,.5);background:rgba(52,199,89,.05);}
.upload-inner{padding:24px 16px;text-align:center;}
.upload-card input[type=file]{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;}
.upload-card .emoji{font-size:30px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 8px rgba(212,175,55,.5));}
.upload-card.has-file .emoji{filter:drop-shadow(0 0 8px rgba(52,199,89,.5));}
.upload-card .main-text{font-size:14.5px;font-weight:700;color:var(--text);}
.upload-card .sub-text{font-size:12px;color:var(--text-faint);margin-top:3px;}
.upload-card .file-info{
  margin-top:8px;font-size:12px;color:var(--success);display:none;
  align-items:center;justify-content:center;gap:6px;word-break:break-all;padding:0 6px;font-weight:600;
}
.upload-card.has-file .file-info{display:flex;}
.upload-card.has-file .main-text,.upload-card.has-file .sub-text{display:none;}

/* card 4: password */
.password-card{padding:6px;animation-delay:.2s;}
.field{
  position:relative;display:flex;align-items:center;border-radius:999px;
}
.field .field-icon{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.field input{
  flex:1;min-width:0;background:transparent;border:none;outline:none;
  color:var(--text);font-size:14.5px;padding:12px 4px;font-family:inherit;
}
.field input::placeholder{color:var(--text-faint);}
.eye-toggle{
  position:relative;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;font-size:16px;cursor:pointer;flex-shrink:0;color:var(--text-dim);
}
.eye-toggle.is-visible::after{
  content:'';position:absolute;width:20px;height:2px;background:var(--gold);
  transform:rotate(-45deg);border-radius:2px;
}

/* action button */
.action-wrap{width:100%;margin-top:18px;opacity:0;animation:fadeInUp .55s ease forwards;animation-delay:.25s;}
.btn-primary{
  position:relative;overflow:hidden;width:100%;padding:16px;border:none;
  border-radius:var(--radius-md);background:var(--gold-gradient);background-size:200% 200%;
  color:#1a1200;font-size:15px;font-weight:800;letter-spacing:.3px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:transform .2s ease, box-shadow .3s ease, background-position .4s ease;
  box-shadow:0 10px 28px -8px rgba(212,175,55,.55);
}
.btn-primary:hover{transform:translateY(-3px);background-position:100% 50%;box-shadow:0 14px 32px -8px rgba(212,175,55,.7);}
.btn-primary:active{transform:translateY(-1px) scale(.98);}
.btn-primary .arrow{font-size:15px;}
.btn-primary .ripple{
  position:absolute;border-radius:50%;background:rgba(255,255,255,.5);
  transform:scale(0);animation:ripple .6s ease-out;pointer-events:none;
}

/* honest copy-link utility (plain, not styled as a browser bar) */
.copy-row{
  margin-top:14px;display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:12px;color:var(--text-faint);background:none;border:none;cursor:pointer;
  padding:8px;opacity:0;animation:fadeInUp .55s ease forwards;animation-delay:.3s;
}
.copy-row:hover{color:var(--gold);}

.footnote{
  margin-top:16px;font-size:11px;color:var(--text-faint);text-align:center;
  opacity:0;animation:fadeInUp .55s ease forwards;animation-delay:.35s;
}

.toast-container{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:390px;display:flex;flex-direction:column;gap:10px;
  z-index:999;pointer-events:none;
}
.toast{
  pointer-events:auto;display:flex;align-items:center;gap:10px;padding:13px 16px;
  border-radius:var(--radius-md);background:#161616;border:1px solid var(--border);
  box-shadow:0 12px 30px -8px rgba(0,0,0,.6);font-size:13px;font-weight:600;
  animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
}
.toast.hide{animation:toastOut .3s ease forwards;}
.toast.success{border-color:rgba(52,199,89,.35);color:var(--success);}
.toast.error{border-color:rgba(255,91,91,.35);color:var(--error);}

@keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes ripple{to{transform:scale(3);opacity:0;}}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px) scale(.95);}}

@media (max-width:360px){
  .upload-inner{padding:20px 14px;}
  .logo{font-size:23px;}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<div class="wrap">
  <header class="header">
    <div class="logo"><span class="shield">🛡️</span><span class="brand">RIM_NEX</span></div>
    <div class="subtitle">iOS Signing Manager</div>
  </header>

  <div class="card toggle-card">
    <div class="toggle-info">
      <span class="t">شهادة التوقيع الخاصة بي</span>
      <span class="d">استخدم شهادة Apple Developer الخاصة بك</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="certToggle" checked aria-label="تفعيل استخدام شهادتي الخاصة">
      <span class="track"></span>
      <span class="thumb"></span>
    </label>
  </div>

  <div class="card upload-card" id="p12Area" tabindex="0" role="button" aria-label="رفع شهادة P12">
    <input type="file" id="p12Input" accept=".p12">
    <div class="upload-inner">
      <span class="emoji">⭐</span>
      <div class="main-text">شهادة P12</div>
      <div class="sub-text">اسحب الملف هنا أو اضغط للتصفح</div>
      <div class="file-info">✅ <span id="p12Name"></span></div>
    </div>
  </div>

  <div class="card upload-card" id="profileArea" tabindex="0" role="button" aria-label="رفع Provisioning Profile">
    <input type="file" id="profileInput" accept=".mobileprovision">
    <div class="upload-inner">
      <span class="emoji">📁</span>
      <div class="main-text">Provisioning Profile</div>
      <div class="sub-text">اسحب الملف هنا أو اضغط للتصفح</div>
      <div class="file-info">✅ <span id="profileName"></span></div>
    </div>
  </div>

  <div class="card password-card">
    <div class="field">
      <div class="field-icon">🔒</div>
      <input type="password" id="passwordInput" placeholder="كلمة مرور الشهادة" autocomplete="off">
      <button type="button" class="eye-toggle" id="togglePw" aria-label="إظهار كلمة المرور">👁️</button>
    </div>
  </div>

  <div class="action-wrap">
    <button class="btn-primary" id="actionBtn">
      <span class="btn-label">متابعة</span>
      <span class="arrow">➤</span>
    </button>
  </div>

  <button class="copy-row" id="copyLinkBtn">📋 نسخ رابط هذه الصفحة</button>
  <div class="footnote">جميع الملفات تُعالج داخل هذه الواجهة فقط، على جهازك</div>
</div>

<script>
(function(){
  'use strict';

  var certToggle = document.getElementById('certToggle');

  var p12Area = document.getElementById('p12Area');
  var p12Input = document.getElementById('p12Input');
  var p12Name = document.getElementById('p12Name');

  var profileArea = document.getElementById('profileArea');
  var profileInput = document.getElementById('profileInput');
  var profileName = document.getElementById('profileName');

  var passwordInput = document.getElementById('passwordInput');
  var togglePw = document.getElementById('togglePw');

  var actionBtn = document.getElementById('actionBtn');
  var copyLinkBtn = document.getElementById('copyLinkBtn');
  var toastContainer = document.getElementById('toastContainer');

  function formatSize(bytes){
    if(bytes < 1024) return bytes + ' B';
    if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/(1024*1024)).toFixed(1) + ' MB';
  }

  function setupUpload(area, input, nameEl){
    area.addEventListener('click', function(){ input.click(); });
    area.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        input.click();
      }
    });
    input.addEventListener('click', function(e){ e.stopPropagation(); });
    input.addEventListener('change', function(){
      if(input.files && input.files[0]){
        var f = input.files[0];
        nameEl.textContent = f.name + ' • ' + formatSize(f.size);
        area.classList.add('has-file');
      } else {
        area.classList.remove('has-file');
      }
    });
    ['dragenter','dragover'].forEach(function(evt){
      area.addEventListener(evt, function(e){
        e.preventDefault(); e.stopPropagation();
        area.classList.add('drag-over');
      });
    });
    ['dragleave','drop'].forEach(function(evt){
      area.addEventListener(evt, function(e){
        e.preventDefault(); e.stopPropagation();
        area.classList.remove('drag-over');
      });
    });
    area.addEventListener('drop', function(e){
      var dt = e.dataTransfer;
      if(dt && dt.files && dt.files.length){
        input.files = dt.files;
        input.dispatchEvent(new Event('change'));
      }
    });
  }

  setupUpload(p12Area, p12Input, p12Name);
  setupUpload(profileArea, profileInput, profileName);

  togglePw.addEventListener('click', function(){
    var isPw = passwordInput.type === 'password';
    passwordInput.type = isPw ? 'text' : 'password';
    togglePw.classList.toggle('is-visible', isPw);
    togglePw.setAttribute('aria-label', isPw ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور');
  });

  function showToast(message, type){
    var toast = document.createElement('div');
    toast.className = 'toast ' + type;
    var icon = type === 'success' ? '✅' : '⚠️';
    toast.innerHTML = '<span>' + icon + '</span><span>' + message + '</span>';
    toastContainer.appendChild(toast);
    setTimeout(function(){
      toast.classList.add('hide');
      setTimeout(function(){ toast.remove(); }, 300);
    }, 3000);
  }

  function spawnRipple(e, btn){
    var rect = btn.getBoundingClientRect();
    var size = Math.max(rect.width, rect.height);
    var span = document.createElement('span');
    span.className = 'ripple';
    span.style.width = span.style.height = size + 'px';
    span.style.left = (e.clientX - rect.left - size/2) + 'px';
    span.style.top = (e.clientY - rect.top - size/2) + 'px';
    btn.appendChild(span);
    setTimeout(function(){ span.remove(); }, 650);
  }

  actionBtn.addEventListener('click', function(e){
    spawnRipple(e, actionBtn);

    if(!certToggle.checked){
      showToast('فعّل خيار الشهادة الخاصة أولًا', 'error');
      return;
    }
    if(!p12Input.files.length){
      showToast('الرجاء اختيار شهادة P12', 'error');
      return;
    }
    if(!profileInput.files.length){
      showToast('الرجاء اختيار ملف Provisioning Profile', 'error');
      return;
    }
    if(!passwordInput.value.trim()){
      showToast('الرجاء إدخال كلمة المرور', 'error');
      return;
    }

    showToast('تم حفظ بيانات الشهادة محليًا', 'success');
  });

  copyLinkBtn.addEventListener('click', function(){
    var url = window.location.href;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(function(){
        showToast('تم نسخ رابط الصفحة', 'success');
      }).catch(function(){
        showToast('تعذّر نسخ الرابط', 'error');
      });
    } else {
      showToast('النسخ غير مدعوم في هذا المتصفح', 'error');
    }
  });

})();
</script>
</body>
</html>
