<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX - IPA Signing Center</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#0d0d0d;
  --card:#141414;
  --border:rgba(255,255,255,.08);
  --gold:linear-gradient(135deg,#8f6b1f,#d4af37,#f7d774,#b8860b);
  --gold-solid:#d4af37;
  --text:#f5f5f5;
  --muted:#999;
  --radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
body{background:var(--bg);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;color:var(--text);background-image:radial-gradient(circle at 50% 20%,rgba(212,175,55,0.08) 0%,transparent 60%)}
.container{width:100%;max-width:430px;animation:fadeIn.6s ease}
.card{background:rgba(20,20,20,0.7);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:32px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:28px;font-weight:800;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px}
.header p{color:var(--muted);font-size:13px;margin-top:4px}
.toggle{display:flex;justify-content:space-between;align-items:center;background:#0f0f0f;border:1px solid var(--border);padding:14px 16px;border-radius:18px;margin-bottom:14px;transition:.3s}
.toggle:hover{border-color:var(--gold-solid)}
.toggle span{font-weight:600}
.switch{position:relative;width:50px;height:28px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#2a2a2a;border-radius:28px;cursor:pointer;transition:.3s}
.slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold)}
input:checked +.slider:before{transform:translateX(22px)}
.field{margin-bottom:14px}
.field-label{font-size:13px;color:var(--muted);margin-bottom:8px}
.select-box{background:#0f0f0f;border:1px solid var(--border);border-radius:18px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.3s}
.select-box:hover{border-color:var(--gold-solid);transform:translateY(-2px)}
.select-left{display:flex;align-items:center;gap:10px}
.app-icon{width:32px;height:32px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:800;font-size:12px;box-shadow:0 4px 12px rgba(212,175,55,0.3)}
.upload-box{background:#0f0f0f;border:2px dashed var(--border);border-radius:18px;padding:18px;text-align:center;cursor:pointer;transition:.3s}
.upload-box:hover{border-color:var(--gold-solid);background:#161616;transform:translateY(-2px)}
.upload-box i{font-size:22px;color:var(--gold-solid);margin-bottom:8px;display:block}
.upload-box span{font-size:13px;color:var(--muted)}
.file-name{font-size:12px;color:var(--text);margin-top:6px}
.input-pass{width:100%;background:#0f0f0f;border:1px solid var(--border);border-radius:18px;padding:14px 16px 14px 44px;color:var(--text);font-size:15px;outline:none;transition:.3s}
.input-wrap{position:relative}
.input-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--gold-solid)}
.input-pass:focus{border-color:var(--gold-solid);box-shadow:0 0 0 4px rgba(212,175,55,0.1)}
.btn{width:100%;padding:16px;border:none;border-radius:22px;background:var(--gold);color:#000;font-weight:800;font-size:16px;cursor:pointer;position:relative;overflow:hidden;transition:transform.15s,box-shadow.3s;margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,175,55,0.4)}
.btn:active{transform:scale(.97)}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.4);transform:scale(0);animation:ripple.6s linear}
.progress{height:6px;background:#1f1f1f;border-radius:10px;overflow:hidden;margin-top:12px;display:none}
.progress-bar{height:100%;width:0;background:var(--gold);transition:width.3s}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--border);padding:12px 20px;border-radius:14px;opacity:0;transition:.4s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{border-color:#2ecc71}
.toast.error{border-color:#e74c3c}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{to{transform:scale(4);opacity:0}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--gold-solid);border-radius:10px}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1>RIM_NEX</h1>
      <p>IPA Signing Center</p>
    </div>

    <div class="toggle">
      <span>الشهادة المجانية</span>
      <label class="switch">
        <input type="checkbox" id="freeCert">
        <span class="slider"></span>
      </label>
    </div>

    <div class="field">
      <div class="field-label">اختر تطبيق التوقيع</div>
      <div class="select-box" id="toolSelect">
        <div class="select-left">
          <div class="app-icon" id="selectedIcon">E</div>
          <span id="selectedName">ESign</span>
        </div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>

    <div class="field">
      <div class="upload-box" id="p12Box">
        <i class="fa-solid fa-file-arrow-up"></i>
        <span>📄 Drop P12 Certificate or click to browse</span>
        <div class="file-name" id="p12Name"></div>
      </div>
      <input type="file" id="p12File" accept=".p12" hidden>
    </div>

    <div class="field">
      <div class="upload-box" id="provBox">
        <i class="fa-solid fa-file-lines"></i>
        <span>📁 Drop Provision Profile or click to browse</span>
        <div class="file-name" id="provName"></div>
      </div>
      <input type="file" id="provFile" accept=".mobileprovision" hidden>
    </div>

    <div class="field">
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" class="input-pass" id="password" placeholder="Password">
      </div>
    </div>

    <div class="progress" id="progress"><div class="progress-bar" id="bar"></div></div>
    <button class="btn" id="signBtn">بدء التوقيع</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const tools = [
  {name:'ESign', icon:'E'},
  {name:'KSign', icon:'K'},
  {name:'Scarlet', icon:'S'},
  {name:'GBox', icon:'G'},
  {name:'Feather', icon:'F'}
];
let currentTool = 0;

document.getElementById('toolSelect').onclick = () => {
  currentTool = (currentTool + 1) % tools.length;
  document.getElementById('selectedName').textContent = tools[currentTool].name;
  document.getElementById('selectedIcon').textContent = tools[currentTool].icon;
};

function bindUpload(box, input, nameEl){
  box.onclick = () => input.click();
  input.onchange = () => { if(input.files[0]) nameEl.textContent = input.files[0].name; }
}
bindUpload(document.getElementById('p12Box'), document.getElementById('p12File'), document.getElementById('p12Name'));
bindUpload(document.getElementById('provBox'), document.getElementById('provFile'), document.getElementById('provName'));

document.getElementById('signBtn').onclick = function(e){
  let ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.left = e.clientX - this.offsetLeft + 'px';
  ripple.style.top = e.clientY - this.offsetTop + 'px';
  this.appendChild(ripple);
  setTimeout(()=>ripple.remove(),600);

  if(!document.getElementById('p12File').files[0] ||!document.getElementById('provFile').files[0] ||!document.getElementById('password').value){
    showToast('الرجاء اكمال جميع الحقول','error'); return;
  }

  document.getElementById('progress').style.display = 'block';
  let w = 0;
  let int = setInterval(()=>{
    w += 8;
    document.getElementById('bar').style.width = w + '%';
    if(w>=100){
      clearInterval(int);
      showToast('تم التوقيع بنجاح','success');
      setTimeout(()=>{document.getElementById('progress').style.display='none';document.getElementById('bar').style.width='0'},1000);
    }
  },150);
};

function showToast(msg,type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
