<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        :root {
            --gold: #C5A059;
            --dark-bg: #050505;
            --panel-bg: #0f0f0f;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            width: 350px;
            background: var(--panel-bg);
            border: 1px solid var(--gold);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(197, 160, 89, 0.2);
        }

        h2 { color: var(--gold); margin-bottom: 1.5rem; letter-spacing: 2px; }

        .signature-area {
            background: #000;
            height: 150px;
            border: 1px dashed var(--gold);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-gold {
            background: linear-gradient(45deg, #8B6508, #C5A059);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn-gold:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<div class="card">
    <h2>RIM_NEX</h2>
    <div class="signature-area">
        <span style="color: #333;">مساحة التوقيع الآمن</span>
    </div>
    <button class="btn-gold">إتمام التوثيق</button>
</div>

</body>
</html>
