<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        .signature-container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: 1px solid #e0e0e0;
            padding: 20px;
            max-width: 400px;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .name { font-weight: bold; font-size: 18px; color: #333; margin-bottom: 5px; }
        .title { color: #666; font-size: 14px; margin-bottom: 15px; }
        .contact-info { font-size: 13px; color: #444; }
        .contact-info div { margin-bottom: 5px; }
        .link { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

<div class="signature-container">
    <div class="name">الاسم الكريم</div>
    <div class="title">المسمى الوظيفي الخاص بك</div>
    <div class="contact-info">
        <div>📱 الهاتف: 00966xxxxxxxx</div>
        <div>📧 البريد: email@example.com</div>
        <div>🌐 الموقع: <a href="#" class="link">www.yourwebsite.com</a></div>
    </div>
</div>

</body>
</html>
