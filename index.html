<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX Signer</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #0d0d0d;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            padding: 25px;
            box-sizing: border-box;
            border: 2px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        h2 {
            text-align: center;
            color: #d4af37;
            margin: 10px 0 5px 0;
        }
        h3 {
            text-align: center;
            font-size: 14px;
            color: #cccccc;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .select-btn {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #d4af37;
            background-color: #1a1a1a;
            color: #d4af37;
            text-align: right;
            cursor: pointer;
            box-sizing: border-box;
            position: relative;
        }
        .select-btn::after {
            content: '▼';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: #d4af37;
        }
        .options-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .options-content {
            background-color: #1a1a1a;
            width: 90%;
            max-width: 350px;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            border: 1px solid #d4af37;
        }
        .option-item {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
            cursor: pointer;
            color: #ffffff;
        }
        .option-item:last-child {
            border-bottom: none;
        }
        .option-item:hover {
            background-color: #333;
            color: #d4af37;
        }
        .icon {
            display: inline-block;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            margin-left: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #ffffff;
        }
        .file-upload {
            width: 100%;
            padding: 15px;
            border-radius: 6px;
            border: 2px dashed #d4af37;
            background-color: #1a1a1a;
            color: #d4af37;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
        }
        .file-upload:hover {
            background-color: #262626;
        }
        .file-upload input {
            display: none;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #d4af37;
            background-color: #1a1a1a;
            color: #ffffff;
            box-sizing: border-box;
            text-align: right;
            font-size: 16px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            color: #000000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }
        button[type="submit"]:hover {
            opacity: 0.9;
        }
        .telegram-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>RIM_NEX</h2>
    <h3>CLOUD SIGNER</h3>

    <form onsubmit="event.preventDefault(); alert('تم بدء التوقيع');">
        <div class="form-group">
            <label>اختر التطبيق</label>
            <button type="button" class="select-btn" id="appSelectBtn" onclick="document.getElementById('appOverlay').style.display = 'flex'">اختر التطبيق...</button>
        </div>

        <div class="form-group">
            <label>ملف P12</label>
            <div class="file-upload" onclick="document.getElementById('p12Input').click()">
                اضغط لاختيار الشهادة
                <input type="file" id="p12Input" accept=".p12" required>
            </div>
        </div>

        <div class="form-group">
            <label>ملف Provision</label>
            <div class="file-upload" onclick="document.getElementById('provisionInput').click()">
                اضغط لاختيار التكوين
                <input type="file" id="provisionInput" accept=".mobileprovision" required>
            </div>
        </div>

        <div class="form-group">
            <label>كلمة المرور للشهادة</label>
            <input type="password" placeholder="أدخل كلمة المرور" required>
        </div>

        <button type="submit">بدء التوقيع</button>
    </form>

    <a href="https://t.me/PUBG_RIM" target="_blank" class="telegram-link">انضم إلى قناتنا على تيليجرام</a>
</div>

<div class="options-overlay" id="appOverlay" onclick="if(event.target === this) this.style.display = 'none'">
    <div class="options-content">
        <div class="option-item" onclick="selectApp('ESign', '#ff9900')"><span class="icon" style="background-color: #ff9900;">E</span> ESign</div>
        <div class="option-item" onclick="selectApp('KSign', '#3366cc')"><span class="icon" style="background-color: #3366cc;">K</span> KSign</div>
        <div class="option-item" onclick="selectApp('Scarlet', '#cc0000')"><span class="icon" style="background-color: #cc0000;">S</span> Scarlet</div>
        <div class="option-item" onclick="store) {
        document.getElementById('appSelectBtn').innerText = appName;
        document.getElementById('appOverlay').style.display = 'none';
    }
</script>

</body>
</html>
