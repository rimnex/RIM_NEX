<!DOCTYPE html>

<title>RIM_NEX - Gold Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070707;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:22px 16px;font-family:'Cairo',system-ui,Arial,sans-serif}
.card{width:100%;max-width:400px;background:#16140F;border:1px solid rgba(212,175,55,0.22);border-radius:28px;padding:26px 20px 20px;box-shadow:0 20px 60px rgba(0,0,0,0.85),inset 0 1px 0 rgba(255,255,255,0.05)}
.title-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:2px}
h1{font-size:37px;font-weight:800;letter-spacing:.5px;line-height:1;color:#D4AF37}
@supports (-webkit-background-clip:text){h1{background:linear-gradient(100deg,#FFF6B0 0%,#FFEB85 15%,#D4AF37 50%,#B38728 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}}
.shield{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#FFFFFF 0%,#E5E7EB 18%,#C0C5CC 45%,#9AA0A8 70%,#D1D5DB 100%);border-radius:10px 10px 12px 12px;box-shadow:0 2px 10px rgba(192,197,204,0.35),inset 0 1px 0 rgba(255,255,255,0.9),inset 0 -1px 0 rgba(0,0,0,0.15);border:1px solid rgba(255,255,255,0.6)}
/* ... باقي الستايل نفسه */
.tg-link{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;width:100%;background:rgba(36,33,26,0.9);border:1px solid rgba(212,175,55,0.18);border-radius:14px;padding:12px 14px;color:#C8BFA8;text-decoration:none;font-size:13px;font-weight:700}
.tg-link:hover{background:rgba(212,175,55,0.10);border-color:rgba(212,175,55,0.32);color:#FFEB99}
</style>
</head>
<body>
<div class="card">
  <div class="title-row">
    <h1>RIM_NEX</h1>
    <span class="shield" title="محمي">
      <!-- درع فضي بتدرج -->
      <svg viewBox="0 0 24 24" fill="none"><defs><linearGradient id="silverGrad" x1="2" y1="2" x2="22" y2="20"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="25%" stop-color="#E5E7EB"/><stop offset="55%" stop-color="#9CA3AF"/><stop offset="85%" stop-color="#D1D5DB"/><stop offset="100%" stop-color="#F9FAFB"/></linearGradient></defs><path d="M12 2.8L4.5 7.2V12.2C4.5 16.1 7.1 19.6 12 21.2C16.9 19.6 19.5 16.1 19.5 12.2V7.2L12 2.8Z" fill="url(#silverGrad)" stroke="#9AA0A8" stroke-width="0.9"/><path d="M8.8 12.2L11 14.4L15.6 9.2" stroke="#4B5563" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </div>
  <div class="sub">IPA Signing Center</div>
  <!-- باقي الكروت: الشهادة، اختيار التطبيق، الرفع -->
  <input type="password" id="pass" placeholder="كلمة سر الشهادة" required>

  <a href="https://t.me/ChatPUBG_RIM" target="_blank" class="tg-link">قناتي تلجرام</a>
