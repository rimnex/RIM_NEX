<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPA BLACK - Signer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a0a0c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .signer-card {
            background-color: #121212;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid #2a2a2a;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #d4af37;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-family: serif;
        }

        .header p {
            color: #888;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a1a1a;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .toggle-container span {
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-container span::before {
            content: '$';
            color: #d4af37;
            font-weight: bold;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #777;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #333;
            border: 1px solid #d4af37;
        }

        input:checked + .slider:before {
            transform: translateX(-22px);
            background-color: #d4af37;
        }

        /* Input Groups */
        .input-group {
            background-color: #1a1a1a;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .input-group:hover {
            border-color: #333;
        }

        .input-texts {
            display: flex;
            flex-direction: column;
        }

        .input-title {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
        }

        .input-subtitle {
            font-size: 11px;
            color: #777;
            margin-top: 3px;
        }

        .input-icon {
            color: #d4af37;
            font-size: 20px;
        }

        .file-input-hidden {
            display: none;
        }

        /* Password Input */
        .password-input {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px 20px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 25px;
            text-align: center;
            outline: none;
        }

        .password-input:focus {
            border-color: #d4af37;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: #d4af37;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }

        /* Progress Bar (Hidden initially) */
        .progress-container {
            display: none;
            margin-top: 15px;
            text-align: center;
        }

        .progress-text {
            color: #d4af37;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: #222;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #d4af37;
            border-radius: 3px;
            transition: width 0.3s linear;
        }

        /* App Selection Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-content {
            background-color: #1a1a1a;
            width: 100%;
            max-width: 400px;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .app-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }
        
        .app-option:last-child {
            border-bottom: none;
        }

        .app-name {
            font-size: 16px;
            color: #fff;
        }

        .app-icon-mini {
            width: 24px;
            height: 24px;
            background-color: #d4af37;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-weight: bold;
            font-size: 12px;
        }

    </style>
</head>
<body>

    <div class="signer-card">
        <div class="header">
            <h1>IPA BLACK</h1>
            <p>PREMIUM CLOUD SIGNER</p>
        </div>

        <div class="toggle-container">
            <span>الشهادة المجانية</span>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="input-group" id="app-selector-btn" style="justify-content: center; gap: 10px;">
            <span class="input-title" id="selected-app-name">ESign</span>
            <div class="app-icon-mini" id="selected-app-icon" style="background-color:#ff9900;">E</div>
        </div>

        <div class="input-group" onclick="document.getElementById('p12-file').click()">
            <div class="input-texts">
                <span class="input-title">ملف P12</span>
                <span class="input-subtitle" id="p12-name">اضغط لاختيار الشهادة</span>
            </div>
            <span class="input-icon">↑</span>
            <input type="file" id="p12-file" class="file-input-hidden" accept=".p12" onchange="updateFileName(this, 'p12-name')">
        </div>

        <div class="input-group" onclick="document.getElementById('prov-file').click()">
            <div class="input-texts">
                <span class="input-title">ملف Provision</span>
                <span class="input-subtitle" id="prov-name">اضغط لاختيار التكوين</span>
            </div>
            <span class="input-icon">📄</span>
            <input type="file" id="prov-file" class="file-input-hidden" accept=".mobileprovision" onchange="updateFileName(this, 'prov-name')">
        </div>

        <input type="password" class="password-input" placeholder="كلمة المرور">

        <button class="submit-btn" id="sign-btn" onclick="startSigning()">بدء التوقيع</button>

        <div class="progress-container" id="progress-area">
            <div class="progress-text" id="progress-text">جاري المعالجة...</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="apps-modal" onclick="closeModal(event)">
        <div class="modal-content">
            <div class="app-option" onclick="selectApp('ESign', 'E', '#ff9900')">
                <span class="app-name">ESign</span>
                <div class="app-icon-mini" style="background-color:#ff9900;">E</div>
            </div>
            <div class="app-option" onclick="selectApp('KSign', 'K', '#3366cc')">
                <span class="app-name">KSign</span>
                <div class="app-icon-mini" style="background-color:#3366cc;">K</div>
            </div>
            <div class="app-option" onclick="selectApp('Scarlet', 'S', '#cc0000')">
                <span class="app-name">Scarlet</span>
                <div class="app-icon-mini" style="background-color:#cc0000;">S</div>
            </div>
            <div class="app-option" onclick="selectApp('GBox', 'G', '#6600cc')">
                <span class="app-name">GBox</span>
                <div class="app-icon-mini" style="background-color:#6600cc;">G</div>
            </div>
            <div class="app-option" onclick="selectApp('Feather', 'F', '#009933')">
                <span class="app-name">Feather</span>
                <div class="app-icon-mini" style="background-color:#009933;">F</div>
            </div>
        </div>
    </div>

    <script>
        // Modal Logic
        const modal = document.getElementById('apps-modal');
        const appSelectorBtn = document.getElementById('app-selector-btn');
        const selectedAppName = document.getElementById('selected-app-name');
        const selectedAppIcon = document.getElementById('selected-app-icon');

        appSelectorBtn.onclick = function() {
            modal.style.display = 'flex';
        }

        function closeModal(e) {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        }

        function selectApp(name, letter, color) {
            selectedAppName.innerText = name;
            selectedAppIcon.innerText = letter;
            selectedAppIcon.style.backgroundColor = color;
            modal.style.display = 'none';
        }

        // File Selection Logic
        function updateFileName(inputElement, textElementId) {
            const textElement = document.getElementById(textElementId);
            if (inputElement.files.length > 0) {
                textElement.innerText = inputElement.files[0].name;
                textElement.style.color = "#d4af37"; // Change color when selected like in video
            }
        }

        // Fake Signing Process Animation
        function startSigning() {
            const btn = document.getElementById('sign-btn');
            const progressArea = document.getElementById('progress-area');
            const progressText = document.getElementById('progress-text');
            const progressFill = document.getElementById('progress-fill');

            // Hide button, show progress
            btn.style.display = 'none';
            progressArea.style.display = 'block';

            // Reset progress
            progressFill.style.width = '0%';
            progressText.innerText = 'جاري المعالجة...';

            let width = 0;
            const interval = setInterval(() => {
                width += 2; // Speed of progress
                progressFill.style.width = width + '%';

                if (width === 40) {
                    progressText.innerText = 'يتم التوقيع الان...';
                }

                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        // Simulate the iTunes popup
                        if(confirm("فتح هذه الصفحة في \"iTunes\"؟")) {
                            alert("تم التوقيع بنجاح! جاري التثبيت...");
                            // Reset for next use
                            btn.style.display = 'block';
                            progressArea.style.display = 'none';
                        } else {
                            btn.style.display = 'block';
                            progressArea.style.display = 'none';
                        }
                    }, 500);
                }
            }, 50); // Updates every 50ms
        }
    </script>
</body>
</html>
