<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX | iOS Signing Manager</title>
<style>
:root{
 --gold:#FFC107; 
 --bg-dark:#000;
 --card-bg:rgba(15,15,15,0.85);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro",Arial,sans-serif}
body{
  background:var(--bg-dark);
  min-height:100vh;
  padding:40px 16px 120px;
  color:#fff;
  position:relative;
}

/* الاضاءة من فوق */
.spotlight{
  position:fixed;
  top:0;left:50%;
  transform:translateX(-50%);
  width:100%;
  height:60vh;
  background: radial-gradient(ellipse 60% 100% at 50% 0%, 
    rgba(255,240,180,0.20) 0%,
    rgba(255,193,7,0.10) 30%,
    transparent 70%
  );
  pointer-events:none;
  z-index:0;
}

.container{
  max-width:420px;
  margin:0 auto;
  position:relative;
  z-index:2;
}

/* الهيدر */
.header{text-align:center;margin-bottom:30px}
.logo{
  font-size:32px;font-weight:900;color:var(--gold);
  display:flex;align-items:center;justify-content:center;gap:8px;
  text-shadow:0 0 20px rgba(255,193,7,0.5);
}
.logo svg{width:26px;height:26px;fill:var(--gold)}
.sub{font-size:11px;letter-spacing:2px;color:#777;margin-top:6px}

/* الكارد الرئيسي */
.card{
  background:var(--card-bg);
  border:1px solid rgba(255,193,7,0.2);
  border-radius:22px;
  padding:18px;
  backdrop-filter:blur(15px);
}

/* التون */
.toggle{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(20,20,20,0.7);
  border:1px solid rgba(255,193,7,0.15);
  padding:15px;border-radius:16px;margin-bottom:16px
}
.toggle .txt{text-align:right}
.toggle .txt .t{font-weight:700;font-size:15px}
.toggle .txt .d{font-size:11px;color:#888;margin-top:3px}

.switch{position:relative;display:inline-block;width:52px;height:30px}
.switch input{opacity:0;width:0;height:0}
