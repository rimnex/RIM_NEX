<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
body{
  background:#000;
  min-height:100vh;padding:20px;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.container{max-width:430px;margin:0 auto}
.header{text-align:center;padding:40px 0}
.header h1{
  font-size:40px;font-weight:900;
  color:#D4AF37;display:flex;align-items:center;justify-content:center;gap:10px
}
.shield{width:35px;height:35px;fill:#D4AF37}
.header p{color:#888;font-size:11px;letter-spacing:5px;margin-top:8px}
.card{
  background:#111;border:1px solid #D4AF37;
  border-radius:18px;padding:18px;margin-bottom:15px
}
.toggle{display:flex;justify-content:space-between;align-items:center}
.switch{
  width:50px;height:30px;background:#D4AF37;border-radius:30px;position:relative
}
.switch::after{
  content:"";width:26px;height:26px;background:#fff;border-radius:50%;
  position:absolute;right:2px;top:2px
}
.upload{border:2px dashed #D4AF37;text-align:center;padding:20px;cursor:pointer}
.upload b{display:block;font-size:16px}
.btn{
  width:100%;padding:18px;border:none;border-radius:16px;
  background:#D4AF37;color:#000;font-weight:900;font-size:17px;margin-top:15px
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>
      <svg class="shield" viewBox="0 0 24 24">
        <path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4z"/>
      </svg>
      RIM_NEX
    </h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <div><b>شهادة التوقيع الخاصة بي</b></div>
    <div class="switch"></div>
  </div>

  <div class="card upload" onclick="alert('اختر ملف P12')">
    <b>P12 شهادة</b><small>اسحب الملف هنا</small>
  </div>

  <div class="card upload" onclick="alert('اختر ملف Provisioning')">
    <b>Provisioning Profile</b><small>اسحب الملف هنا</small>
  </div>

  <button class="btn">بدء التوقيع</button>
</div>
</body>
</html>
