<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX App Store</title>
    <!-- تضمين مكتبة Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            margin-bottom: 30px;
        }
        .header h1 {
            color: #d4af37;
            font-size: 36px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .header p {
            color: #cccccc;
            margin: 5px 0;
        }
        .creator {
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }
        .status {
            display: inline-block;
            border: 1px solid #d4af37;
            background-color: #1a1a1a;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: #d4af37;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        .app-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 20px auto 0;
        }
        .app-item {
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(212, 175, 55, 0.1);
        }
        .app-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .app-icon {
            width: 50px;
            height: 50px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #d4af37;
        }
        .install-btn {
            background: linear-gradient(135deg, #d4af37, #ffaa00);
            color: #000000;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }
        .install-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RIM_NEX</h1>
        <p>التطبيقات موقعة بشهادة مجانية.</p>
        <p>بواسطة: <span class="creator">RIM_NEX</span></p>
    </div>

    <div class="status">
        <i class="fa-solid fa-eye"></i> الزوّار: متصل
    </div>

    <div class="app-list">
        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-tiktok"></i></div>
                <h3>تيك توك</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-telegram"></i></div>
                <h3>تيليجرام</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-whatsapp"></i></div>
                <h3>واتساب</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-youtube"></i></div>
                <h3>يوتيوب</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-twitter"></i></div>
                <h3>تويتر</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>
    </div>

</body>
</html>
