<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
body{background:#0a0a0a;color:#fff;font-family:-apple-system;margin:0;padding:20px;text-align:center}
h1{background:linear-gradient(135deg,#8f6b1f 0%,#d4af37 50%,#f7d774 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:36px}
.card{background:#111;border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:16px;margin:16px 0}
.btn{width:100%;padding:18px;border:none;border-radius:16px;background:linear-gradient(135deg,#8f6b1f 0%,#d4af37 50%,#f7d774 100%);color:#000;font-weight:900;font-size:17px}
</style>
</head>
<body>
<h1>RIM_NEX</h1>
<p>IOS SIGNING MANAGER</p>

<div class="card">
  <b>شهادة التوقيع الخاصة بي</b>
  <input type="checkbox" checked>
</div>

<div class="card" id="selectBox">
  <span id="selectedName">KSign</span> ▼
</div>

<div class="card" id="p12Card">
  <b>شهادة P12</b><br>
  <small>اسحب الملف هنا</small>
  <div id="p12Name"></div>
  <input type="file" id="p12" hidden>
</div>

<div class="card" id="provCard">
  <b>Provisioning Profile</b><br>
  <small>اسحب الملف هنا</small>
  <div id="provName"></div>
  <input type="file" id="prov" hidden>
</div>

<div class="card">
  <input type="password" id="password" placeholder="Password" style="background:transparent;border:none;color:#fff;width:80%">
  <span id="togglePass">👁️</span>
</div>

<button class="btn" id="signBtn">بدء التوقيع والتثبيت</button>

<script>
document.getElementById('p12Card').onclick = () => document.getElementById('p12').click();
document.getElementById('provCard').onclick = () => document.getElementById('prov').click();
document.getElementById('p12').onchange = e => {if(e.target.files[0]) document.getElementById('p12Name').textContent = e.target.files[0].name + ' ✓'}
document.getElementById('prov').onchange = e => {if(e.target.files[0]) document.getElementById('provName').textContent = e.target.files[0].name + ' ✓'}
document.getElementById('togglePass').onclick = () => {
  const pass = document.getElementById('password');
  pass.type = pass.type === 'password'? 'text' : 'password';
}
</script>
</body>
</html>
