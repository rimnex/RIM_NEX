<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX App Store</title>
    <!-- تضمين مكتبة Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            margin-bottom: 30px;
        }
        .header h1 {
            background: linear-gradient(to right, #ffd700, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 38px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .header p {
            color: #b3b3b3;
            margin: 5px 0;
        }
        .creator {
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }
        .status {
            display: inline-block;
            border: 2px solid #d4af37;
            background-color: #1a1a1a;
            padding: 6px 20px;
            border-radius: 25px;
            font-size: 14px;
            color: #ffd700;
            margin-top: 15px;
            margin-bottom: 25px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .app-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 450px;
            margin: 20px auto 0;
        }
        .app-item {
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
            transition: transform 0.3s ease;
        }
        .app-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.4);
        }
        .app-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .app-icon {
            width: 55px;
            height: 55px;
            background-color: #000;
            border: 1px solid #d4af37;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #d4af37;
            box-shadow: inset 0 0 5px rgba(212, 175, 55, 0.5);
        }
        .app-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }
        .install-btn {
            background: linear-gradient(135deg, #d4af37, #ffaa00);
            color: #000000;
            border: none;
            padding: 8px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .install-btn:hover {
            background: linear-gradient(135deg, #ffaa00, #d4af37);
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RIM_NEX</h1>
        <p>التطبيقات موقعة بشهادة مجانية.</p>
        <p>بواسطة: <span class="creator">RIM_NEX</span></p>
    </div>

    <div class="status">
        <i class="fa-solid fa-eye"></i> الزوّار: متصل
    </div>

    <div class="app-list">
        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-tiktok"></i></div>
                <div class="app-name">تيك توك</div>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-telegram"></i></div>
                <div class="app-name">تيليجرام</div>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-whatsapp"></i></div>
                <div class="app-name">واتساب</div>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-youtube"></i></div>
                <div class="app-name">يوتيوب</div>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"><i class="fa-brands fa-netflix"></i></div>
                <div class="app-name">Netflix</div>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>
    </div>

</body>
</html>
