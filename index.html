<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الخاص</title>
    <style>
        /* الإعدادات الأساسية للخطوط والألوان */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* تصميم ترويسة الموقع */
        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
        }
        .header p {
            color: #8e8e93;
            font-size: 15px;
            margin-top: 5px;
        }

        /* تصميم حاوية التطبيقات */
        .app-list {
            max-width: 500px;
            margin: 0 auto;
        }

        /* تصميم كرت التطبيق الواحد */
        .app-card {
            background-color: #1c1c1e;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* معلومات التطبيق (الرمز والاسم) */
        .app-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* أيقونة التطبيق */
        .app-icon {
            width: 60px;
            height: 60px;
            background-color: #3a3a3c;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .app-details h3 {
            margin: 0 0 5px 0;
            font-size: 17px;
        }
        .app-details p {
            margin: 0;
            font-size: 13px;
            color: #8e8e93;
        }

        /* زر التحميل */
        .install-btn {
            background-color: #007aff;
            color: #ffffff;
            text-decoration: none;
            padding: 8px 22px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 15px;
            transition: background-color 0.2s;
        }

        .install-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>متجري الخاص</h1>
        <p>التطبيقات الأساسية فقط، بدون إعلانات مزعجة.</p>
    </div>

    <div class="app-list">
        
        <!-- التطبيق الأول -->
        <div class="app-card">
            <div class="app-info">
                <div class="app-icon">🎬</div>
                <div class="app-details">
                    <h3>Cinemana</h3>
                    <p>لمشاهدة الأفلام والمسلسلات</p>
                </div>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <!-- التطبيق الثاني -->
        <div class="app-card">
            <div class="app-info">
                <div class="app-icon">✍️</div>
                <div class="app-details">
                    <h3>ESign</h3>
                    <p>لتوقيع وتثبيت التطبيقات</p>
                </div>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <!-- التطبيق الثالث -->
        <div class="app-card">
            <div class="app-info">
                <div class="app-icon">🔑</div>
                <div class="app-details">
                    <h3>KSign</h3>
                    <p>أداة التوقيع البديلة</p>
                </div>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

    </div>

</body>
</html>
