<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX Signer</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #121212;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            padding: 25px;
            box-sizing: border-box;
            border: 1px solid #333;
        }
        h2, h3 {
            text-align: center;
            color: #d4af37;
            margin: 5px 0;
        }
        h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }
        .select-btn {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: #fff;
            text-align: right;
            cursor: pointer;
            box-sizing: border-box;
            position: relative;
        }
        .select-btn::after {
            content: '▼';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: #888;
        }
        .options-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .options-content {
            background-color: #222;
            width: 90%;
            max-width: 350px;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
        }
        .option-item {
            padding: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .option-item:last-child {
            border-bottom: none;
        }
        .option-item:hover {
            background-color: #333;
        }
        .icon {
            display: inline-block;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            margin-left: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
        .icon-e { background-color: #ff9900; color: #fff; }
        .icon-k { background-color: #3366cc; color: #fff; }
        .icon-s { background-color: #cc0000; color: #fff; }
        .icon-f { background-color: #009933; color: #fff; }
        .icon-g { background-color: #6600cc; color: #fff; }
        .file-upload {
            width: 100%;
            padding: 15px;
            border-radius: 6px;
            border: 2px dashed #d4af37;
            background-color: #1a1a1a;
            color: #fff;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
        }
        .file-upload input {
            display: none;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: #fff;
            box-sizing: border-box;
            text-align: right;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            background-color: #d4af37;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
        }
        .telegram-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>RIM_NEX</h2>
    <h3>CLOUD SIGNER</h3>

    <form onsubmit="event.preventDefault(); alert('تم بدء التوقيع');">
        <div class="form-group">
            <label>اختر التطبيق...</label>
            <button type="button" class="select-btn" id="appSelectBtn" onclick="document.getElementById('appOverlay').style.display = 'flex'">اختر التطبيق...</button>
        </div>

        <div class="form-group">
            <label>ملف P12</label>
            <div class="file-upload" onclick="document.getElementById('p12Input').click()">
                اضغط لاختيار الشهادة
                <input type="file" id="p12Input" accept=".p12" required>
            </div>
        </div>

        <div class="form-group">
            <label>ملف Provision</label>
            <div class="file-upload" onclick="document.getElementById('provisionInput').click()">
                اضغط لاختيار التكون
                <input type="file" id="provisionInput" accept=".mobileprovision" required>
            </div>
        </div>

        <div class="form-group">
            <label>كلمة المرور للشهادة</label>
            <input type="password" placeholder="أدخل كلمة المرور" required>
        </div>

        <button type="submit">بدء التوقيع</button>
    </form>

    <a href="https://t.me/PUBG_RIM" target="_blank" class="telegram-link">انضم إلى قناتنا على تيليجرام</a>
</div>

<div class="options-overlay" id="appOverlay" onclick="if(event.target === this) this.style.display = 'none'">
    <div class="options-content">
        <div class="option-item" onclick="selectApp('ESign')"><span class="icon icon-e">E</span> ESign</div>
        <div class="option-item" onclick="selectApp('KSign')"><span class="icon icon-k">K</span> KSign</div>
        <div class="option-item" onclick="selectApp('Scarlet')"><span class="icon icon-s">S</span> Scarlet</div>
        <div class="option-item" onclick="selectApp('Feather')"><span class="icon icon-f">F</span> Feather</div>
        <div class="option-item" onclick="selectApp('GBox')"><span class="icon icon-g">G</span> GBox</div>
    </div>
</div>

<script>
    function selectApp(appName) {
        document.getElementById('appSelectBtn').innerText = appName;
        document.getElementById('appOverlay').style.display = 'none';
    }
</script>

</body>
</html>
