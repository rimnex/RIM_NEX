<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
body{background:#000;margin:0;padding:20px;font-family:Arial;color:#fff}
.card{background:#0a0a0a;border:1px solid #222;border-radius:24px;padding:24px;max-width:380px;margin:auto}
.logo{text-align:center;font-size:28px;font-weight:900;color:#D4AF37;margin-bottom:5px}
.sub{text-align:center;color:#666;font-size:12px;margin-bottom:25px}
.row{background:#111;border:1px solid #222;border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.badge{background:#D4AF37;color:#000;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900}
.upload{border:2px dashed #333;border-radius:14px;padding:20px;text-align:center;color:#888;margin-bottom:12px;cursor:pointer}
.upload.active{border-color:#D4AF37;color:#D4AF37}
.file-name{color:#fff;font-size:12px;margin-top:8px;display:none}
.btn{background:#D4AF37;color:#000;border:0;border-radius:14px;width:100%;padding:16px;font-weight:900;font-size:16px}
input[type="file"]{display:none}
input[type="password"]{background:#111;border:1px solid #222;border-radius:14px;width:100%;padding:14px;color:#fff;text-align:right;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">RIM_NEX 🛡️</div>
  <div class="sub">IPA Signing Center</div>

  <div class="row">
    <span>الشهادة المجانية</span>
    <input type="checkbox" checked style="width:50px;height:30px">
  </div>

  <div style="text-align:right;color:#666;font-size:12px;margin-bottom:6px">اختر تطبيق التوقيع</div>
  <div class="row">
    <span>▼</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span>ESign</span>
      <div class="badge">E</div>
    </div>
  </div>

  <label class="upload" for="p12">
    📄 اضغط لرفع P12 Certificate
    <div class="file-name" id="p12-name"></div>
  </label>
  <input type="file" id="p12" accept=".p12">

  <label class="upload" for="mobileprovision">
    📁 اضغط لرفع Provision Profile
    <div class="file-name" id="mobile-name"></div>
  </label>
  <input type="file" id="mobileprovision" accept=".mobileprovision">

  <input type="password" placeholder="Password">
  <button class="btn">بدء التوقيع</button>
</div>

<script>
// لما تختار ملف P12
document.getElementById('p12').onchange = function(e){
  let name = e.target.files[0].name;
  document.getElementById('p12-name').innerText = name;
  document.getElementById('p12-name').style.display = 'block';
  e.target.parentElement.classList.add('active');
}

// لما تختار ملف Provision
document.getElementById('mobileprovision').onchange = function(e){
  let name = e.target.files[0].name;
  document.getElementById('mobile-name').innerText = name;
  document.getElementById('mobile-name').style.display = 'block';
  e.target.parentElement.classList.add('active');
}
</script>
</body>
</html>
