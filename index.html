<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RIM_NEX - IOS SIGNING MANAGER</title>
<style>
:root{
  --bg:#0d0d0d;
  --card:#121212;
  --border:rgba(212,175,55,0.25);
  --gold:linear-gradient(135deg,#8f6b1f,#d4af37,#f7d774,#b8860b);
  --gold-solid:#d4af37;
  --text:#fff;
  --muted:#888;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
body{background:radial-gradient(ellipse at top,rgba(212,175,55,0.15) 0%,transparent 50%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}
.header{text-align:center;padding:10px 0 30px}
.header h1{font-size:34px;font-weight:900;background:var(--gold);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:1px;display:inline-flex;align-items:center;gap:10px}
.header p{color:var(--muted);font-size:11px;letter-spacing:3px;margin-top:6px}
.card{background:rgba(18,18,18,0.8);border:1px solid var(--border);border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 0 20px rgba(212,175,55,0.08)}

/* Toggle */
.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text.title{font-size:15px;font-weight:700}
.toggle-text.sub{font-size:11px;color:var(--muted);margin-top:4px}
.switch{position:relative;width:54px;height:32px;flex-shrink:0}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#1f1f1f;border-radius:32px;cursor:pointer;transition:.3s;border:1px solid var(--border)}
.slider:before{content:"";position:absolute;width:26px;height:26px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold);box-shadow:0 0 15px rgba(212,175,55,0.4)}
input:checked +.slider:before{transform:translateX(22px)}

/* Select */
.select-wrap{position:relative}
.select-box{background:#0f0f0f;border:1px solid var(--border);border-radius:18px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:10px}
.app-icon{width:36px;height:36px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:14px;box-shadow:0 0 12px rgba(212,175,55,0.3)}
.arrow{transition:.3s}
.arrow.rotate{transform:rotate(180deg)}
.dropdown{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#111;border:1px solid var(--border);border-radius:16px;padding:6px;z-index:10;display:none}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;cursor:pointer}
.dropdown-item:hover{background:#1a1a1a}

/* Upload */
.upload-box{border:1.5px dashed var(--border);border-radius:20px;padding:22px 16px;text-align:center;cursor:pointer;transition:.3s}
.upload-box:hover{border-color:var(--gold-solid)}
.upload-icon{width:56px;height:56px;border-radius:18px;background:var(--gold);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(212,175,55,0.3)}
.upload-icon svg{width:26px;height:26px;fill:#000}
.upload-box.title{font-size:15px;font-weight:700;margin-bottom:5px}
.upload-box.sub{font-size:12px;color:var(--muted)}
.file-name{font-size:12px;color:var(--gold-solid);margin-top:8px}

/* Password */
.input-wrap{background:#0f0f0f;border:1px solid var(--border);border-radius:18px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.input-pass{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px}
.pass-icons{display:flex;gap:14px}
.pass-icons svg{width:20px;height:20px;fill:var(--muted);cursor:pointer}
.pass-icons.lock{fill:var(--gold-solid)}

/* Button */
.btn{width:100%;padding:15px;border:none;border-radius:18px;background:var(--gold);color:#000;font-weight:900;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(212,175,55,0.35)}
.btn:active{transform:scale(.98)}
.btn svg{width:18px;height:18px;fill:#000}

.progress{height:5px;background:#1f1f1f;border-radius:10px;overflow:hidden;margin:12px 0;display:none}
.progress-bar{height:100%;width:0;background:var(--gold);transition:width.3s}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--border);padding:12px 20px;border-radius:14px;opacity:0;transition:.4s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
