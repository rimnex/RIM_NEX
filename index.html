<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RIM_NEX - iOS Signing Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(ellipse at 50% -20%,rgba(212,175,55,0.2) 0%,#000 60%),#000;
  min-height:100vh;padding:20px;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}
.container{max-width:450px;margin:0 auto}
.header{text-align:center;padding:40px 0 30px}
.header h1{
  font-size:38px;font-weight:900;
  background:linear-gradient(180deg,#FFD700 0%,#D4AF37 50%,#B8860B 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:10px
}
.header p{color:#888;font-size:11px;letter-spacing:6px;margin-top:8px;font-weight:500}
.card{
  background:rgba(15,15,15,0.95);border:1.5px solid rgba(212,175,55,0.3);
  border-radius:20px;padding:20px;margin-bottom:16px;backdrop-filter:blur(10px);
  transition:all 0.3s
}
.card:hover{border-color:#d4af37;transform:translateY(-2px)}
.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-info b{font-size:16px;display:block}
.toggle-info small{font-size:12px;color:#777;margin-top:4px;display:block}
.switch{
  width:54px;height:32px;background:linear-gradient(180deg,#FFD700,#D4AF37);
  border-radius:32px;position:relative;cursor:pointer
}
.switch::after{
  content:"";width:28px;height:28px;background:#fff;border-radius:50%;
  position:absolute;right:2px;top:2px;transition:0.3s
}
.upload-box{
  border:2px dashed rgba(212,175,55,0.4);text-align:center;cursor:pointer;padding:25px 20px
}
.upload-box:hover{border-color:#d4af37;background:rgba(212,175,55,0.05)}
.upload-icon{
  width:55px;height:55px;margin:0 auto 12px;border-radius:16px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);
  display:flex;align-items:center;justify-content:center;font-size:26px
}
.upload-box b{font-size:16px;display:block}
.upload-box small{font-size:12px;color:#777;margin-top:5px;display:block}
.file-name{color:#FFD700;font-size:13px;margin-top:8px;font-weight:600}
.select-box{display:flex;justify-content:space-between;align-items:center}
.select-left{display:flex;align-items:center;gap:14px}
.select-icon{
  width:48px;height:48px;border-radius:16px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);
  display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:22px
}
.input-box{display:flex;justify-content:space-between;align-items:center}
.input-box input{
  background:transparent;border:none;color:#fff;width:85%;
  text-align:right;font-size:15px;outline:none
}
.btn{
  width:100%;padding:20px;border:none;border-radius:16px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);color:#000;
  font-weight:900;font-size:17px;margin-top:15px;cursor:pointer;
  transition:all 0.3s
}
.btn:hover{transform:scale(1.02);box-shadow:0 0 20px rgba(212,175,55,0.4)}
.btn:active{transform:scale(0.98)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🛡️ RIM_NEX</h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <div class="toggle-info">
      <b>شهادة التوقيع الخاصة بي</b>
      <small>استخدم شهادة Apple Developer الخاصة بك</small>
    </div>
    <div class="switch" onclick="this.classList.toggle('off')"></div>
  </div>

  <div class="card upload-box" onclick="pickFile('p12')">
    <div class="upload-icon">✦</div>
    <b>شهادة P12</b>
    <small>اسحب الملف هنا أو اضغط للتصفح</small>
    <div class="file-name" id="p12-name"></div>
  </div>

  <div class="card upload-box" onclick="pickFile('prov')">
    <div class="upload-icon">📁</div>
    <b>Provisioning Profile</b>
    <small>اسحب الملف هنا أو اضغط للتصفح</small>
    <div class="file-name" id="prov-name"></div>
  </div>

  <div class="card input-box">
    <input type="password" id="cert-pass" placeholder="كلمة مرور الشهادة">
    <span onclick="togglePass()" style="cursor:pointer">👁️</span>
  </div>

  <button class="btn" onclick="startSign()">بدء التوقيع ✍️</button>
</div>
