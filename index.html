<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX - حل مشاكل الحسابات المحظورة</title>
<meta name="description" content="مركز متخصص لمساعدة المستخدمين في حل مشاكل الحسابات المحظورة">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
/* ================================== VARIABLES ================================== */
:root{
  --bg:#0d0d0d;
  --card:#171717;
  --gold:#d4af37;
  --gold-light:#e6c757;
  --border:rgba(255,255,255,.08);
  --success:#3ecf8e;
  --error:#ff5d73;
  --text:#f5f5f5;
  --muted:#a1a1a1;
}

/* ================================== RESET & BASE ================================== */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  position:relative;
}

/* Noise Overlay */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns=N/A%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1;
}

/* Animated Blobs */
.blob{
  position:fixed;border-radius:50%;filter:blur(120px);opacity:0.15;
  animation:floatBlob 20s infinite ease-in-out;z-index:0
}
.blob1{width:500px;height:500px;background:var(--gold);top:-200px;right:-200px;animation-delay:0s}
.blob2{width:400px;height:400px;background:var(--gold-light);bottom:-150px;left:-150px;animation-delay:5s}
.blob3{width:350px;height:350px;background:var(--gold);top:50%;left:50%;animation-delay:10s}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-50px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.9)}}

/* Glass Effect */
.glass{
  background:rgba(23,23,23,0.55);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
}

/* Container */
.container{max-width:1200px;margin:0 auto;padding:0 20px;position:relative;z-index:2}

/* ================================== LOADER ================================== */
.loader{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;align-items:center;justify-content:center;
  animation:fadeOut 1s ease 1s forwards
}
.loader-logo{font-size:48px;font-weight:800;color:var(--gold);animation:pulse 1s infinite}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ================================== HEADER ================================== */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,13,0.7);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  animation:fadeDown 0.6s ease
}
@keyframes fadeDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 0}
.logo{display:flex;align-items:center;gap:12px;font-weight:800;font-size:20px}
.logo-box{
  width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  color:#000;font-weight:800;font-size:18px
}
.badge{
  background:rgba(62,207,142,0.1);border:1px solid rgba(62,207,142,0.3);
  color:var(--success);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600
}

/* ================================== HERO ================================== */
.hero{text-align:center;padding:120px 0 80px;animation:fadeUp 0.8s ease}
.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:52px;font-weight:700;line-height:1.1;margin-bottom:16px
}
.hero h1 span{
  background:linear-gradient(90deg,#fff,var(--gold),#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-size:200% 100%;animation:shine 3s infinite
}
@keyframes shine{0%{background-position:0%}100%{background-position:200%}}
.hero p{font-size:18px;color:var(--muted);margin-bottom:24px}
.hero-line{
  width:80px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0 auto;animation:expand 1.2s ease 0.5s both
}
@keyframes expand{from{width:0}to{width:80px}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ================================== FORM CARD ================================== */
.form-card{
  max-width:760px;margin:0 auto;padding:40px;border-radius:28px;
  background:rgba(23,23,23,0.6);backdrop-filter:blur(24px);
  border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,0.5);
  animation:fadeUp 0.8s ease 0.2s both
}

/* Platform Grid */
.step-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--gold)}
.platforms{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px}
@media(min-width:768px){.platforms{grid-template-columns:repeat(3,1fr)}}

.platform{
  position:relative;padding:20px;border-radius:16px;cursor:pointer;
  background:rgba(23,23,23,0.5);border:1px solid var(--border);
  transition:.3s;overflow:hidden
}
.platform::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(600px circle at var(--x) var(--y),rgba(212,175,55,0.15),transparent 80%);
  opacity:0;transition:opacity .3s
}
.platform:hover::before{opacity:1}
.platform:hover{transform:translateY(-4px)}
.platform.active{
  border-color:var(--gold);
  background:rgba(212,175,55,0.05);
  box-shadow:0 0 0 2px var(--gold),0 0 30px rgba(212,175,55,.2);
  animation:borderPulse 2s infinite
}
@keyframes borderPulse{0%,100%{box-shadow:0 0 0 2px var(--gold),0 0 30px rgba(212,175,55,.2)}50%{box-shadow:0 0 0 2px var(--gold),0 0 50px rgba(212,175,55,.4)}}
.platform svg{width:32px;height:32px;margin-bottom:10px;fill:var(--muted)}
.platform.active svg{fill:var(--gold)}
.platform h3{font-size:15px;font-weight:700;margin-bottom:4px}
.platform p{font-size:12px;color:var(--muted)}
.check-icon{
  position:absolute;top:12px;left:12px;width:20px;height:20px;
  background:var(--gold);border-radius:50%;display:none;align-items:center;justify-content:center
}
.platform.active .check-icon{display:flex;animation:scaleIn .3s}
@keyframes scaleIn{from{transform:scale(0)}to{transform:scale(1)}}

/* Step 2 */
.step2{
  max-height:0;opacity:0;overflow:hidden;
  transition:max-height .5s ease,opacity .5s ease
}
.step2.show{max-height:500px;opacity:1;margin-top:24px}

.field{margin-bottom:18px}
.custom-select,textarea{
  width:100%;padding:16px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;color:var(--text);font-size:14px;font-family:inherit;
  outline:none;transition:.3s
}
.custom-select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,175,55,.1)}
textarea{min-height:140px;resize:vertical}
.char-count{text-align:left;font-size:12px;color:var(--muted);margin-top:6px}

/* Button */
.btn{
  width:100%;padding:18px;background:linear-gradient(90deg,var(--gold),var(--gold-light));
  border:none;border-radius:14px;color:#000;font-size:17px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  position:relative;overflow:hidden;transition:.3s
}
.btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  transition:.5s
}
.btn:hover::before{left:100%}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 35px rgba(212,175,55,.4)}
.btn:active{transform:translateY(0)}
.btn svg{width:20px;height:20px}

/* ================================== FEATURES ================================== */
.features{padding:100px 0}
.section-title{text-align:center;font-size:32px;font-weight:800;margin-bottom:50px}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.feature-card{
  padding:28px;border-radius:20px;opacity:0;transform:translateY(20px);
  transition:.5s
}
.feature-card.visible{opacity:1;transform:translateY(0)}
.feature-card:hover{transform:translateY(-6px);border-color:var(--gold)}
.feature-icon{color:var(--gold);font-size:24px;margin-bottom:12px}
.feature-card h3{font-size:18px;margin-bottom:8px}
.feature-card p{font-size:14px;color:var(--muted)}

/* ================================== STATS ================================== */
.stats{
  padding:80px 0;background:linear-gradient(135deg,rgba(212,175,55,0.08),rgba(212,175,55,0.03));
  border-top:1px solid var(--border);border-bottom:1px solid var(--border)
}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:30px}
@media(min-width:768px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{text-align:center}
.stat-num{font-size:40px;font-weight:800;color:var(--gold);margin-bottom:6px}
.stat-label{font-size:14px;color:var(--muted)}

/* ================================== FAQ ================================== */
.faq{padding:100px 0}
.accordion{max-width:700px;margin:0 auto}
.accordion-item{
  margin-bottom:12px;border-radius:14px;overflow:hidden
}
.accordion-header{
  padding:20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  font-weight:700
}
.accordion-content{
  max-height:0;overflow:hidden;transition:max-height .4s ease
}
.accordion-content p{padding:0 20px 20px;color:var(--muted);font-size:14px;line-height:1.8}
.accordion-item.active .accordion-content{max-height:200px}

/* ================================== FOOTER ================================== */
footer{padding:60px 0;border-top:1px solid var(--border);text-align:center}
footer h3{font-size:24px;margin-bottom:8px}
footer p{color:var(--muted);margin-bottom:16px}
footer a{color:var(--gold);text-decoration:none}
footer .copy{margin-top:30px;font-size:12px;color:var(--muted)}

/* ================================== TOAST ================================== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  padding:14px 24px;border-radius:12px;font-weight:600;font-size:14px;
  opacity:0;transition:.4s cubic-bezier(.4,0,.2,1);z-index:999
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:rgba(62,207,142,0.15);border:1px solid var(--success);color:var(--success)}
.toast.error{background:rgba(255,93,115,0.15);border:1px solid var(--error);color:var(--error)}

/* Mobile */
@media(min-width:768px){.hero h1{font-size:88px}}
</style>
</head>
