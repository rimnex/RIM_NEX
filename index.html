<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX | iOS Signing Manager</title>
<style>
:root{ --gold:#FFC107; }
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Arial,sans-serif}
body{
  background:#000;min-height:100vh;padding:40px 16px 120px;color:#fff;
}
.spotlight{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;height:60vh;
  background: radial-gradient(ellipse 60% 100% at 50% 0%, 
    rgba(255,240,180,0.20) 0%,
    rgba(255,193,7,0.10) 30%,
    transparent 70%
  );
  pointer-events:none;z-index:0;
}
.container{max-width:420px;margin:0 auto;position:relative;z-index:2}
.header{text-align:center;margin-bottom:30px}
.logo{font-size:32px;font-weight:900;color:var(--gold)}
.sub{font-size:11px;letter-spacing:2px;color:#777;margin-top:6px}

.card{
  background:rgba(15,15,15,0.85);border:1px solid rgba(255,193,7,0.2);
  border-radius:22px;padding:18px;backdrop-filter:blur(15px)
}
.section-title{text-align:center;color:#999;margin-bottom:15px;font-size:14px}

.app-card{
  background:rgba(20,20,20,0.7);border:1px solid rgba(255,193,7,0.2);
  border-radius:18px;padding:16px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
  text-decoration:none;color:#fff;transition:.3s
}
.app-card:hover{border-color:var(--gold);transform:scale(1.01)}
.app-info{display:flex;align-items:center;gap:12px}
.app-icon{
  width:54px;height:54px;border-radius:16px;
  background:linear-gradient(135deg,#FFC107,#FFA000);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#000;font-size:22px;
  box-shadow:0 0 20px rgba(255,193,7,.5)
}
.app-text .name{font-size:17px;font-weight:800}
.app-text .status{font-size:12px;color:#00ff88;margin-top:3px}
</style>
</head>
<body>

<div class="spotlight"></div>

<div class="container">
  <div class="header">
    <div class="logo">🛡️ RIM_NEX</div>
    <div class="sub">IOS SIGNING MANAGER</div>
  </div>

  <div class="card">
    <div class="section-title">التطبيقات الجاهزة للتثبيت</div>

    <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/ESign.plist">
      <div class="app-info">
        <div class="app-icon">E</div>
        <div class="app-text">
          <div class="name">ESign</div>
          <div class="status">جاهز للتثبيت</div>
        </div>
      </div>
    </a>

    <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/KSign.plist">
      <div class="app-info">
        <div class="app-icon">K</div>
        <div class="app-text">
          <div class="name">KSign</div>
          <div class="status">جاهز للتثبيت</div>
        </div>
      </div>
    </a>

    <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/Scarlet.plist">
      <div class="app-info">
        <div class="app-icon">S</div>
        <div class="app-text">
          <div class="name">Scarlet</div>
          <div class="status">جاهز للتثبيت</div>
        </div>
      </div>
    </a>

    <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/GBox.plist">
      <div class="app-info">
        <div class="app-icon">G</div>
        <div class="app-text">
          <div class="name">GBox</div>
          <div class="status">جاهز للتثبيت</div>
        </div>
      </div>
    </a>

    <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/Feather.plist">
      <div class="app-info">
        <div class="app-icon">F</div>
        <div class="app-text">
          <div class="name">Feather</div>
          <div class="status">جاهز للتثبيت</div>
        </div>
      </div>
    </a>

  </div>
</div>

</body>
</html>
