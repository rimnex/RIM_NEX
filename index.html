<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX App Store</title>
    <style>
        body {
            background-color: #000;
            color: #d4af37;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #d4af37;
            text-shadow: 0 0 15px #d4af37;
            margin-bottom: 10px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 40px;
        }
        .app-card {
            background-color: #111;
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 20px;
            width: 160px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .app-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 30px #d4af37;
        }
        a {
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            display: block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>RIM_NEX App Store</h1>
    <p>متجر تطبيقات iOS وخدمات VIP</p>
    <div class="container">
        <div class="app-card">
            <h3>ESign</h3>
            <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/esign.plist">تثبيت</a>
        </div>
        <div class="app-card">
            <h3>KSign</h3>
            <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/ksign.plist">تثبيت</a>
        </div>
        <div class="app-card">
            <h3>GBox</h3>
            <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/gbox.plist">تثبيت</a>
        </div>
        <div class="app-card">
            <h3>Scarlet</h3>
            <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/scarlet.plist">تثبيت</a>
        </div>
        <div class="app-card">
            <h3>Feather</h3>
            <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/feather.plist">تثبيت</a>
        </div>
    </div>
</body>
</html>
