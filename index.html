<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر RIM_NEX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* إعدادات الخلفية السوداء العميقة */
        body {
            background-color: #000000;
            background-image: radial-gradient(circle at center, #111111 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .gold-text {
            background: linear-gradient(45deg, #FFD700, #DAA520, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        .container {
            padding: 20px;
        }
        .app-list {
            list-style: none;
            padding: 0;
            max-width: 400px;
            margin: 0 auto;
        }
        .app-item {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }
        .app-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #FFD700;
        }
        .app-name {
            font-size: 18px;
            font-weight: bold;
        }
        .install-btn {
            background: linear-gradient(45deg, #FFD700, #DAA520);
            color: #000000;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .install-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="gold-text">RIM_NEX</h1>
        <p>التطبيقات موقعة بشهادة مجانية</p>
        <p>الزوار: 27896</p>
        
        <ul class="app-list">
            <li class="app-item">
                <span class="app-name">تيك توك</span>
                <a href="tiktok.plist" class="install-btn">تثبيت</a>
            </li>
            <li class="app-item">
                <span class="app-name">تيليجرام</span>
                <a href="telegram.plist" class="install-btn">تثبيت</a>
            </li>
            <li class="app-item">
                <span class="app-name">واتساب</span>
                <a href="whatsapp.plist" class="install-btn">تثبيت</a>
            </li>
            <li class="app-item">
                <span class="app-name">يوتيوب</span>
                <a href="youtube.plist" class="install-btn">تثبيت</a>
            </li>
            <li class="app-item">
                <span class="app-name">نتفليكس</span>
                <a href="netflix.plist" class="install-btn">تثبيت</a>
            </li>
            <li class="app-item">
                <span class="app-name">eSign</span>
                <a href="esign.plist" class="install-btn">تثبيت</a>
            </li>
            <li class="app-item">
                <span class="app-name">K-SIGN</span>
                <a href="ksign.plist" class="install-btn">تثبيت</a>
            </li>
        </ul>
    </div>
</body>
</html>
