<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
:root{
  --bg:#000;
  --border:#d4af37;
  --gold:linear-gradient(135deg,#b8860b 0%,#ffd700 50%,#b8860b 100%);
  --text:#fff;
  --muted:#666;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system}
body{background:radial-gradient(ellipse at 50% -5%,rgba(212,175,55,0.25) 0%,transparent 70%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}
.header{text-align:center;padding:45px 0 40px}
.header-title{display:flex;align-items:center;justify-content:center;gap:12px}
.shield{width:36px;height:36px}
.shield path{fill:url(#goldGrad)}
.header h1{font-size:40px;font-weight:900;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:10px;letter-spacing:5px;margin-top:10px}
.card{background:transparent;border:2px solid var(--border);border-radius:24px;padding:20px;margin-bottom:18px}
.card.dashed{border:2px dashed var(--border)}
.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text b{font-size:16px}
.toggle-text small{font-size:12px;color:var(--muted);display:block;margin-top:4px}
.switch{position:relative;width:58px;height:36px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#0a0a0a;border-radius:36px;cursor:pointer;border:1.5px solid var(--border)}
.slider:before{content:"";position:absolute;width:30px;height:30px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold)}
input:checked +.slider:before{transform:translateX(22px)}
.select-box{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:14px}
.app-icon{width:46px;height:46px;border-radius:15px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:21px}
.dropdown{display:none;background:#000;border:2px solid var(--border);border-radius:20px;margin-top:12px;padding:8px}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;cursor:pointer;justify-content:flex-end}
.upload{text-align:center}
.upload b{font-size:16px}
.upload small{font-size:12px;color:var(--muted);margin-top:6px;display:block}
.file-name{font-size:13px;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;margin-top:8px}
.input-wrap{display:flex;align-items:center;justify-content:space-between}
.input-pass{background:transparent;border:none;outline:none;color:var(--muted);width:90%;text-align:right;font-size:15px}
.btn{width:100%;padding:20px;border:none;border-radius:18px;background:var(--gold);color:#000;font-weight:900;font-size:18px;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px}
</style>
</head>
<body>
<svg width="0" height="0"><defs><linearGradient id="goldGrad"><stop offset="0%" stop-color="#b8860b"/><stop offset="50%" stop-color="#ffd700"/><stop offset="100%" stop-color="#b8860b"/></linearGradient></defs></svg>
<div class="container">
  <div class="header">
    <div class="header-title">
      <svg class="shield" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      <h1>RIM_NEX</h1>
    </div>
    <p>IOS SIGNING MANAGER</p>
  </div>
  <div class="card toggle">
    <div class="switch"><input type="checkbox" checked><span class="slider"></span></div>
    <div class="toggle-text"><b>شهادة التوقيع الخاصة بي</b><small>استخدم شهادة Apple Developer</small></div>
  </div>
  <div class="card">
    <div class="select-box" id="selectBox"><div>▼</div><div class="select-left"><span id="selectedName">ESign</span><div class="app-icon" id="selectedIcon">E</div></div></div>
    <div class="dropdown" id="dropdown">
      <div class="dropdown-item" data-name="ESign" data-icon="E"><span>ESign</span><div class="app-icon">E</div></div>
    </div>
  </div>
  <div class="card dashed upload" id="p12Card"><b>شهادة P12</b><small>اسحب الملف هنا</small><div class="file-name" id="p12Name"></div><input type="file" id="p12" hidden></div>
  <div class="card dashed upload" id="provCard"><b>Provisioning Profile</b><small>اسحب الملف هنا</small><div class="file-name" id="provName"></div><input type="file" id="prov" hidden></div>
  <div class="card input-wrap"><span id="togglePass">👁️</span><input type="password" class="input-pass" id="password" placeholder="Password"></div>
  <button class="btn" id="signBtn">بدء التوقيع والتثبيت</button>
</div>
<script>
document.getElementById('selectBox').onclick = () => document.getElementById('dropdown').classList.toggle('show');
document.getElementById('p12Card').onclick = () => document.getElementById('p12').click();
document.getElementById('provCard').onclick = () => document.getElementById('prov').click();
</script>
</body>
</html>
