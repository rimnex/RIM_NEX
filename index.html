<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX Signer</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #000000;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
        }
        h2, h3 {
            text-align: center;
            color: #d4af37;
            margin: 10px 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
        }
        select, input[type="password"], .file-upload {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #d4af37;
            background-color: #222;
            color: #fff;
            box-sizing: border-box;
            text-align: right;
        }
        .file-upload {
            border: 2px dashed #d4af37;
            text-align: center;
            cursor: pointer;
            padding: 15px;
        }
        .file-upload input {
            display: none;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #d4af37;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
        }
        .telegram-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>RIM_NEX</h2>
    <h3>CLOUD SIGNER</h3>

    <div class="form-group">
        <label>اختر التطبيق...</label>
        <select>
            <option>ESign</option>
            <option>KSign</option>
            <option>Scarlet</option>
            <option>Feather</option>
            <option>GBox</option>
        </select>
    </div>

    <div class="form-group">
        <label>ملف P12</label>
        <div class="file-upload" onclick="document.getElementById('p12').click()">
            اضغط لاختيار الشهادة
            <input type="file" id="p12" accept=".p12">
        </div>
    </div>

    <div class="form-group">
        <label>ملف Provision</label>
        <div class="file-upload" onclick="document.getElementById('provision').click()">
            اضغط لاختيار التكوين
            <input type="file" id="provision" accept=".mobileprovision">
        </div>
    </div>

    <div class="form-group">
        <label>كلمة المرور للشهادة</label>
        <input type="password" placeholder="أدخل كلمة المرور">
    </div>

    <button>بدء التوقيع</button>

    <a href="https://t.me/PUBG_RIM" class="telegram-link">انضم إلى قناتنا على تيليجرام</a>
</div>

</body>
</html>
