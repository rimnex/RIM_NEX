<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
:root{
  --bg:#000;
  --border:#c9a961;
  --gold:linear-gradient(180deg,#ffd700 0%,#d4af37 50%,#b8860b 100%);
  --text:#ffffff;
  --muted:#888;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display"}
body{background:radial-gradient(ellipse at 50% -30%,rgba(201,169,97,0.2) 0%,transparent 60%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}

.header{text-align:center;padding:50px 0 40px}
.header-title{display:flex;align-items:center;justify-content:center;gap:12px}
.shield{width:38px;height:38px;fill:url(#goldGrad)}
.header h1{font-size:42px;font-weight:900;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.header p{color:var(--muted);font-size:11px;letter-spacing:5px;margin-top:10px}

.card{background:rgba(5,5,5,0.9);border:1.5px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px}
.card.dashed{border:1.5px dashed var(--border);background:rgba(5,5,5,0.7)}

.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text b{font-size:17px;font-weight:700}
.toggle-text small{font-size:12px;color:var(--muted);display:block;margin-top:5px}
.switch{position:relative;width:60px;height:36px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:var(--gold);border-radius:36px;cursor:pointer}
.slider:before{content:"";position:absolute;width:30px;height:30px;right:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider:before{transform:translateX(-24px)}

.select-wrapper{position:relative}
.select-box{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:14px}
.app-icon{width:48px;height:48px;border-radius:16px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:22px}
.arrow{font-size:18px;color:#fff;transition:.3s}
.arrow.rotate{transform:rotate(180deg)}
.dropdown{display:none;position:absolute;top:calc(100% + 10px);left:0;right:0;background:#030303;border:1.5px solid var(--border);border-radius:18px;padding:8px;z-index:999}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:14px;padding:14px;border-radius:12px;cursor:pointer;justify-content:flex-end}
.dropdown-item:hover{background:#0f0f0f}

.upload{text-align:center;cursor:pointer}
.upload b{font-size:17px;font-weight:700}
.upload small{font-size:12px;color:var(--muted);margin-top:6px;display:block}
.file-name{font-size:14px;color:#d4af37;font-weight:700;margin-top:8px}

.input-wrap{display:flex;align-items:center;justify-content:space-between}
.input-pass{background:transparent;border:none;outline:none;color:var(--text);width:85%;text-align:right;font-size:16px}
.input-pass::placeholder{color:var(--muted)}
.eye{font-size:22px;cursor:pointer;opacity:0.6}

.btn{width:100%;padding:20px;border:none;border-radius:18px;background:var(--gold);color:#000;font-weight:900;font-size:18px;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer}
</
