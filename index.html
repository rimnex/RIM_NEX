<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX - IPA Signing Center</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#0d0d0d;
  --card:#141414;
  --border:rgba(255,255,255,.08);
  --gold:linear-gradient(135deg,#8f6b1f,#d4af37,#f7d774,#b8860b);
  --gold-solid:#d4af37;
  --text:#f5f5f5;
  --muted:#999;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
body{background:var(--bg);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;color:var(--text);background-image:radial-gradient(circle at 50% 20%,rgba(212,175,55,0.08) 0%,transparent 60%)}
.container{width:100%;max-width:430px;animation:fadeIn .6s ease}
.card{background:rgba(20,20,20,0.7);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:32px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:28px;font-weight:800;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:13px;margin-top:4px}

.toggle{display:flex;justify-content:space-between;align-items:center;background:#0f0f0f;border:1px solid var(--border);padding:14px 16px;border-radius:20px;margin-bottom:14px}
.switch{position:relative;width:50px;height:28px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#2a2a2a;border-radius:28px;cursor:pointer;transition:.3s}
.slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold)}
input:checked +.slider:before{transform:translateX(22px)}

.field{margin-bottom:14px;position:relative}
.field-label{font-size:13px;color:var(--muted);margin-bottom:8px}
.select-box{background:#0f0f0f;border:1px solid var(--border);border-radius:20px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.3s}
.select-box:hover{border-color:var(--gold-solid)}
.select-left{display:flex;align-items:center;gap:10px}
.app-icon{width:32px;height:32px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:800;font-size:12px;box-shadow:0 4px 12px rgba(212,175,55,0.3)}

.dropdown{position:absolute;top:110%;left:0;right:0;background:#111;border:1px solid var(--border);border-radius:18px;padding:8px;z-index:10;display:none;animation:slideDown .25s ease}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;cursor:pointer;transition:.2s}
.dropdown-item:hover{background:#1a1a1a}

.upload-box{background:#0f0f0f;border:2px dashed var(--border);border-radius:20px;padding:18px;text-align:center;cursor:pointer;transition:.3s}
.upload-box:hover{border-color:var(--gold-solid);background:#161616}
.upload-box i{font-size:22px;color:var(--gold-solid);margin-bottom:8px;display:block}
.upload-box span{font-size:13px;color:var(--muted)}
.file-name{font-size:12px;color:var(--text);margin-top:6px}

.input-wrap{position:relative}
.input-pass{width:100%;background:#0f0f0f;border:1px solid var(--border);border-radius:20px;padding:14px 16px 14px 44px;color:var(--text);font-size:15px;outline:none}
.input-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--gold-solid)}
.input-pass:focus{border-color:var(--gold-solid);box-shadow:0 0 0 4px rgba(212,175,55,0.1)}

.btn{width:100%;padding:16px;border:none;border-radius:22px;background:var(--gold);color:#000;font-weight:800;font-size:16px;cursor:pointer;position:relative;overflow:hidden;margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,175,55,0.4)}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.4);transform:scale(0);animation:ripple .6s linear}

.progress{height:6px;background:#1f1f1f;border-radius:10px;overflow:hidden;margin-top:12px;display:none}
.progress-bar{height:100%;width:0;background:var(--gold);transition:width .3s}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--border);padding:12px 20px;border-radius:14px;opacity:0;transition:.4s;z-index:99}
.toast.show
