<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX App Store</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            margin-bottom: 30px;
        }
        .header h1 {
            background: linear-gradient(to right, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 36px;
            margin-bottom: 5px;
        }
        .header p {
            color: #bbb;
            margin: 5px 0;
        }
        .creator {
            color: #d4af37;
            font-weight: bold;
        }
        .status {
            background-color: #222;
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .app-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }
        .app-item {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .app-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .app-icon {
            width: 50px;
            height: 50px;
            background-color: #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .install-btn {
            background: linear-gradient(135deg, #d4af37, #ffaa00);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .install-btn:hover {
            background: linear-gradient(135deg, #ffaa00, #d4af37);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RIM_NEX</h1>
        <p>التطبيقات موقعة بشهادة مجانية.</p>
        <p>بواسطة: <span class="creator">RIM_NEX</span></p>
    </div>

    <div class="status">
        الزوّار: متصل
    </div>

    <div class="app-list">
        <div class="app-item">
            <div class="app-info">
                <div class="app-icon">🎵</div>
                <h3>تيك توك</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon">✈️</div>
                <h3>تيليجرام</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon">💬</div>
                <h3>واتساب</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon">📺</div>
                <h3>Netflix</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon">🔴</div>
                <h3>يوتيوب</h3>
            </div>
            <a href="#" class="install-btn">تثبيت</a>
        </div>
    </div>

</body>
</html>
