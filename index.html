<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX | حل مشاكل الحسابات المحظورة</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Main Container & Spacing */
        main {
            margin-top: 100px;
            padding: 2rem 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            max-width: 800px;
            padding: 2rem 1rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #f8fafc, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            padding: 0.9rem 2.2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 20px var(--primary-glow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px var(--primary-glow);
        }

        /* Form / Service Section */
        .service-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .service-card h2 {
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        /* Alert Notification */
        .alert {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 10px;
            display: none;
            font-weight: 500;
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid var(--accent);
            color: var(--accent);
            display: block;
        }

        /* Footer */
        footer {
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2rem;
            }
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">RIM_NEX</div>
        <ul class="nav-links">
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#service">فحص الحساب</a></li>
            <li><a href="https://t.me/YourTelegramChannel" target="_blank">دعم تليجرام</a></li>
        </ul>
    </header>

    <main>
        <section class="hero">
            <h1>استعد حسابك المحظور بكفاءة واحترافية</h1>
            <p>منصة RIM_NEX المتقدمة لحل مشاكل الحسابات وتقديم الدعم الفني السريع والآمن عبر قنوات اتصال مباشرة.</p>
            <a href="https://t.me/YourTelegramChannel" target="_blank" class="btn">تواصل عبر تليجرام</a>
        </section>

        <section id="service" class="service-card">
            <h2>فحص حالة الحساب</h2>
            <form id="checkForm">
                <div class="form-group">
                    <label for="username">اسم المستخدم أو البريد الإلكتروني</label>
                    <input type="text" id="username" class="form-control" placeholder="أدخل اسم المستخدم هنا..." required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">بدء الفحص</button>
            </form>
            <div id="alertBox" class="alert"></div>
        </section>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 RIM_NEX | <a href="https://t.me/YourTelegramChannel" target="_blank">قناة الدعم الفني</a></p>
    </footer>

    <script>
        document.getElementById('checkForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const alertBox = document.getElementById('alertBox');
            
            if (username) {
                alertBox.className = 'alert success';
                alertBox.textContent = `تم استلام طلب الفحص للحساب: (${username}). سيتم تحويلك إلى الدعم الفني لمتابعة الحالة.`;
                
                setTimeout(() => {
                    window.open('https://t.me/YourTelegramChannel', '_blank');
                }, 2000);
            }
        });
    </script>
</body>
</html>
