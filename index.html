<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX - Gold</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070707;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px 14px;font-family:system-ui,-apple-system,'Cairo',Arial,sans-serif;color:#EDE8D8}
.card{width:100%;max-width:390px;background:#16130E;border:1px solid rgba(212,175,55,0.22);border-radius:26px;padding:24px 18px 18px;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
.title-row{display:flex;align-items:center;justify-content:center;gap:10px}
h1{font-size:34px;font-weight:900;color:#E9C86A;letter-spacing:.5px;line-height:1}
.shield{width:32px;height:32px;border-radius:9px;background:linear-gradient(180deg,#FFFFFF 0%,#D1D5DB 45%,#9CA3AF 100%);display:grid;place-items:center;border:1px solid #E5E7EB;box-shadow:0 2px 8px rgba(255,255,255,0.18);font-size:17px;flex-shrink:0}
.sub{text-align:center;color:#8F8A7E;font-size:11.5px;letter-spacing:1px;margin:6px 0 22px}
.box{background:#201D14;border:1px solid rgba(212,175,55,0.13);border-radius:15px;padding:13px 14px;margin-bottom:11px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.toggle-row span{font-size:13.5px;font-weight:700;color:#E6DDC2}
.switch{width:50px;height:28px;background:#2B2920;border-radius:28px;position:relative;transition:.25s;border:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.switch::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;right:2px;transition:.25s;box-shadow:0 1px 5px rgba(0,0,0,.4)}
.switch.on{background:linear-gradient(90deg,#FDE68A,#D4AF37 60%,#8C6B14);box-shadow:0 0 12px rgba(212,175,55,.3)}
.switch.on::after{transform:translateX(-22px);background:#111}
.label{color:#A69F8E;font-size:11.5px;margin:16px 4px 7px}
.select-wrap{position:relative}
.select{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.select-right{display:flex;align-items:center;gap:10px}
.badge{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#FFF2A8,#D4AF37 55%,#9C7A14);color:#1A1400;display:grid;place-items:center;font-weight:800;font-size:16px;border:1px solid rgba(255,255,255,0.25)}
#app-name{font-size:14px;font-weight:700;color:#E8DCC0}
.arrow{color:#6A665C;font-size:10px;transition:.2s}
.select.open.arrow{transform:rotate(180deg)}
.dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;left:0;background:#1D1A12;border:1px solid rgba(212,175,55,0.18);border-radius:14px;overflow:hidden;z-index:20;box-shadow:0 14px 36px rgba(0,0,0,.6)}
.dropdown.show{display:block}
.dropdown-item{padding:11px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;color:#CFC6B0;font-size:13.5px;font-weight:600}
.dropdown-item:hover{background:rgba(212,175,55,0.08)}
.dropdown-item.active{background:rgba(212,175,55,0.13);color:#FFE99A}
.upload{border:1.5px dashed rgba(212,175,55,0.28);border-radius:14px;padding:18px 12px;text-align:center;color:#9A9588;font-size:13px;cursor:pointer;margin-bottom:11px;display:block;background:#1C1911;line-height:1.6;transition:.2s}
.upload:hover{border-color:#D4AF37;background:rgba(212,175,55,0.06)}
.file-name{color:#FFEB85;font-size:10.5px;margin-top:7px;display:none;word-break:break-all;background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.18);padding:5px 8px;border-radius:7px}
.input-wrap{position:relative;margin-bottom:12px}
.input-wrap input{width:100%;background:#201D14;border:1px solid rgba(212,175,55,0.14);border-radius:14px;padding:13px 14px;color:#fff;text-align:right;font-size:13.5px;outline:none;font-family:inherit}
.input-wrap input::placeholder{color:#7A756C}
.input-wrap input:focus{border-color:rgba(212,175,55,0.42)}
.btn{width:100%;display:block;background:linear-gradient(90deg,#FFF0A0 0%,#FFDF6E 20%,#D4AF37 50%,#B78E1E 90%);border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:800;color:#1A1400;cursor:pointer;box-shadow:0 6px 18px rgba(180,135,40,0.32);transition:.18s}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.7}
.tg{margin-top:11px;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;background:#1C1911;border:1px solid rgba(212,175,55,0.16);border-radius:13px;padding:11px;color:#B8B0A0;text-decoration:none;font-size:12.5px;font-weight:700;transition:.2s}
.tg:hover{background:rgba(212,175,55,0.08);color:#FFE9A0;border-color:rgba(212,175,55,0.28)}
.tg svg{width:16px;height:16px}
input[type=file]{display:none}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);background:#221E15;color:#F5E9C0;padding:10px 14px;border-radius:10px;font-size:12px;border:1px solid rgba(212,175,55,0.2);opacity:0;transition:.3s;pointer-events:none;z-index:99;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{margin-top:10px;text-align:center;color:#8E8878;font-size:11px;line-height:1.6;background:rgba(212,175,55,0.06);border:1px dashed rgba(212,175,55,0.18);border-radius:10px;padding:8px 10px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="title-row">
    <h1>RIM_NEX</h1>
    <div class="shield">🛡️</div>
  </div>
  <div class="sub">IPA Signing Center</div>

  <div class="box toggle-row" id="toggleBox"><div class="switch on" id="sw"></div><span>الشهادة المجانية</span></div>

  <div class="label">اختر تطبيق التوقيع</div>
  <div class="select-wrap">
    <div class="box select" id="selBtn"><span class="arrow">▼</span><div class="select-right"><span id="appName">ESign</span><div class="badge" id="appBadge">E</div></div></div>
    <div class="dropdown" id="dd">
      <div class="dropdown-item active" data-l="E" data-n="ESign"><div class="badge">E</div> ESign</div>
      <div class="dropdown-item" data-l="K" data-n="KSign"><div class="badge">K</div> KSign</div>
      <div class="dropdown-item" data-l="S" data-n="Scarlet"><div class="badge">S</div> Scarlet</div>
      <div class="dropdown-item" data-l="G" data-n="GBox"><div class="badge">G</div> GBox</div>
      <div class="dropdown-item" data-l="F" data-n="Feather"><div class="badge">F</div> Feather</div>
    </div>
  </div>

  <label class="upload" id="a1" for="p12">📁 اضغط لرفع P12 Certificate<div class="file-name" id="n1"></div></label>
  <input type="file" id="p12" accept=".p12,.pfx">
  <label class="upload" id="a2" for="mob">📄 اضغط لرفع Provision Profile<div class="file-name" id="n2"></div></label>
  <input type="file" id="mob" accept=".mobileprovision">

  <div class="input-wrap"><input type="password" id="pw" placeholder="كلمة سر الشهادة" required></div>

  <button class="btn" id="go">بدء التوقيع</button>
  <div class="note" id="note">إذا لم تظهر نافذة التثبيت، تأكد من فتح الصفحة في <b>Safari</b> وليس داخل تليجرام.</div>

  <a class="tg" href="https://t.me/ChatPUBG_RIM" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm3.95 7.2-.9 4.26c-.13.57-.48.71-.97.44l-2.69-1.98-1.3 1.25c-.14.14-.26.26-.53.26l.19-2.7 4.9-4.43c.21-.19-.05-.3-.33-.11L8.8 10.5l-2.8-.88c-.6-.19-.62-.6.13-.89l10.9-4.2c.5-.18.94.11.78.89Z"/></svg>
    قناتي تلجرام
  </a>
</div>

<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
const selBtn=$('selBtn'),dd=$('dd'),badge=$('appBadge'),appName=$('appName'),sw=$('sw'),tog=$('toggleBox');
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
selBtn.onclick=e=>{e.stopPropagation();dd.classList.toggle('show');selBtn.classList.toggle('open')};
document.querySelectorAll('.dropdown-item').forEach(it=>{it.onclick=e=>{e.stopPropagation();badge.textContent=it.dataset.l;appName.textContent=it.dataset.n;document.querySelectorAll('.dropdown-item').forEach(x=>x.classList.remove('active'));it.classList.add('active');dd.classList.remove('show');selBtn.classList.remove('open');toast('تم اختيار '+it.dataset.n)}});
document.addEventListener('click',()=>{dd.classList.remove('show');selBtn.classList.remove('open')});
let free=true;tog.onclick=()=>{free=!free;sw.classList.toggle('on',free);toast(free?'الشهادة المجانية مفعلة':'الشهادة المدفوعة مفعلة')};
function bind(inpId,nameId,areaId){const inp=$(inpId),nm=$(nameId),ar=$(areaId);inp.onchange=e=>{const f=e.target.files[0];if(f){nm.textContent='✦ '+f.name;nm.style.display='block';ar.style.borderColor='#D4AF37'}};['dragenter','dragover'].forEach(ev=>ar.addEventListener(ev,e=>{e.preventDefault();ar.style.borderColor='#D4AF37'}));['dragleave','drop'].forEach(ev=>ar.addEventListener(ev,e=>{e.preventDefault()}));ar.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f){inp.files=e.dataTransfer.files;nm.textContent='✦ '+f.name;nm.style.display='block'}})}
bind('p12','n1','a1');bind('mob','n2','a2');

const plistMap = {
  'ESign': 'https://rim-nex.vercel.app/ESign.plist',
  'KSign': 'https://rim-nex.vercel.app/KSign.plist',
  'Scarlet': 'https://rim-nex.vercel.app/Scarlet.plist',
  'GBox': 'https://rim-nex.vercel.app/GBox.plist',
  'Feather': 'https://rim-nex.vercel.app/Feather.plist'
};

$('go').onclick=()=>{
  const a=$('p12').files[0],b=$('mob').files[0],p=$('pw').value.trim();
  if(!a||!b){toast('يرجى رفع الملفين');return}
  if(!p){toast('كلمة السر مطلوبة');$('pw').focus();return}
  const btn=$('go');
  const selectedApp = appName.textContent.trim();
  const plistUrl = plistMap[selectedApp] || plistMap['ESign'];

  btn.disabled=true;
  btn.textContent='جاري التوقيع...';

  setTimeout(()=>{
    toast('تم التوقيع بواسطة '+selectedApp+' ✓ جاري التثبيت...');
    $('note').style.display='block';
    setTimeout(()=>{
      window.location.href = 'itms-services://?action=download-manifest&url=' + encodeURIComponent(plistUrl);
      btn.disabled=false;
      btn.textContent='بدء التوقيع';
    },700);
  },1200);
};
</script>
</body>
</html>
