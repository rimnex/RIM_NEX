<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIM_NEX</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background: #000;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, Arial, sans-serif;
    }
    .card {
      background: rgba(18, 18, 18, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 28px;
      padding: 28px;
      width: 100%;
      max-width: 390px;
      backdrop-filter: blur(10px);
    }
    h1 {
      text-align: center;
      color: #FBBF24;
      font-size: 36px;
      font-weight: 800;
      margin: 0;
    }
    .sub {
      text-align: center;
      color: #9CA3AF;
      font-size: 13px;
      margin: 4px 0 30px;
    }
    .box {
      background: rgba(24, 24, 24, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #E5E7EB;
    }
    .switch {
      width: 50px;
      height: 28px;
      background: #FBBF24;
      border-radius: 28px;
      position: relative;
    }
    .switch::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      right: 3px;
    }
    .label {
      color: #9CA3AF;
      font-size: 12px;
      text-align: right;
      margin: 8px 4px;
    }
    .select {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      position: relative;
    }
    .badge {
      background: #FBBF24;
      color: #000;
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
    }
    .dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      left: 0;
      background: #181818;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      margin-top: 8px;
      z-index: 10;
      overflow: hidden;
    }
    .dropdown-item {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      color: #E5E7EB;
    }
    .dropdown-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .upload {
      border: 1.5px dashed rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      color: #9CA3AF;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 14px;
      display: block;
    }
    .file-name {
      color: #FBBF24;
      font-size: 11px;
      margin-top: 6px;
      display: none;
    }
    input[type="password"] {
      width: 100%;
      background: rgba(24, 24, 24, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      color: #fff;
      text-align: right;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #FBBF24;
    }
    .btn {
      width: 100%;
      background: #FBBF24;
      border: none;
      border-radius: 16px;
      padding: 17px;
      font-size: 17px;
      font-weight: 800;
      color: #000;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>RIM_NEX</h1>
  <div class="sub">IPA Signing Center</div>

  <div class="box toggle">
    <div class="switch"></div>
    <span>الشهادة المجانية</span>
  </div>

  <div class="label">اختر تطبيق التوقيع</div>
  <div class="box select" onclick="toggleDropdown()">
    <span style="color:#6B7280">▼</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="app-name">ESign</span>
      <div class="badge" id="app-badge">E</div>
    </div>
    
    <div class="dropdown" id="dropdown">
      <div class="dropdown-item" onclick="selectApp(event, 'E', 'ESign')">
        <div class="badge">E</div> ESign
      </div>
      <div class="dropdown-item" onclick="selectApp(event, 'K', 'KSign')">
        <div class="badge">K</div> KSign
      </div>
      <div class="dropdown-item" onclick="selectApp(event, 'S', 'Scarlet')">
        <div class="badge">S</div> Scarlet
      </div>
      <div class="dropdown-item" onclick="selectApp(event, 'G', 'GBox')">
        <div class="badge">G</div> GBox
      </div>
      <div class="dropdown-item" onclick="selectApp(event, 'F', 'Feather')">
        <div class="badge">F</div> Feather
      </div>
    </div>
  </div>

  <label class="upload" for="p12">
    📁 اضغط لرفع P12 Certificate 📄
    <div class="file-name" id="p12-name"></div>
  </label>
  <input type="file" id="p12" accept=".p12">

  <label class="upload" for="mobile">
    📁 اضغط لرفع Provision Profile 📄
    <div class="file-name" id="mobile-name"></div>
  </label>
  <input type="file" id="mobile" accept=".mobileprovision">

  <input type="password" placeholder="Password">
  
  <button class="btn">بدء التوقيع</button>
</div>

<script>
  // دالة إظهار وإخفاء القائمة المنسدلة
  function toggleDropdown() {
    let dropdown = document.getElementById('dropdown');
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
  }

  // دالة اختيار التطبيق (مع منع تداخل النقرات لتجنب إعادة الفتح)
  function selectApp(event, letter, name) {
    event.stopPropagation(); 
    document.getElementById('app-badge').innerText = letter;
    document.getElementById('app-name').innerText = name;
    document.getElementById('dropdown').style.display = 'none';
  }

  // إظهار اسم الملف بعد اختياره - P12
  document.getElementById('p12').onchange = e => {
    if (e.target.files[0]) {
      let fileNameDiv = document.getElementById('p12-name');
      fileNameDiv.innerText = e.target.files[0].name;
      fileNameDiv.style.display = 'block';
    }
  }

  // إظهار اسم الملف بعد اختياره - Provision Profile
  document.getElementById('mobile').onchange = e => {
    if (e.target.files[0]) {
      let fileNameDiv = document.getElementById('mobile-name');
      fileNameDiv.innerText = e.target.files[0].name;
      fileNameDiv.style.display = 'block';
    }
  }

  // إغلاق القائمة المنسدلة عند النقر في أي مكان خارجها
  document.addEventListener('click', function(event) {
    let selectBox = document.querySelector('.select');
    if (!selectBox.contains(event.target)) {
      document.getElementById('dropdown').style.display = 'none';
    }
  });
</script>

</body>
</html>
