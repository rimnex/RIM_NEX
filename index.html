<title>RIM_NEX</title>

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,0.15) 0%,#000 70%);
  min-height:100vh;padding:20px;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}
.container{max-width:430px;margin:0 auto}
.header{text-align:center;padding:50px 0 35px}
.header h1{
  font-size:42px;font-weight:900;
  background:linear-gradient(180deg,#FFD700 0%,#D4AF37 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:12px
}
.shield{width:38px;height:38px}
.header p{color:#999;font-size:11px;letter-spacing:6px;margin-top:10px}
.card{

  border-radius:20px;padding:20px;margin-bottom:16px

.toggle{display:flex;justify-content:space-between;align-items:center;text-align:right}
.toggle b{font-size:16px;display:block}
.toggle small{font-size:12px;color:#aaa;display:block;margin-top:5px}
.switch{

  border-radius:34px;position:relative;flex-shrink:0
}
.switch::after{
  content:"";width:28px;height:28px;background:#fff;border-radius:50%;

}
.select{
  display:flex;justify-content:space-between;align-items:center;padding:16px
}
.select-left{display:flex;align-items:center;gap:12px}
.select-icon{
  width:45px;height:45px;border-radius:14px;
  background:linear-gradient(180deg,#FFD700,#D4AF37);
  display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:22px
}
.upload{
  border:2px dashed rgba(212,175,55,0.5);text-align:center;cursor:pointer;padding:25px 20px
}
.upload b{font-size:17px;display:block}
.upload small{font-size:13px;color:#aaa;margin-top:6px;display:block}
.file{color:#FFD700;font-size:13px;margin-top:8px}
.input{
  display:flex;justify-content:space-between;align-items:center;padding:18px
}
.input input{
  background:transparent;border:none;color:#fff;width:85%;
  text-align:right;font-size:16px;outline:none
}
