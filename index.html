<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX - Premium Cloud Signer</title>
    <style>
        /* إعدادات الخطوط والخلفية */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* أسود عميق */
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 100%);
            font-family: 'Tajawal', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* الحاوية الرئيسية (الإطار الزجاجي/الأسود) */
        .container {
            background: #111111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* الترويسة والعنوان الذهبي اللامع */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            /* تدرج ذهبي لامع */
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
        }

        /* تنسيق الحقول والمجموعات */
        .form-group {
            margin-bottom: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a2a;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 700;
        }

        /* زر التبديل (الشهادة المجانية) */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            /* لون ذهبي عند التفعيل */
            background: linear-gradient(to right, #bf953f, #aa771c);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* القوائم المنسدلة ومدخلات النصوص */
        select, input[type="password"] {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }
        
        select option {
            background: #111;
            color: #fff;
        }

        /* إخفاء زر رفع الملفات الافتراضي وتخصيصه */
        input[type="file"] {
            display: none;
        }
        .file-upload-label {
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-icon {
            font-size: 18px;
            color: #bf953f;
        }

        /* الزر الذهبي اللامع (بدء التوقيع) */
        .sign-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            /* تدرج ذهبي لامع */
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .sign-btn:active {
            transform: scale(0.98);
        }

        /* شريط المعالجة */
        .progress-container {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
        
        .progress-container p {
            font-size: 14px;
            color: #bf953f;
            margin-bottom: 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #bf953f, #fcf6ba);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        /* النافذة المنبثقة (Modal) للتثبيت */
        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        .modal-content p {
            margin-bottom: 25px;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .modal-buttons button {
            background: transparent;
            border: none;
            color: #007aff; /* لون أزرار iOS */
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .modal-buttons button.cancel {
            color: #ff3b30;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>RIM_NEX</h1>
            <p>PREMIUM CLOUD SIGNER</p>
        </div>

        <div class="form-group">
            <label>الشهادة المجانية $</label>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="form-group">
            <select id="app-select">
                <option value="feather">Feather</option>
                <option value="esign">ESign</option>
                <option value="scarlet">Scarlet</option>
                <option value="gbox">GBox</option>
            </select>
        </div>

        <div class="form-group">
            <label class="file-upload-label" for="p12-file">
                <span>ملف P12 <br><small style="color: #777; font-weight: 400;">اضغط لاختيار الشهادة</small></span>
                <span class="file-icon">⇧</span>
            </label>
            <input type="file" id="p12-file" accept=".p12">
        </div>

        <div class="form-group">
            <label class="file-upload-label" for="prov-file">
                <span>ملف Provision <br><small style="color: #777; font-weight: 400;">اضغط لاختيار التكوين</small></span>
                <span class="file-icon">📄</span>
            </label>
            <input type="file" id="prov-file" accept=".mobileprovision">
        </div>

        <div class="form-group">
            <input type="password" placeholder="كلمة المرور">
        </div>

        <button class="sign-btn" id="start-sign-btn">بدء التوقيع</button>

        <div class="progress-container" id="progress-container">
            <p>جاري المعالجة...</p>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="install-modal">
        <div class="modal-content">
            <p>فتح هذه الصفحة في "iTunes"؟</p>
            <div class="modal-buttons">
                <button class="cancel" onclick="closeModal()">إلغاء</button>
                <button onclick="openiTunes()">فتح</button>
            </div>
        </div>
    </div>

    <script>
        const signBtn = document.getElementById('start-sign-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const installModal = document.getElementById('install-modal');

        // محاكاة عملية التوقيع عند الضغط على الزر
        signBtn.addEventListener('click', function() {
            // إخفاء الزر وإظهار شريط التحميل
            signBtn.style.display = 'none';
            progressContainer.style.display = 'block';
            
            let width = 0;
            // تسريع شريط التحميل لمحاكاة الفيديو
            const interval = setInterval(function() {
                if (width >= 100) {
                    clearInterval(interval);
                    // عند اكتمال التحميل، أظهر النافذة المنبثقة
                    setTimeout(() => {
                        installModal.style.display = 'flex';
                    }, 500);
                } else {
                    width += 2; // سرعة التقدم
                    progressFill.style.width = width + '%';
                }
            }, 50);
        });

        // وظيفة إغلاق النافذة
        function closeModal() {
            installModal.style.display = 'none';
            // إعادة ضبط الواجهة
            progressContainer.style.display = 'none';
            progressFill.style.width = '0%';
            signBtn.style.display = 'block';
        }

        // وظيفة فتح في آيتونز (محاكاة)
        function openiTunes() {
            alert('تم طلب التثبيت. في البيئة الحقيقية سيوجهك هذا إلى رابط itms-services://');
            closeModal();
        }
    </script>
</body>
</html>
