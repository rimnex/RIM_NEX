<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX Signer</title>
    <style>
        /* الإعدادات الأساسية */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .signer-container {
            background-color: #121212;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a2a;
            box-sizing: border-box;
        }

        /* العناوين */
        .title {
            text-align: center;
            color: #d4af37;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* الحقول */
        .form-group {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.3s;
            position: relative;
        }

        .form-group:hover {
            border-color: #d4af37;
        }

        /* تصميم القائمة المنسدلة */
        .custom-select {
            width: 100%;
            cursor: pointer;
            user-select: none;
        }
        
        .select-selected {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 15px;
        }

        .select-selected .app-icon-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* تنسيق صورة الأيقونة الحقيقية */
        .app-logo {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            object-fit: cover;
            background-color: #2a2a2a; /* لون خلفية في حال تأخر تحميل الصورة */
        }

        .select-items {
            position: absolute;
            background-color: #1a1a1a;
            top: 105%;
            left: 0;
            right: 0;
            z-index: 99;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }

        .select-hide {
            display: none;
        }

        .select-items div {
            padding: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #222;
            transition: background-color 0.2s;
        }

        .select-items div:last-child {
            border-bottom: none;
        }

        .select-items div:hover {
            background-color: #333;
            color: #d4af37;
        }

        /* حقول رفع الملفات */
        .file-upload {
            flex-direction: column;
            align-items: flex-start;
            cursor: pointer;
            position: relative;
        }
        .file-upload input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }
        .file-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
        }
        .file-title {
            font-weight: bold;
            font-size: 14px;
        }
        .file-desc {
            color: #666;
            font-size: 11px;
            margin-top: 5px;
        }

        /* حقل كلمة المرور */
        input[type="password"] {
            background-color: transparent;
            border: none;
            color: #fff;
            width: 100%;
            font-size: 14px;
            outline: none;
            text-align: center;
        }

        /* الأزرار */
        .submit-btn {
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }

        .telegram-btn {
            background-color: #2481cc;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }

        .telegram-btn:hover {
            background-color: #1d69a6;
        }
    </style>
</head>
<body>

    <div class="signer-container">
        
        <div class="title">RIM_NEX</div>
        <div class="subtitle">CLOUD SIGNER</div>

        <div class="form-group" style="padding: 0;">
            <div class="custom-select" style="padding: 15px;">
                <div class="select-selected">
                    <div class="app-icon-text">
                        <img src="default.png" class="app-logo" alt="اختر" onerror="this.style.display='none'">
                        <span id="selected-app-text">اختر التطبيق...</span>
                    </div>
                    <span>▼</span>
                </div>
                
                <div class="select-items select-hide">
                    <div><img src="esign.png" class="app-logo" alt="ESign" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'28\' height=\'28\'><rect width=\'28\' height=\'28\' fill=\'%23333\'/><text x=\'50%\' y=\'50%\' fill=\'%23fff\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-family=\'sans-serif\' font-size=\'14\'>E</text></svg>'"> ESign</div>
                    <div><img src="ksign.png" class="app-logo" alt="KSign" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'28\' height=\'28\'><rect width=\'28\' height=\'28\' fill=\'%23333\'/><text x=\'50%\' y=\'50%\' fill=\'%23fff\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-family=\'sans-serif\' font-size=\'14\'>K</text></svg>'"> KSign</div>
                    <div><img src="scarlet.png" class="app-logo" alt="Scarlet" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'28\' height=\'28\'><rect width=\'28\' height=\'28\' fill=\'%23333\'/><text x=\'50%\' y=\'50%\' fill=\'%23fff\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-family=\'sans-serif\' font-size=\'14\'>S</text></svg>'"> Scarlet</div>
                    <div><img src="feather.png" class="app-logo" alt="Feather" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'28\' height=\'28\'><rect width=\'28\' height=\'28\' fill=\'%23333\'/><text x=\'50%\' y=\'50%\' fill=\'%23fff\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-family=\'sans-serif\' font-size=\'14\'>F</text></svg>'"> Feather</div>
                    <div><img src="gbox.png" class="app-logo" alt="GBox" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'28\' height=\'28\'><rect width=\'28\' height=\'28\' fill=\'%23333\'/><text x=\'50%\' y=\'50%\' fill=\'%23fff\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-family=\'sans-serif\' font-size=\'14\'>G</text></svg>'"> GBox</div>
                </div>
            </div>
        </div>

        <div class="form-group file-upload">
            <input type="file" accept=".p12">
            <div class="file-info">
                <div>
                    <div class="file-title">ملف P12</div>
                    <div class="file-desc">اضغط لاختيار الشهادة</div>
                </div>
                <span>📤</span>
            </div>
        </div>

        <div class="form-group file-upload">
            <input type="file" accept=".mobileprovision">
            <div class="file-info">
                <div>
                    <div class="file-title">ملف Provision</div>
                    <div class="file-desc">اضغط لاختيار التكوين</div>
                </div>
                <span>📄</span>
            </div>
        </div>

        <div class="form-group">
            <input type="password" placeholder="كلمة المرور للشهادة">
        </div>

        <button class="submit-btn">بدء التوقيع</button>

        <a href="https://t.me/PUBG_RIM" target="_blank" class="telegram-btn">
            <span>انضم إلى قناتنا على تيليجرام</span>
            <span>✈️</span>
        </a>

    </div>

    <script>
        const customSelect = document.querySelector(".custom-select");
        const selectSelected = document.querySelector(".select-selected");
        const selectItems = document.querySelector(".select-items");
        const options = document.querySelectorAll(".select-items div");
        
        selectSelected.addEventListener("click", function(e) {
            e.stopPropagation();
            selectItems.classList.toggle("select-hide");
        });

        options.forEach(option => {
            option.addEventListener("click", function() {
                // استنساخ محتوى الخيار المختار ليظهر في الأعلى
                const content = this.innerHTML;
                selectSelected.querySelector('.app-icon-text').innerHTML = content;
                
                // التأكد من إظهار الصورة إذا كانت مخفية (في حال عدم وجود صورة افتراضية)
                const img = selectSelected.querySelector('img');
                if(img) img.style.display = 'block';

                selectItems.classList.add("select-hide");
            });
        });

        document.addEventListener("click", function(e) {
            if (!customSelect.contains(e.target)) {
                selectItems.classList.add("select-hide");
            }
        });
    </script>
</body>
</html>
