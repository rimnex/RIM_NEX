<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .rim-nex-container {
            border: 2px solid #d4af37; /* ذهبي */
            padding: 30px;
            background: #1a1a1a;
            color: #d4af37;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .sig-box {
            background: #000;
            border: 1px solid #333;
            width: 300px;
            height: 150px;
            margin: 20px 0;
            cursor: crosshair;
        }
        button {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="rim-nex-container">
    <h2>توقيع الاعتماد - RIM_NEX</h2>
    <div class="sig-box" id="sig-pad"></div>
    <button onclick="alert('تم حفظ التوقيع بنجاح')">اعتماد التوقيع</button>
</div>

</body>
</html>
