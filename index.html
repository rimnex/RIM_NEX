<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RIM_NEX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(ellipse at 50% -20%,rgba(212,175,55,0.18) 0%,#000 60%),#000;
  min-height:100vh;padding:18px;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.container{max-width:420px;margin:0 auto}
.header{text-align:center;padding:35px 0 28px}
.header h1{
  font-size:40px;font-weight:900;
  background:linear-gradient(180deg,#FFD700 0%,#D4AF37 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:10px
}
.shield{width:38px;height:38px}
.header p{color:#999;font-size:10px;letter-spacing:6px;margin-top:8px;font-weight:600}
.card{background:#0a0a0a;border:2px solid #FFD700;border-radius:20px;padding:18px;margin-bottom:14px}
.toggle{display:flex;justify-content:space-between;align-items:center;text-align:right}
.toggle-info b{font-size:16px;display:block}
.toggle-info small{font-size:12px;color:#aaa;margin-top:4px;display:block}
.switch{width:54px;height:32px;background:linear-gradient(180deg,#FFD700,#D4AF37);border-radius:32px;position:relative}
.switch::after{content:"";width:26px;height:26px;background:#000;border-radius:50%;position:absolute;left:3px;top:3px}
.select{display:flex;justify-content:space-between;align-items:center}
.select-right{display:flex;align-items:center;gap:12px}
.select-icon{width:46px;height:46px;border-radius:14px;background:linear-gradient(180deg,#FFD700,#D4AF37);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:24px}
.arrow{font-size:20px;color:#FFD700}
.upload{border:2px dashed #FFD700;border-radius:20px;text-align:center;padding:24px 20px;cursor:pointer}
.upload-icon{width:56px;height:56px;margin:0 auto 12px;border-radius:16px;background:linear-gradient(180deg,#FFD700,#D4AF37);display:flex;align-items:center;justify-content:center;font-size:28px}
.upload b{font-size:17px;display:block;margin-bottom:5px}
.upload small{font-size:13px;color:#aaa}
.file-name{color:#FFD700;font-size:13px;margin-top:8px;font-weight:600}
.footer{border:2px solid #FFD700;border-radius:18px;padding:14px;text-align:center;margin-top:18px}
.footer-btn{background:#1a1a1a;padding:12px 24px;border-radius:12px;font-size:14px;color:#ccc;font-weight:600;display:inline-block}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>
      RIM_NEX
      <svg class="shield" viewBox="0 0 24 24" fill="url(#g)">
        <defs><linearGradient id="g"><stop offset="0%" stop-color="#FFD700"/><stop offset="100%" stop-color="#D4AF37"/></linearGradient></defs>
        <path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4z"/>
      </svg>
    </h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <div class="switch"></div>
    <div class="toggle-info">
      <b>شهادة التوقيع الخاصة بي</b>
      <small>استخدم شهادة Apple Developer</small>
    </div>
  </div>

  <div class="card select">
    <div class="arrow">▼</div>
    <div class="select-right">
      <div>ESign</div>
      <div class="select-icon">E</div>
    </div>
  </div>

  <div class="upload" onclick="pick('p12')">
    <div class="upload-icon">✨</div>
    <b>شهادة P12</b>
    <small>اسحب
