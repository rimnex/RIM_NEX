<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM_NEX | IPA Signing Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-color: #141414;
            --border: rgba(255,255,255,.08);
            --gold: #d4af37;
            --gold-gradient: linear-gradient(135deg,#8f6b1f,#d4af37,#f7d774,#b8860b);
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container { width: 100%; max-width: 430px; padding: 20px; }
        .main-card {
            background: var(--card-color);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.6s ease-out;
        }

        h1, p { text-align: center; margin: 0; }
        h1 { font-size: 28px; margin-bottom: 5px; }
        p { color: #888; margin-bottom: 25px; }

        .toggle-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 0; }
        .switch { width: 50px; height: 28px; background: #222; border-radius: 15px; position: relative; cursor: pointer; transition: 0.3s; }
        .switch::after { content: ''; position: absolute; width: 24px; height: 24px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .switch.on { background: var(--gold); }
        .switch.on::after { left: 24px; }

        .select-box { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid var(--border); cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        
        .upload-area { border: 2px dashed var(--border); border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .upload-area:hover { border-color: var(--gold); }
        
        input[type="password"] { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 20px; color: #fff; margin-bottom: 20px; box-sizing: border-box; }
        
        .sign-btn { width: 100%; padding: 18px; border: none; border-radius: 20px; background: var(--gold-gradient); font-weight: bold; cursor: pointer; transition: 0.3s; }
        .sign-btn:active { transform: scale(0.98); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <h1>RIM_NEX</h1>
        <p>IPA Signing Center</p>

        <div class="toggle-section">
            <span>الشهادة المجانية</span>
            <div class="switch" onclick="this.classList.toggle('on')"></div>
        </div>

        <div class="select-box" onclick="alert('اختر التطبيق')">
            <span>اختر تطبيق التوقيع</span>
            <i class="fa-solid fa-chevron-down"></i>
        </div>

        <div class="upload-area" onclick="document.getElementById('p12').click()">
            <i class="fa-solid fa-file-lines"></i>
            <p>Drop P12 Certificate</p>
            <input type="file" id="p12" hidden>
        </div>

        <div class="upload-area" onclick="document.getElementById('prov').click()">
            <i class="fa-solid fa-folder"></i>
            <p>Drop Provision Profile</p>
            <input type="file" id="prov" hidden>
        </div>

        <input type="password" placeholder="Password">

        <button class="sign-btn" onclick="sign()">بدء التوقيع</button>
    </div>
</div>

<script>
    function sign() {
        alert("جاري بدء عملية التوقيع...");
    }
</script>

</body>
</html>
