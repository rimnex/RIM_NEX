<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Arial,sans-serif}
body{background:#000;color:#fff;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh}

.card{
  background:#0a0a0a;
  border:1px solid #1a1a1a;
  border-radius:24px;
  padding:24px;
  width:100%;
  max-width:380px;
}

.header{text-align:center;margin-bottom:25px}
.logo{
  font-size:30px;font-weight:900;color:#D4AF37;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.logo svg{width:26px;height:26px;fill:#D4AF37}
.sub{font-size:13px;color:#666;margin-top:6px}

.toggle{
  background:#111;border:1px solid #222;border-radius:16px;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px
}
.switch{position:relative;width:52px;height:32px}
.switch input{opacity:0}
.slider{
  position:absolute;top:0;left:0;right:0;bottom:0;background:#2a2a2a;border-radius:30px;transition:.3s
}
.slider:before{
  content:"";position:absolute;height:26px;width:26px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s
}
input:checked + .slider{background:#D4AF37}
input:checked + .slider:before{transform:translateX(20px)}

.label{font-size:12px;color:#666;margin-bottom:8px;text-align:right}

/* الدروب داون مطابق للصورة */
.dropdown{position:relative;margin-bottom:15px}
.select{
  background:#111;border:1px solid #222;border-radius:16px;
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer
}
.select .left{display:flex;align-items:center;gap:10px}
.badge{
  background:#D4AF37;color:#000;font-weight:900;
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:16px
}
.arrow{color:#fff;font-size:14px;transition:.3s}
.arrow.up{transform:rotate(180deg)}

.options{
  background:#111;border:1px solid #222;border-radius:16px;
  margin-top:8px;padding:8px;display:none;position:absolute;width:100%;z-index:10
}
.options.show{display:block}
.option{
  padding:12px 14px;display:flex;align-items:center;justify-content:space-between;
  border-radius:10px;cursor:pointer;margin-bottom:4px
}
.option:hover{background:#1a1a1a}

/* رفع الملفات */
.upload{
  border:2px dashed #2a2a2a;border-radius:16px;padding:18px;
  text-align:center;color:#777;font-size:14px;margin-bottom:12px
}
.upload.active{border-color:#D4AF37;border-style:dashed}
.upload
