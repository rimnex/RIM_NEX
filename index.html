<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RIM_NEX - IOS SIGNING MANAGER</title>
<style>
:root{
  --bg:#0d0d0d;
  --card:#121212;
  --border:rgba(212,175,55,0.25);
  --gold:linear-gradient(135deg,#8f6b1f,#d4af37,#f7d774,#b8860b);
  --gold-solid:#d4af37;
  --text:#fff;
  --muted:#888;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
body{background:radial-gradient(ellipse at top,rgba(212,175,55,0.15) 0%,transparent 50%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}
.header{text-align:center;padding:10px 0 30px}
.header h1{font-size:34px;font-weight:900;background:var(--gold);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:1px;display:inline-flex;align-items:center;gap:10px}
.header p{color:var(--muted);font-size:11px;letter-spacing:3px;margin-top:6px}
.card{background:rgba(18,18,18,0.8);border:1px solid var(--border);border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 0 20px rgba(212,175,55,0.08)}

/* Toggle */
.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text.title{font-size:15px;font-weight:700}
.toggle-text.sub{font-size:11px;color:var(--muted);margin-top:4px}
.switch{position:relative;width:54px;height:32px;flex-shrink:0}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#1f1f1f;border-radius:32px;cursor:pointer;transition:.3s;border:1px solid var(--border)}
.slider:before{content:"";position:absolute;width:26px;height:26px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider{background:var(--gold);box-shadow:0 0 15px rgba(212,175,55,0.4)}
input:checked +.slider:before{transform:translateX(22px)}

/* Select */
.select-wrap{position:relative}
.select-box{background:#0f0f0f;border:1px solid var(--border);border-radius:18px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:10px}
.app-icon{width:36px;height:36px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:14px;box-shadow:0 0 12px rgba(212,175,55,0.3)}
.arrow{transition:.3s}
.arrow.rotate{transform:rotate(180deg)}
.dropdown{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#111;border:1px solid var(--border);border-radius:16px;padding:6px;z-index:10;display:none}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;cursor:pointer}
.dropdown-item:hover{background:#1a1a1a}

/* Upload */
.upload-box{border:1.5px dashed var(--border);border-radius:20px;padding:22px 16px;text-align:center;cursor:pointer;transition:.3s}
.upload-box:hover{border-color:var(--gold-solid)}
.upload-icon{width:56px;height:56px;border-radius:18px;background:var(--gold);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(212,175,55,0.3)}
.upload-icon svg{width:26px;height:26px;fill:#000}
.upload-box.title{font-size:15px;font-weight:700;margin-bottom:5px}
.upload-box.sub{font-size:12px;color:var(--muted)}
.file-name{font-size:12px;color:var(--gold-solid);margin-top:8px}

/* Password - شلت النقطة من هنا */
.input-wrap{background:#0f0f0f;border:1px solid var(--border);border-radius:18px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.input-pass{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px}
.pass-icons{display:flex;gap:14px}
.pass-icons svg{width:20px;height:20px;fill:var(--muted);cursor:pointer}
.pass-icons.lock{fill:var(--gold-solid)} /* القفل بس بدون dot */

/* Button */
.btn{width:100%;padding:15px;border:none;border-radius:18px;background:var(--gold);color:#000;font-weight:900;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(212,175,55,0.35)}
.btn:active{transform:scale(.98)}
.btn svg{width:18px;height:18px;fill:#000}

.progress{height:5px;background:#1f1f1f;border-radius:10px;overflow:hidden;margin:12px 0;display:none}
.progress-bar{height:100%;width:0;background:var(--gold);transition:width.3s}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--border);padding:12px 20px;border-radius:14px;opacity:0;transition:.4s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>
      RIM_NEX
      <!-- الدرع -->
      <svg width="30" height="30" viewBox="0 0 24 24">
        <defs><linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8f6b1f"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#f7d774"/></linearGradient></defs>
        <path fill="url(#goldGrad)" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.3-2.92 8.23-7 9.43-4.08-1.2-7-5.13-7-9.43v-4.7l7-3.12z"/>
      </svg>
    </h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <label class="switch">
      <input type="checkbox" id="freeCert" checked>
      <span class="slider"></span>
    </label>
    <div class="toggle-text">
      <div class="title">شهادة التوقيع الخاصة بي</div>
      <div class="sub">استخدم شهادة Apple Developer الخاصة بك</div>
    </div>
  </div>

  <div class="card select-wrap">
    <div class="select-box" id="selectBox">
      <div class="arrow" id="arrow">▼</div>
      <div class="select-left">
        <span id="selectedName">ESign</span>
        <div class="app-icon" id="selectedIcon">E</div>
      </div>
    </div>
    <div class="dropdown" id="dropdown">
      <div class="dropdown-item" data-name="ESign" data-icon="E"><div class="app-icon">E</div><span>ESign</span></div>
      <div class="dropdown-item" data-name="KSign" data-icon="K"><div class="app-icon">K</div><span>KSign</span></div>
      <div class="dropdown-item" data-name="Scarlet" data-icon="S"><div class="app-icon">S</div><span>Scarlet</span></div>
      <div class="dropdown-item" data-name="GBox" data-icon="G"><div class="app-icon">G</div><span>GBox</span></div>
      <div class="dropdown-item" data-name="Feather" data-icon="F"><div class="app-icon">F</div><span>Feather</span></div>
    </div>
  </div>

  <div class="card upload-box" id="p12Box">
    <div class="upload-icon"><svg viewBox="0 0 24 24"><path d="M12 2L4 7v10l8 5 8-5V7L12 2zm0 2.2L18.8 8 12 11.8 5.2 8 12 4.2z"/></svg></div>
    <div class="title">P12 شهادة</div>
    <div class="sub">اسحب الملف هنا أو اضغط للتصفح</div>
    <div class="file-name" id="p12Name"></div>
    <input type="file" id="p12File" accept=".p12,.cer" hidden>
  </div>

  <div class="card upload-box" id="provBox">
    <div class="upload-icon"><svg viewBox="0 0 24 24"><path d="M10 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2h-8l-2-2z"/></svg></div>
    <div class="title">Provisioning Profile</div>
    <div class="sub">اسحب الملف هنا أو اضغط للتصفح</div>
    <div class="file-name" id="provName"></div>
    <input type="file" id="provFile" accept=".mobileprovision" hidden>
  </div>

  <div class="input-wrap">
    <div class="pass-icons">
      <svg id="togglePass" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      <!-- القفل بس بدون النقطة -->
      <svg class="lock" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2.9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z"/></svg>
    </div>
    <input type="password" class="input-pass" id="password" placeholder="Password">
  </div>

  <div class="progress" id="progress"><div class="progress-bar" id="bar"></div></div>
  <button class="btn" id="signBtn">
    بدء التوقيع
    <!-- القلم -->
    <svg viewBox="0 0 24 24">
      <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
    </svg>
  </button>
</div>
<div class="toast" id="toast"></div>

<script>
// Select
const selectBox = document.getElementById('selectBox');
const dropdown = document.getElementById('dropdown');
const arrow = document.getElementById('arrow');
selectBox.onclick = (e) => {e.stopPropagation(); dropdown.classList.toggle('show'); arrow.classList.toggle('rotate');}
document.querySelectorAll('.dropdown-item').forEach(item => {
  item.onclick = (e) => {
    e.stopPropagation();
    document.getElementById('selectedName').textContent = item.dataset.name;
    document.getElementById('selectedIcon').textContent = item.dataset.icon;
    dropdown.classList.remove('show'); arrow.classList.remove('rotate');
  }
});
document.onclick = () => {dropdown.classList.remove('show'); arrow.classList.remove('rotate');}

// Upload
function bindUpload(box, input, nameEl){
  box.onclick = () => input.click();
  input.onchange = () => { if(input.files[0]) nameEl.textContent = '✓ ' + input.files[0].name; }
}
bindUpload(document.getElementById('p12Box'), document.getElementById('p12File'), document.getElementById('p12Name'));
bindUpload(document.getElementById('provBox'), document.getElementById('provFile'), document.getElementById('provName'));

// Password toggle
document.getElementById('togglePass').onclick = () => {
  const pass = document.getElementById('password');
  pass.type = pass.type === 'password'? 'text' : 'password';
}

// Sign
document.getElementById('signBtn').onclick = () => {
  if(!document.getElementById('p12File').files[0] ||!document.getElementById('provFile').files[0] ||!document.getElementById('password').value){
    showToast('الرجاء اكمال جميع الحقول','error'); return;
  }
  document.getElementById('progress').style.display = 'block';
  let w = 0;
  let int = setInterval(()=>{
    w += 10;
    document.getElementById('bar').style.width = w + '%';
    if(w >= 100){
      clearInterval(int);
      showToast('تم التوقيع بنجاح','success');
      setTimeout(()=>{document.getElementById('progress').style.display='none';document.getElementById('bar').style.width='0'},1000);
    }
  },200);
};

function showToast(msg,type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  t.style.borderColor = type=='success'?'#2ecc71':'#e74c3c';
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
