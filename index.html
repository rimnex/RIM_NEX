<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX | iOS Signing Manager</title>
<style>
:root{
 --bg:#0a0a0a; --card:#111; --border:rgba(255,255,255,.06);
 --gold:#FFD700; --gold-dark:#D4AF37;
 --gold-gradient:linear-gradient(135deg,#FFD700 0%,#FFA500 50%,#D4AF37 100%);
 --text:#fff; --text-dim:#aaa; --success:#00ff88;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif}
body{
 min-height:100vh; 
 background: radial-gradient(ellipse at top, rgba(255,215,0,.15) 0%, transparent 50%), #000;
 color:var(--text); 
 padding:40px 16px 60px;
}
.wrap{width:100%;max-width:400px;margin:0 auto;}

.header{text-align:center;margin-bottom:30px}
.logo{font-size:36px;font-weight:900;background:var(--gold-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:2px}
.subtitle{ margin-top:8px;font-size:11px;letter-spacing:3px;color:var(--text-dim);font-weight:600; }

.section-title{text-align:center;font-size:15px;color:var(--text-dim);margin-bottom:16px;font-weight:600}

/* APP CARDS WITH GLOW */
.app-card{
  background:rgba(17,17,17,.8);border:1px solid var(--border);border-radius:20px;
  padding:16px;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;cursor:pointer;transition:.3s;text-decoration:none;color:var(--text);
  box-shadow:0 0 20px rgba(255,215,0,.1)
}
.app-card:hover{transform:translateY(-3px);box-shadow:0 0 30px rgba(255,215,0,.25);border-color:var(--gold)}
.app-info{display:flex;align-items:center;gap:14px}
.app-icon{
  width:56px;height:56px;border-radius:16px;
  background:var(--gold-gradient);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#000;font-size:24px;
  box-shadow:0 0 20px rgba(255,215,0,.5)
}
.app-text .name{font-size:18px;font-weight:800}
.app-text .status{font-size:12px;color:var(--success);margin-top:3px}
.app-arrow{font-size:20px;color:var(--gold)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--gold);padding:12px 20px;border-radius:12px;display:none;z-index:999}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="wrap">
  <header class="header">
    <div class="logo">RIM_NEX</div>
    <div class="subtitle">IOS SIGNING MANAGER</div>
  </header>

  <div class="section-title">التطبيقات الجاهزة للتثبيت</div>

  <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/esign.plist">
    <div class="app-info">
      <div class="app-icon">E</div>
      <div class="app-text">
        <div class="name">ESign</div>
        <div class="status">جاهز للتثبيت</div>
      </div>
    </div>
    <div class="app-arrow">➤</div>
  </a>

  <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/ksign.plist">
    <div class="app-info">
      <div class="app-icon">K</div>
      <div class="app-text">
        <div class="name">KSign</div>
        <div class="status">جاهز للتثبيت</div>
      </div>
    </div>
    <div class="app-arrow">➤</div>
  </a>

  <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/scarlet.plist">
    <div class="app-info">
      <div class="app-icon">S</div>
      <div class="app-text">
        <div class="name">Scarlet</div>
        <div class="status">جاهز للتثبيت</div>
      </div>
    </div>
    <div class="app-arrow">➤</div>
  </a>

  <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/gbox.plist">
    <div class="app-info">
      <div class="app-icon">G</div>
      <div class="app-text">
        <div class="name">GBox</div>
        <div class="status">جاهز للتثبيت</div>
      </div>
    </div>
    <div class="app-arrow">➤</div>
  </a>

  <a class="app-card" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/rimnex/RIM_NEX/main/feather.plist">
    <div class="app-info">
      <div class="app-icon">F</div>
      <div class="app-text">
        <div class="name">Feather</div>
        <div class="status">جاهز للتثبيت</div>
      </div>
    </div>
    <div class="app-arrow">➤</div>
  </a>

</div>

<script>
function showToast(msg){
  let t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2500)
}
</script>
</body>
</html>
