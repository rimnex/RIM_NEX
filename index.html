<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
:root{--bg:#0a0a0a;--border:rgba(212,175,55,0.3);--gold:linear-gradient(135deg,#8f6b1f 0%,#d4af37 50%,#f7d774 100%);--text:#fff;--muted:#aaa;}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system}
body{background:radial-gradient(ellipse at top,rgba(212,175,55,0.15) 0%,transparent 60%),var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.container{max-width:430px;margin:0 auto}
.header{text-align:center;padding:20px 0 30px}
.header h1{font-size:38px;font-weight:900;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:12px;letter-spacing:3px}
.card{background:rgba(17,17,17,0.9);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px}
.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text b{font-size:15px}
.toggle-text small{font-size:11px;color:var(--muted)}
.switch{width:52px;height:32px;background:var(--gold);border-radius:32px;position:relative}
.switch::after{content:'';position:absolute;width:26px;height:26px;background:#fff;border-radius:50%;top:3px;right:3px}
.select-box{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.select-left{display:flex;align-items:center;gap:10px}
.app-icon{width:38px;height:38px;border-radius:12px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900}
.dropdown{display:none;background:#0a0a0a;border:1px solid var(--border);border-radius:12px;margin-top:8px;padding:6px}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer}
.dropdown-item:hover{background:#1a1a1a}
.upload{text-align:center}
.upload b{font-size:15px}
.upload small{font-size:12px;color:var(--muted)}
.file-name{font-size:12px;color:var(--gold);margin-top:6px}
.input-wrap{display:flex;align-items:center;justify-content:space-between}
.input-pass{background:transparent;border:none;outline:none;color:var(--text);width:90%;text-align:right;font-size:15px}
.eye{font-size:20px;cursor:pointer}
.btn{width:100%;padding:18px;border:none;border-radius:16px;background:var(--gold);color:#000;font-weight:900;font-size:17px;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>RIM_NEX</h1>
    <p>IOS SIGNING MANAGER</p>
  </div>

  <div class="card toggle">
    <div class="switch"></div>
    <div class="toggle-text">
      <b>شهادة التوقيع الخاصة بي</b><br>
      <small>استخدم شهادة Apple Developer</small>
    </div>
  </div>

  <div class="card" style="position:relative">
    <div class="select-box" id="selectBox">
      <div>▼</div>
      <div class="select-left">
        <span id="selectedName">KSign</span>
        <div class="app-icon" id="selectedIcon">K</div>
      </div>
    </div>
    <div class="dropdown" id="dropdown">
      <div class="dropdown-item" data-name="ESign" data-icon="E" data-plist="ESign.plist"><div class="app-icon">E</div><span>ESign</span></div>
      <div class="dropdown-item" data-name="KSign" data-icon="K" data-plist="KSign.plist"><div class="app-icon">K</div><span>KSign</span></div>
      <div class="dropdown-item" data-name="Scarlet" data-icon="S" data-plist="Scarlet.plist"><div class="app-icon">S</div><span>Scarlet</span></div>
      <div class="dropdown-item" data-name="GBox" data-icon="G" data-plist="GBox.plist"><div class="app-icon">G</div><span>GBox</span></div>
      <div class="dropdown-item" data-name="Feather" data-icon="F" data-plist="Feather. plist"><div class="app-icon">F</div><span>Feather</span></div>
    </div>
  </div>

  <div class="card upload" id="p12Card">
    <b>شهادة P12</b><br>
    <small>اسحب الملف هنا</small>
    <div class="file-name" id="p12Name"></div>
    <input type="file" id="p12" accept=".p12" hidden>
  </div>

  <div class="card upload" id="provCard">
    <b>Provisioning Profile</b><br>
    <small>اسحب الملف هنا</small>
    <div class="file-name" id="provName"></div>
    <input type="file" id="prov" accept=".mobileprovision" hidden>
  </div>

  <div class="card input-wrap">
    <span class="eye" id="togglePass">👁️</span>
    <input type="password" class="input-pass" id="password" placeholder="Password">
  </div>

  <button class="btn" id="signBtn">بدء التوقيع والتثبيت</button>
</div>

<script>
const baseUrl = "https://raw.githubusercontent.com/rimnex/RIM_NEX/main/";
let selectedPlist = "KSign.plist";

// القائمة
document.getElementById('selectBox').onclick = () => document.getElementById('dropdown').classList.toggle('show');
document.querySelectorAll('.dropdown-item').forEach(item => {
  item.onclick = () => {
    document.getElementById('selectedName').textContent = item.dataset.name;
    document.getElementById('selectedIcon').textContent = item.dataset.icon;
    selectedPlist = item.dataset.plist;
    document.getElementById('dropdown').classList.remove('show');
  }
});

// رفع الملفات
document.getElementById('p12Card').onclick = () => document.getElementById('p12').click();
document.getElementById('provCard').onclick = () => document.getElementById('prov').click();
document.getElementById('p12').onchange = e => {if(e.target.files[0]) document.getElementById('p12Name').textContent = '✓ ' + e.target.files[0].name}
document.getElementById('prov').onchange = e => {if(e.target.files[0]) document.getElementById('provName').textContent = '✓ ' + e.target.files[0].name}

// العين
document.getElementById('togglePass').onclick = () => {
  const pass = document.getElementById('password');
  pass.type = pass.type === 'password'? 'text' : 'password';
}

// التثبيت
document.getElementById('signBtn').onclick = () => {
  if(!document.getElementById('p12').files[0] ||!document.getElementById('prov').files[0] ||!document.getElementById('password').value){
    alert('الرجاء اكمال جميع الحقول'); return;
  }
  window.location.href = "itms-services://?action=download-manifest&url=" + baseUrl + selectedPlist;
}
</script>
</body>
</html>
