<title>RIM_NEX | iOS Signing Manager</title>
<style>
:root{
 --bg:#000; 
 --gold:#FFC107; 
 --gold-dark:#FFA000;
 --text:#fff; --text-dim:#888; 
 --card-bg:#0A0A0A; --border:rgba(255,193,7,.25);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif}
body{
 min-height:100vh; 
 background: radial-gradient(ellipse at 50% -10%, rgba(255,193,7,.25) 0%, #000 50%);
 color:var(--text); 
 padding:50px 16px 100px;
}

/* HEADER WITH GLOW */
.header{text-align:center;margin-bottom:25px;position:relative}
.header::before{
  content:"";position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:300px;height:200px;background:radial-gradient(circle, rgba(255,193,7,.4) 0%, transparent 70%);
  filter:blur(40px);z-index:-1;
}
.logo{font-size:34px;font-weight:900;color:var(--gold);display:inline-flex;align-items:center;gap:10px;letter-spacing:1px}
.logo svg{width:28px;height:28px;fill:var(--gold);filter:drop-shadow(0 0 10px rgba(255,193,7,.6))}
.subtitle{ margin-top:8px;font-size:11px;letter-spacing:2.5px;color:var(--text-dim);font-weight:500; }

/* MAIN CARD */
.main-card{
  background:rgba(10,10,10,.85);border:1px solid rgba(255,193,7,.15);
  border-radius:24px;padding:18px;backdrop-filter:blur(10px);
}

/* TOGGLE */
.toggle-box{
  background:rgba(17,17,17,.6);border:1px solid rgba(255,193,7,.1);border-radius:16px;
  padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px
}
.toggle-text{text-align:right}
.toggle-text .t{font-size:15px;font-weight:700}
.toggle-text .d{font-size:11px;color:var(--text-dim);margin-top:4px}
.switch{position:relative;width:54px;height:32px;}
.switch input{opacity:0;width:0;height:0;}
.slider{
  position:absolute;cursor:pointer;inset:0;background:#2a2a2a;border-radius:32px;transition:.3s;
}
.slider:before{
  content:"";position:absolute;height:26px;width:26px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s;
  box-shadow:0 2px 6px rgba(0,0,0,.3)
}
input:checked + .slider{background:var(--gold);box-shadow:0 0 15px rgba(255,193,7,.5);}
