<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RIM_NEX</title>
<style>
:root{
  --bg:#000;
  --border:#d4af37;
  --gold:linear-gradient(180deg, #FFD700 0%, #D4AF37 100%);
  --text:#FFFFFF;
  --muted:#999999;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(ellipse at 50% -10%,rgba(212,175,55,0.3) 0%,rgba(0,0,0,0) 70%),var(--bg);min-height:100vh;padding:20px 16px;color:var(--text);font-family:-apple-system,BlinkMacSystemFont}
.container{max-width:430px;margin:0 auto}

.header{text-align:center;padding:45px 0 35px}
.header-title{display:flex;align-items:center;justify-content:center;gap:12px}
.shield{width:38px;height:38px}
.shield path{fill:url(#goldGrad)}
.header h1{font-size:42px;font-weight:900;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.5px}
.header p{color:var(--muted);font-size:10px;letter-spacing:7px;margin-top:12px;font-weight:300}

.card{background:rgba(8,8,8,0.8);border:2px solid var(--border);border-radius:22px;padding:20px;margin-bottom:18px}
.card.dashed{border:2px dashed var(--border)}

.toggle{display:flex;justify-content:space-between;align-items:center}
.toggle-text{text-align:right}
.toggle-text b{font-size:17px;font-weight:700}
.toggle-text small{font-size:12px;color:var(--muted);display:block;margin-top:5px}
.switch{position:relative;width:58px;height:36px;flex-shrink:0}
.switch input{display:none}
.slider{position:absolute;inset:0;background:var(--gold);border-radius:36px;cursor:pointer}
.slider:before{content:"";position:absolute;width:30px;height:30px;right:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked +.slider:before{transform:translateX(-22px)}

.select-box{display:flex;justify-content:space-between;align-items:center;cursor:pointer;position:relative}
.select-left{display:flex;align-items:center;gap:15px}
.app-icon{width:50px;height:50px;border-radius:18px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:24px}
.arrow{font-size:16px;color:#fff;transition:.3s}
.arrow.rotate{transform:rotate(180deg)}
.dropdown{display:none;position:absolute;top:calc(100% + 12px);left:0;right:0;background:#000;border:2px solid var(--border);border-radius:20px;padding:10px;z-index:100}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:15px;padding:15px;border-radius:14px;cursor:pointer;justify-content:flex-end}
.dropdown-item:hover{background:#111}

.upload{text-align:center;cursor:pointer}
.upload b{font-size:17px;font-weight:700}
.upload small{font-size:13px;color:var(--muted);margin-top:6px;display:block}
.file-name{font-size:14px;color:#FFD700;font-weight:600;margin-top:10px;word-break:break-all}

.input-wrap{display:flex;align-items:center;justify-content:space-between}
.input-pass{background:transparent;border:none;outline:none;color:var(--text);width:85%;text-align:right;font-size:16px;letter-spacing:2px}
.eye{font-size:22px;cursor:pointer;opacity:0.7}

.btn{width:100%;padding:21px;border:none;border-radius:18px;background:var(--gold);color:#000;font-weight:900;font-size:18px;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:10px}
</style>
</head>
<body>

  <div class="header">

      <h1>RIM_NEX</h1>
    </div>
    <p>IOS SIGNING MANAGER</p>

  <div class="card toggle">

      <div class="dropdown-item" data-name="GBox" data-icon="G" data-plist="GBox.plist"><span>GBox</span><div class="app-icon">G</div></div>

  <div class="card dashed upload" id="p12Card"><b>شهادة P12</b><small>اسحب الملف هنا</small><div class="file-name" id="p12Name"></div></div>
  <div class="card dashed upload" id="provCard"><b>Provisioning Profile</b><small>اسحب الملف هنا</small><div class="file-name" id="provName"></div></div>
  <div class="card input-wrap"><input type="password" class="input-pass" id="password" placeholder="Password"><span class="eye" id="togglePass">👁️</span></div>
  <button class="btn" id="signBtn">بدء التوقيع والتثبيت</button>
</div>
