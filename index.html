<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM_NEX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Arial}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{background:#0F0F0F;border-radius:30px;padding:28px;width:100%;max-width:400px}
h1{text-align:center;color:#F4D03F;font-size:32px;font-weight:900;margin-bottom:5px}
.sub{text-align:center;color:#888;font-size:13px;margin-bottom:25px}
.toggle{background:#111;border:1px solid #1a1a1a;border-radius:20px;padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.toggle span{font-size:15px}
.switch{width:52px;height:30px;background:#F4D03F;border-radius:30px;position:relative}
.switch::after{content:'';position:absolute;width:24px;height:24px;background:#fff;border-radius:50%;top:3px;left:3px}
.label{color:#888;font-size:12px;text-align:right;margin-bottom:8px}
.select{background:#111;border:1px solid #1a1a1a;border-radius:20px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.badge{background:#F4D03F;color:#000;width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px}
.upload{border:2px dashed #2a2a2a;border-radius:20px;padding:20px;text-align:center;color:#777;margin-bottom:12px;cursor:pointer;font-size:14px}
.upload.active{border-color:#F4D03F}
.file-name{color:#fff;font-size:12px;margin-top:6px;display:none}
input[type="password"]{width:100%;background:#111;border:1px solid #1a1a1a;border-radius:20px;padding:16px;color:#fff;text-align:right;margin-bottom:15px;font-size:15px}
.btn{width:100%;background:linear-gradient(180deg,#F4D03F,#D4AC0D);border:none;border-radius:20px;padding:18px;font-size:17px;font-weight:900;color:#000;cursor:pointer}
input[type="file"]{display:none}
</style>
</head>
<body>
<div class="card">
  <h1>RIM_NEX</h1>
  <div class="sub">IPA Signing Center</div>

  <div class="toggle">
    <div class="switch"></div>
    <span>الشهادة المجانية</span>
  </div>

  <div class="label">اختر تطبيق التوقيع</div>
  <div class="select">
    <span>▼</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span>ESign</span>
      <div class="badge">E</div>
    </div>
  </div>

  <label class="upload" for="p12">
    📄 اضغط لرفع P12 Certificate
    <div class="file-name" id="p12-name"></div>
  </label>
  <input type="file" id="p12" accept=".p12">

  <label class="upload" for="mobile">
    📁 اضغط لرفع Provision Profile
    <div class="file-name" id="mobile-name"></div>
  </label>
  <input type="file" id="mobile" accept=".mobileprovision">

  <input type="password" placeholder="Password">
  <button class="btn">بدء التوقيع</button>
</div>

<script>
document.getElementById('p12').onchange = e => {
  if(e.target.files[0]){
    document.getElementById('p12-name').innerText = e.target.files[0].name;
    document.getElementById('p12-name').style.display = 'block';
    e.target.parentElement.classList.add('active');
  }
}
document.getElementById('mobile').onchange = e => {
  if(e.target.files[0]){
    document.getElementById('mobile-name').innerText = e.target.files[0].name;
    document.getElementById('mobile-name').style.display = 'block';
    e.target.parentElement.classList.add('active');
  }
}
</script>
</body>
</html>
